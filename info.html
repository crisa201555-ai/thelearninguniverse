<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Exploradores - The Learning Universe</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-cyan: #00ffff; --neon-pink: #ff00ff; --bg-dark: #0a0e17; }
        body {
            margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #111d2b 0%, #05070a 100%);
            color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-top: 50px;
        }

        /* --- BUSCADOR --- */
        .search-container {
            width: 90%; max-width: 600px; margin-bottom: 30px; text-align: center;
        }
        .search-box {
            display: flex; gap: 10px; background: rgba(255,255,255,0.05);
            padding: 10px; border-radius: 50px; border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }
        .search-box input {
            flex: 1; background: transparent; border: none; color: white;
            padding: 10px 20px; outline: none; font-size: 1rem;
        }
        .search-btn {
            background: var(--neon-cyan); border: none; padding: 10px 25px;
            border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .search-btn:hover { box-shadow: 0 0 20px var(--neon-cyan); transform: scale(1.05); }

        /* --- TARJETA DE RESULTADO --- */
        .info-card {
            width: 90%; max-width: 500px; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); border-radius: 24px;
            border: 1px solid rgba(255, 0, 255, 0.3); padding: 40px;
            text-align: center; position: relative; display: none; /* Se muestra al buscar */
        }
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--neon-pink); margin-bottom: 15px; }
        .back-link { margin-top: 20px; color: var(--neon-pink); text-decoration: none; font-size: 0.8rem; }
        
        .no-results { color: #888; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <a href="home.html" style="position:fixed; top:20px; left:20px; color:var(--neon-cyan); text-decoration:none; font-weight:bold;">← VOLVER</a>

    <div class="search-container">
        <h1 style="font-family:'Oswald'; letter-spacing:3px;">BUSCAR EN EL UNIVERSO</h1>
        <form id="searchForm" class="search-box">
            <input type="text" id="searchInput" placeholder="Nombre o correo del explorador..." required>
            <button type="submit" class="search-btn">BUSCAR</button>
        </form>
    </div>

    <div id="resultCard" class="info-card">
        <img id="res-img" src="" class="profile-pic">
        <h2 id="res-name" style="font-family:'Oswald'; margin:0;"></h2>
        <p id="res-email" style="color:var(--neon-cyan); font-size:0.9rem;"></p>
        <div style="text-align:left; background:rgba(0,0,0,0.3); padding:15px; border-radius:10px; margin-top:20px;">
            <label style="font-size:0.7rem; color:var(--neon-pink); font-weight:bold;">DESCRIPCIÓN</label>
            <p id="res-desc" style="font-size:0.85rem; margin-top:5px;">Sin descripción disponible.</p>
        </div>
    </div>

    <p id="noResults" class="no-results">No se encontró ningún explorador con esos datos.</p>

    <script type="module">
        // Simulación de base de datos (En una app real, esto vendría de Firebase Firestore)
        const mockUsers = [
            { name: "Alana", email: "alana@universo.com", img: "https://i.pravatar.cc/150?u=alana", desc: "Exploradora de Matemáticas y Tecnología." },
            { name: "Gemini", email: "gemini@ai.com", img: "https://i.pravatar.cc/150?u=gemini", desc: "Inteligencia artificial al servicio del aprendizaje." },
            { name: "Admin", email: "admin@thelearninguniverses.com", img: "https://i.pravatar.cc/150?u=admin", desc: "Creador de este universo." }
        ];

        const form = document.getElementById('searchForm');
        const input = document.getElementById('searchInput');
        const card = document.getElementById('resultCard');
        const noRes = document.getElementById('noResults');

        // Función de búsqueda
        const performSearch = (query) => {
            if (!query) return;
            
            const result = mockUsers.find(u => 
                u.name.toLowerCase() === query.toLowerCase() || 
                u.email.toLowerCase() === query.toLowerCase()
            );

            if (result) {
                document.getElementById('res-img').src = result.img;
                document.getElementById('res-name').innerText = result.name;
                document.getElementById('res-email').innerText = result.email;
                document.getElementById('res-desc').innerText = result.desc;
                card.style.display = "block";
                noRes.style.display = "none";
            } else {
                card.style.display = "none";
                noRes.style.display = "block";
            }
        };

        // Escuchar el envío del formulario
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const val = input.value;
            // Cambiamos la URL sin recargar para que se vea profesional
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?search=' + val;
            window.history.pushState({path:newUrl},'',newUrl);
            performSearch(val);
        });

        // Leer la URL al cargar la página
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('search');
            if (query) {
                input.value = query;
                performSearch(query);
            }
        };
    </script>
</body>
</html>
