<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Exploradores - Info</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-cyan: #00ffff; --neon-pink: #ff00ff; --bg-dark: #0a0e17; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg-dark); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .header-nav { width: 100%; max-width: 800px; display: flex; justify-content: space-between; margin-bottom: 30px; }
        .search-box { display: flex; width: 100%; max-width: 500px; background: rgba(255,255,255,0.05); border-radius: 50px; border: 1px solid var(--neon-cyan); overflow: hidden; }
        .search-box input { flex: 1; background: transparent; border: none; color: white; padding: 15px; outline: none; }
        .search-box button { background: var(--neon-cyan); border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
        .profile-card { width: 100%; max-width: 400px; background: rgba(255,255,255,0.05); border: 1px solid var(--neon-pink); border-radius: 20px; padding: 30px; text-align: center; margin-top: 20px; display: none; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--neon-pink); margin-bottom: 10px; }
        .notif-card { background: #1a1f2b; padding: 15px; border-radius: 12px; border-left: 4px solid var(--neon-pink); margin-top: 10px; width: 100%; max-width: 400px; }
        .btn-acc { background: #42b72a; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header-nav">
        <a href="home.html" style="color:var(--neon-cyan); text-decoration:none;">← VOLVER</a>
        <button onclick="showMyProfile()" style="background:none; border:1px solid white; color:white; border-radius:20px; padding:5px 15px; cursor:pointer;">MI PERFIL</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Nombre o Email exacto...">
        <button id="searchBtn">BUSCAR</button>
    </div>

    <div id="profileCard" class="profile-card">
        <img id="p-img" src="" class="avatar">
        <h2 id="p-name"></h2>
        <p id="p-email"></p>
        <button id="requestBtn" style="background:var(--neon-pink); color:white; border:none; padding:10px 20px; border-radius:20px; cursor:pointer; font-weight:bold;">MANDAR SOLICITUD</button>
    </div>

    <div id="notifArea" style="margin-top:30px;">
        <h3>NOTIFICACIONES</h3>
        <div id="notifList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDocs, collection, query, where, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await setDoc(doc(db, "users", user.uid), { uid: user.uid, name: user.displayName || "Explorador", email: user.email.toLowerCase(), photo: user.photoURL || "https://via.placeholder.com/100" }, { merge: true });
                loadNotifications();
            } else { window.location.href = "index.html"; }
        });

        document.getElementById('searchBtn').onclick = async () => {
            const val = document.getElementById('searchInput').value.toLowerCase().trim();
            const q = query(collection(db, "users"), where("email", "==", val));
            const snap = await getDocs(q);
            let found = null; snap.forEach(d => found = d.data());
            if(found) {
                document.getElementById('p-img').src = found.photo;
                document.getElementById('p-name').innerText = found.name;
                document.getElementById('p-email').innerText = found.email;
                document.getElementById('profileCard').style.display = "block";
                document.getElementById('requestBtn').onclick = () => sendRequest(found);
            } else { alert("No encontrado"); }
        };

        async function sendRequest(target) {
            await setDoc(doc(db, "requests", target.uid), { fromId: currentUser.uid, fromName: currentUser.displayName || currentUser.email, status: "pending" });
            alert("Solicitud enviada");
        }

        function loadNotifications() {
            onSnapshot(doc(db, "requests", currentUser.uid), (d) => {
                const list = document.getElementById('notifList'); list.innerHTML = "";
                if(d.exists() && d.data().status === "pending") {
                    const data = d.data();
                    list.innerHTML = `<div class="notif-card">${data.fromName} quiere ser tu compañero. <button class="btn-acc" onclick="accept('${data.fromId}', '${data.fromName}')">ACEPTAR</button></div>`;
                }
            });
        }

        window.accept = async (id, name) => {
            await setDoc(doc(db, "users", currentUser.uid, "contacts", id), { contactId: id, contactName: name });
            await setDoc(doc(db, "users", id, "contacts", currentUser.uid), { contactId: currentUser.uid, contactName: currentUser.displayName || currentUser.email });
            await updateDoc(doc(db, "requests", currentUser.uid), { status: "accepted" });
            alert("¡Ahora son amigos!");
        }
    </script>
</body>
</html>
