<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración de Perfil - Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00ffff; --pink: #ff00ff; --bg: #0a0e17; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .nav-top { width: 100%; max-width: 800px; display: flex; justify-content: space-between; margin-bottom: 40px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(0, 255, 255, 0.2); padding: 30px; width: 100%; max-width: 450px; text-align: center; }
        
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 450px; }
        input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 50px; outline: none; }
        input:focus { border-color: var(--cyan); }
        .btn { background: var(--cyan); border: none; color: black; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        
        .notif-section { width: 100%; max-width: 450px; margin-top: 30px; }
        .notif-item { background: rgba(255, 0, 255, 0.1); border: 1px solid var(--pink); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-mini { padding: 5px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-top">
        <button class="btn" onclick="window.location.href='home.html'" style="background:none; border:1px solid var(--cyan); color:var(--cyan)">← VOLVER</button>
        <h2 style="font-family:'Oswald'; color:var(--pink)">CENTRO DE EXPLORADORES</h2>
    </div>

    <div class="search-container">
        <input type="text" id="userQuery" placeholder="Buscar por email exacto...">
        <button class="btn" onclick="searchUser()">BUSCAR</button>
    </div>

    <div id="resultCard" class="glass-card" style="display: none;">
        <img id="res-img" src="" style="width:100px; border-radius:50%; border:2px solid var(--pink)">
        <h3 id="res-name" style="margin: 10px 0 5px 0;"></h3>
        <p id="res-email" style="font-size:0.8rem; color:var(--cyan); margin-bottom:20px;"></p>
        <button id="addBtn" class="btn" style="background:var(--pink); color:white;">AÑADIR CONTACTO</button>
    </div>

    <div class="notif-section">
        <h4 style="border-bottom: 1px solid #333; padding-bottom: 5px;">SOLICITUDES DE AMISTAD</h4>
        <div id="notifications"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDocs, collection, query, where, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", 
            authDomain: "thelearninguniverse-26.firebaseapp.com", 
            projectId: "thelearninguniverse-26", 
            storageBucket: "thelearninguniverse-26.firebasestorage.app", 
            messagingSenderId: "85338996011", 
            appId: "1:85338996011:web:1f3bb216900c07e735596e" 
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                // Registro obligatorio para ser encontrado
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: user.displayName || user.email.split('@')[0],
                    email: user.email.toLowerCase(),
                    photo: user.photoURL || "https://via.placeholder.com/100"
                }, { merge: true });
                listenNotifications();
            } else { window.location.href = "index.html"; }
        });

        window.searchUser = async () => {
            const email = document.getElementById('userQuery').value.toLowerCase().trim();
            const q = query(collection(db, "users"), where("email", "==", email));
            const snap = await getDocs(q);
            
            if (!snap.empty) {
                const found = snap.docs[0].data();
                if (found.uid === currentUser.uid) return alert("¡Eres tú!");
                
                document.getElementById('res-img').src = found.photo;
                document.getElementById('res-name').innerText = found.name;
                document.getElementById('res-email').innerText = found.email;
                document.getElementById('resultCard').style.display = "block";
                document.getElementById('addBtn').onclick = () => sendFriendRequest(found);
            } else { alert("Usuario no registrado en The Learning Universe"); }
        };

        async function sendFriendRequest(target) {
            await setDoc(doc(db, "requests", target.uid + "_" + currentUser.uid), {
                to: target.uid,
                fromId: currentUser.uid,
                fromName: currentUser.displayName || currentUser.email,
                status: "pending"
            });
            alert("Solicitud enviada a " + target.name);
        }

        function listenNotifications() {
            const q = query(collection(db, "requests"), where("to", "==", currentUser.uid), where("status", "==", "pending"));
            onSnapshot(q, (snap) => {
                const container = document.getElementById('notifications');
                container.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const item = document.createElement('div');
                    item.className = "notif-item";
                    item.innerHTML = `
                        <span><b>${data.fromName}</b></span>
                        <div>
                            <button class="btn-mini" style="background:#42b72a; color:white;" onclick="acceptFriend('${d.id}', '${data.fromId}', '${data.fromName}')">Aceptar</button>
                            <button class="btn-mini" style="background:#ff4444; color:white; margin-left:5px;" onclick="rejectFriend('${d.id}')">X</button>
                        </div>`;
                    container.appendChild(item);
                });
            });
        }

        window.acceptFriend = async (requestId, fromId, fromName) => {
            // Añadir a mis contactos
            await setDoc(doc(db, "users", currentUser.uid, "contacts", fromId), { contactId: fromId, contactName: fromName });
            // Añadirme a sus contactos
            await setDoc(doc(db, "users", fromId, "contacts", currentUser.uid), { contactId: currentUser.uid, contactName: currentUser.displayName || currentUser.email });
            // Eliminar solicitud
            await deleteDoc(doc(db, "requests", requestId));
            alert("¡Ahora son amigos!");
        };

        window.rejectFriend = async (requestId) => {
            await deleteDoc(doc(db, "requests", requestId));
        };
    </script>
</body>
</html>
