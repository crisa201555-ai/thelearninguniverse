<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>En Misión | TLU</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; background: #0f172a; color: white; padding: 20px; }
        .quiz-container { max-width: 700px; margin: auto; background: white; color: #333; padding: 40px; border-radius: 30px; }
        .option { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            border: 2px solid #eee; border-radius: 15px; cursor: pointer; 
            text-align: left; font-family: 'Fredoka'; font-size: 1rem;
        }
        .option:hover { border-color: #6c5ce7; background: #f8f7ff; }
        .option.selected { border-color: #6c5ce7; background: #6c5ce7; color: white; }
        .progress { height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: #00cec9; width: 0%; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
        <h2 id="qText">Cargando pregunta...</h2>
        <div id="optionsArea"></div>
        <button id="nextBtn" onclick="nextQuestion()" style="margin-top:20px; width: 100%; padding: 15px; border-radius: 15px; border: none; background: #6c5ce7; color: white; font-weight: 700; cursor: pointer; display: none;">SIGUIENTE ➡</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-web-cloud-firestore.js";

        const db = getFirestore(initializeApp({ /* TU CONFIG */ }));
        const testId = localStorage.getItem('currentTestId');
        const userEmail = localStorage.getItem('userEmail');

        let questions = [];
        let currentIndex = 0;
        let answers = [];

        async function loadTest() {
            const docSnap = await getDoc(doc(db, "tests", testId));
            questions = docSnap.data().questions;
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIndex];
            document.getElementById('qText').innerText = q.text;
            document.getElementById('progressBar').style.width = `${(currentIndex / questions.length) * 100}%`;
            
            const area = document.getElementById('optionsArea');
            area.innerHTML = "";
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = () => selectOption(i, btn);
                area.appendChild(btn);
            });
        }

        function selectOption(index, btn) {
            document.querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            answers[currentIndex] = index;
            document.getElementById('nextBtn').style.display = "block";
        }

        window.nextQuestion = async () => {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                showQuestion();
                document.getElementById('nextBtn').style.display = "none";
            } else {
                await submitTest();
            }
        };

        async function submitTest() {
            await addDoc(collection(db, "submissions"), {
                testId: testId,
                studentEmail: userEmail,
                answers: answers,
                sentAt: new Date(),
                score: "pending" // El profesor lo revisará en reviewtest.html
            });
            alert("Misión completada. ¡Buen trabajo!");
            window.location.href = "activetests.html";
        }

        loadTest();
    </script>
</body>
</html>
