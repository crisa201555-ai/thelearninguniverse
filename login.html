<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --fondo: #0c1445; --celeste: #48dbfb; --amarillo: #feca57; --rojo: #ff6b6b; --blanco: #ffffff; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--fondo); background-image: radial-gradient(circle, #1b277a 0%, #0c1445 100%); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); padding: 40px; border-radius: 35px; border: 2px solid rgba(255,255,255,0.2); width: 100%; max-width: 380px; text-align: center; color: white; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo { font-family: 'Fredoka One'; font-size: 2.8rem; color: var(--amarillo); margin-bottom: 25px; }
        input { width: 100%; padding: 14px 20px; margin-bottom: 15px; border-radius: 50px; border: none; outline: none; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; background: var(--celeste); color: var(--fondo); font-family: 'Fredoka One'; font-size: 1.2rem; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 0 #34ace0; }
        
        /* Botón Google */
        .btn-google { 
            width: 100%; padding: 12px; border-radius: 50px; border: none; background: white; color: #444; 
            font-family: 'Montserrat', sans-serif; font-weight: 600; display: flex; align-items: center; 
            justify-content: center; gap: 10px; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn-google img { width: 20px; }
        .btn-google:hover { background: #f1f1f1; transform: scale(1.02); }

        .links { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .links a { color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 0.85rem; }
        .btn-reset { color: var(--rojo) !important; font-weight: bold; }
        hr { border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">UNIVERSE</div>
        <input type="email" id="email" placeholder="Correo Espacial">
        <input type="password" id="pass" placeholder="Tu Llave Secreta">
        <button class="btn" id="loginBtn">INICIAR VIAJE</button>

        <hr>
        <button class="btn-google" id="googleBtn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            Entrar con Google
        </button>

        <div class="links">
            <a href="resetpassword.html" class="btn-reset">¿Olvidaste tu contraseña?</a>
            <a href="register.html">¿Eres nuevo cadete? <b>Regístrate</b></a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI",
            authDomain: "thelearninguniverse-26.firebaseapp.com",
            projectId: "thelearninguniverse-26",
            storageBucket: "thelearninguniverse-26.firebasestorage.app",
            messagingSenderId: "85338996011",
            appId: "1:85338996011:web:1f3bb216900c07e735596e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Login Manual
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); window.location.href = 'home.html'; } 
            catch (e) { alert("Error: " + e.message); }
        });

        // Login Google
        document.getElementById('googleBtn').addEventListener('click', async () => {
            try { await signInWithPopup(auth, provider); window.location.href = 'home.html'; } 
            catch (e) { alert("Error con Google: " + e.message); }
        });
    </script>
</body>
</html>
