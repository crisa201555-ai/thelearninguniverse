<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Acceso Espacial</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #020617;
            color: white;
            font-family: 'Fredoka', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .welcome-img {
            width: 300px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
            margin-bottom: 20px;
        }
        h1 { font-family: 'Orbitron', sans-serif; color: #38bdf8; }
        .btn-enter {
            background: white;
            color: #020617;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            font-size: 1.2rem;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-enter:hover { transform: scale(1.1); box-shadow: 0 0 20px white; }
    </style>
</head>
<body>

    <img src="classroom1.png" alt="Welcome" class="welcome-img">
    <h1>¡Bienvenido!</h1>
    <p style="font-size: 1.2rem; margin-bottom: 30px;">Puedes entrar a The Learning Universe. Es hora de aprender.</p>
    
    <button class="btn-enter" onclick="location.href='selectname.html'">Entrar al Universo</button>

</body>
</html>
