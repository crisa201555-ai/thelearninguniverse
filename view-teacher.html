<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Radar Docente | The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; --danger: #ff6b6b; --success: #1dd1a1; }
        body { background: var(--bg); color: white; font-family: 'Montserrat'; padding: 30px; margin: 0; }
        .dashboard { max-width: 1100px; margin: auto; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--p); padding-bottom: 20px; }
        .btn-danger { background: var(--danger); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-family: 'Fredoka One'; cursor: pointer; }

        .sos-container { background: rgba(255, 107, 107, 0.1); border: 1px solid var(--danger); border-radius: 15px; padding: 20px; margin-bottom: 30px; }
        .sos-card { background: #000; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--danger); }

        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.02); border-radius: 15px; overflow: hidden; }
        th { background: var(--p); color: #000; font-family: 'Fredoka One'; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .badge-sent { background: var(--success); color: #000; }
        .badge-waiting { background: #555; color: white; }

        .btn-rev { background: var(--s); border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-rev:hover { background: white; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header-flex">
            <div>
                <h1 style="font-family:'Fredoka One'; color:var(--p); margin:0;">RADAR DOCENTE</h1>
                <p id="groupDisplay" style="opacity:0.7;">Identificando Sector...</p>
            </div>
            <button id="btnCloseTest" class="btn-danger">🔒 CERRAR PRUEBA</button>
        </div>

        <div id="sosSection" class="sos-container" style="display:none;">
            <h3 style="margin:0; font-family:'Fredoka One'; font-size: 1rem;">⚠️ ALERTAS SOS</h3>
            <div id="sosList"></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>CADETE</th>
                    <th>ESTADO</th>
                    <th>NOTA</th>
                    <th>ACCIÓN</th>
                </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", 
            authDomain: "thelearninguniverse-26.firebaseapp.com", 
            projectId: "thelearninguniverse-26", 
            storageBucket: "thelearninguniverse-26.firebasestorage.app", 
            messagingSenderId: "85338996011", 
            appId: "1:85338996011:web:1f3bb216900c07e735596e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gID = localStorage.getItem('currentGroup');

        if(!gID) { alert("No hay grupo seleccionado"); window.location.href="home.html"; }

        onSnapshot(doc(db, "grupos", gID), (snap) => {
            document.getElementById('groupDisplay').innerText = `Sector: ${snap.data().nombreGrupo} | ID: ${gID}`;
        });

        // Monitor de Alumnos
        onSnapshot(collection(db, "grupos", gID, "miembros"), (snap) => {
            const table = document.getElementById('studentTable');
            table.innerHTML = "";
            snap.forEach(d => {
                const s = d.data();
                table.innerHTML += `
                    <tr>
                        <td><b>${s.nombre}</b></td>
                        <td><span class="badge ${s.enviado ? 'badge-sent' : 'badge-waiting'}">${s.enviado ? 'ENVIADO' : 'PENDIENTE'}</span></td>
                        <td><span style="color:var(--p)">${s.nota || '---'}</span></td>
                        <td>
                            ${s.enviado ? `<button class="btn-rev" onclick="location.href='review-test.html?uid=${d.id}'">REVISAR</button>` : '---'}
                        </td>
                    </tr>`;
            });
        });

        // Monitor SOS
        const qSOS = query(collection(db, "grupos", gID, "alertas"), orderBy("fecha", "desc"));
        onSnapshot(qSOS, (snap) => {
            const sosSection = document.getElementById('sosSection');
            const sosList = document.getElementById('sosList');
            if(snap.empty) return;
            sosSection.style.display = "block";
            sosList.innerHTML = "";
            snap.forEach(d => {
                const a = d.data();
                sosList.innerHTML += `<div class="sos-card"><b>${a.estudiante}:</b> ${a.mensaje}</div>`;
            });
        });

        document.getElementById('btnCloseTest').onclick = async () => {
            if(confirm("¿Bloquear acceso a la prueba?")) {
                await updateDoc(doc(db, "pruebas", gID), { activa: false });
                alert("Prueba cerrada.");
            }
        };
    </script>
</body>
</html>
