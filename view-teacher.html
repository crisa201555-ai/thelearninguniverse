<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Dashboard Docente</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --bg: #0f172a; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; display: grid; grid-template-columns: 1fr 400px; height: 100vh; margin: 0; }
        .main { padding: 30px; }
        .spy-chat { background: rgba(0,0,0,0.5); padding: 20px; border-left: 1px solid var(--p); overflow-y: auto; }
        .btn-pdf { background: #ff7675; color: white; border: none; padding: 15px; border-radius: 50px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="main">
        <h1>👨‍🏫 Panel de Control</h1>
        <div id="membersStatus"></div>
        <button class="btn-pdf" onclick="generarPDF()">📥 GENERAR PDF OFICIAL TLU</button>
        <button onclick="window.location.href='viewmembers.html'">Gestionar Miembros</button>
        <button onclick="window.location.href='generator-test.html'">Crear Prueba</button>
    </div>
    <div class="spy-chat">
        <h3>👁️ Espionaje de Chat</h3>
        <div id="spyMessages"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, query, where, collection, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gid = localStorage.getItem('activeGroupId');

        // Monitoreo de presencia
        onSnapshot(query(collection(db, "members"), where("groupId", "==", gid)), (snap) => {
            const div = document.getElementById('membersStatus');
            div.innerHTML = snap.docs.map(d => `<p>${d.data().online ? '🟢' : '⚪'} ${d.data().email}</p>`).join('');
        });

        // Espionaje de Chat
        onSnapshot(query(collection(db, "messages"), where("groupId", "==", gid), orderBy("time", "desc")), (snap) => {
            const spy = document.getElementById('spyMessages');
            spy.innerHTML = snap.docs.map(d => `<p style="font-size:0.8rem"><b>${d.data().sender}:</b> ${d.data().text}</p>`).join('');
        });

        window.generarPDF = async () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const groupSnap = await getDocs(query(collection(db, "groups"), where("__name__", "==", gid)));
            const groupData = groupSnap.docs[0].data();

            doc.setFillColor(108, 92, 231); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255); doc.setFontSize(20); doc.text("REPORTE TLU 2026", 20, 25);
            doc.setFontSize(12); doc.text(`Docente: ${groupData.teacherName} | Curso: ${groupData.className}`, 20, 35);

            const membersSnap = await getDocs(query(collection(db, "members"), where("groupId", "==", gid)));
            const rows = membersSnap.docs.map(d => [d.data().email, 'Nota Pendiente', 'Puntaje Pendiente']);

            doc.autoTable({ startY: 50, head: [['Estudiante', 'Nota', 'Puntaje']], body: rows });
            doc.save("Reporte_Oficial_TLU.pdf");
        };
    </script>
</body>
</html>
