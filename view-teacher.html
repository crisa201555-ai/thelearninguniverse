<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Radar del Docente | The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        body { background: var(--bg); color: white; font-family: 'Montserrat'; padding: 30px; }
        .dashboard { max-width: 1000px; margin: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--p); text-align: center; }
        .stat-card h2 { font-family: 'Fredoka One'; color: var(--s); margin: 0; }
        
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.02); border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: var(--p); color: #000; font-family: 'Fredoka One'; }
        
        .status { padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        .status-online { background: #1dd1a1; color: #000; }
        .status-pending { background: var(--s); color: #000; }
        .btn-rev { background: var(--p); border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1 style="font-family:'Fredoka One'; color:var(--p)">CENTRO DE MANDO DOCENTE</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <p>Total Estudiantes</p>
                <h2 id="countTotal">0</h2>
            </div>
            <div class="stat-card">
                <p>Pruebas Enviadas</p>
                <h2 id="countSent">0</h2>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Cadete</th>
                    <th>Estado de Prueba</th>
                    <th>Nota</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="studentTable">
                </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* TU CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gID = new URLSearchParams(window.location.search).get('grupo');

        const q = query(collection(db, "grupos", gID, "miembros"));
        
        onSnapshot(q, (snap) => {
            const table = document.getElementById('studentTable');
            table.innerHTML = "";
            let total = 0;
            let sent = 0;

            snap.forEach(d => {
                const s = d.data();
                total++;
                if(s.enviado) sent++;

                table.innerHTML += `
                    <tr>
                        <td>${s.nombre}</td>
                        <td>
                            <span class="status ${s.enviado ? 'status-online' : 'status-pending'}">
                                ${s.enviado ? 'ENVIADA' : 'EN CURSO / PENDIENTE'}
                            </span>
                        </td>
                        <td><b>${s.nota || '---'}</b></td>
                        <td>
                            ${s.enviado ? `<button class="btn-rev" onclick="location.href='review-test.html?uid=${d.id}&grupo=${gID}'">REVISAR</button>` : 'Esperando...'}
                        </td>
                    </tr>
                `;
            });
            document.getElementById('countTotal').innerText = total;
            document.getElementById('countSent').innerText = sent;
        });
    </script>
</body>
</html>
