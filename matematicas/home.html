<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sector de Matemáticas | TLU</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-math: #0a192f;
            --math-blue: #1e3a8a;
            --accent: #48dbfb;
            --side-bg: rgba(0, 0, 0, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-math);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Evita scroll por los signos flotantes */
        }

        /* --- FONDO ANIMADO --- */
        .math-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1e40af 0%, #0a192f 100%);
            z-index: -2;
        }

        .math-sign {
            position: absolute;
            color: rgba(72, 219, 251, 0.2);
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            user-select: none;
            animation: float 15s linear infinite;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* --- MENÚ LATERAL --- */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100%;
            background: var(--side-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(72, 219, 251, 0.3);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            box-sizing: border-box;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .sidebar h2 {
            font-family: 'Fredoka One';
            color: var(--accent);
            font-size: 1.5rem;
            margin-bottom: 40px;
            text-align: center;
        }

        .menu-item {
            text-decoration: none;
            color: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            transition: 0.3s;
            font-weight: bold;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
        }

        .menu-item:hover {
            background: var(--accent);
            color: #000;
            transform: translateX(10px);
            border-color: white;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content {
            margin-left: 250px;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .main-content h1 {
            font-family: 'Fredoka One';
            font-size: 4rem;
            text-shadow: 0 0 20px rgba(72, 219, 251, 0.5);
            margin: 0;
        }

        .main-content p {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 600px;
        }
    </style>
</head>
<body>

    <div class="math-background" id="bg"></div>

    <aside class="sidebar">
        <h2>TLU MATH</h2>
        <a href="home.html" class="menu-item">🏠 Volver a TLU</a>
        <a href="juegos.html" class="menu-item">🎮 Juegos Educativos</a>
    </aside>

    <main class="main-content">
        <h1>MATEMÁTICAS</h1>
        <p>Bienvenido al sector de cálculos avanzados. Aquí los números cobran vida y la lógica gobierna el universo.</p>
    </main>

    <script>
        // Función para generar signos matemáticos aleatorios
        function createSigns() {
            const signs = ['+', '-', '×', '÷', '=', '√', 'π', '%'];
            const container = document.getElementById('bg');
            const signCount = 40;

            for (let i = 0; i < signCount; i++) {
                const span = document.createElement('span');
                span.className = 'math-sign';
                span.innerText = signs[Math.floor(Math.random() * signs.length)];
                
                // Posición horizontal aleatoria
                span.style.left = Math.random() * 100 + 'vw';
                
                // Retraso de animación aleatorio para que no salgan todos a la vez
                span.style.animationDelay = Math.random() * 15 + 's';
                
                // Tamaño aleatorio
                span.style.fontSize = (Math.random() * 2 + 1) + 'rem';
                
                // Duración de la animación aleatoria
                span.style.animationDuration = (Math.random() * 10 + 10) + 's';

                container.appendChild(span);
            }
        }

        // Ejecutar la creación de signos al cargar
        createSigns();
    </script>
</body>
</html>
