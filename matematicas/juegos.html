<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misiones Matemáticas | TLU</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo: #0c1445;
            --celeste: #48dbfb;
            --amarillo: #feca57;
            --rosa: #fd79a8;
            --morado: #6c5ce7;
        }

        body {
            margin: 0;
            font-family: 'Fredoka', sans-serif;
            background: var(--fondo);
            background-image: radial-gradient(circle at top, #1b277a 0%, #0c1445 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3rem;
            color: var(--amarillo);
            text-shadow: 0 0 20px rgba(254, 202, 87, 0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 50px;
        }

        .grid-juegos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 900px;
        }

        .card-juego {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-juego:hover {
            transform: translateY(-15px);
            border-color: var(--celeste);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .icon { font-size: 4rem; margin-bottom: 15px; display: block; }

        .card-juego h2 {
            margin: 10px 0;
            color: var(--celeste);
            font-family: 'Fredoka One';
        }

        .badge {
            background: var(--morado);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 15px;
        }

        .btn-home {
            margin-top: 50px;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid white;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-home:hover { background: white; color: var(--fondo); }
    </style>
</head>
<body>

    <h1>CENTRO DE MISIONES</h1>
    <p class="subtitle">¡Selecciona tu entrenamiento matemático!</p>

    <div class="grid-juegos">
        
        <a href="/matematicas/juegos/sumas-espaciales" class="card-juego">
            <span class="badge" style="background: var(--morado);">Cálculo Mental</span>
            <span class="icon">🚀</span>
            <h2>Sumas Espaciales</h2>
            <p>¡Velocidad máxima! Resuelve sumas rápidas para impulsar tu nave.</p>
        </a>

        <a href="/matematicas/juegos/tienda" class="card-juego">
            <span class="badge" style="background: var(--rosa);">Vida Real</span>
            <span class="icon">🛒</span>
            <h2>Tienda Galáctica</h2>
            <p>Aprende a manejar tu dinero espacial comprando y dando el vuelto.</p>
        </a>

    </div>

    <a href="home.html" class="btn-home">⬅ Volver al Centro de Comando</a>

</body>
</html>
