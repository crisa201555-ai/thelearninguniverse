<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Generador de Desafíos</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --accent: #fd79a8;
            --dark-bg: #0f172a;
            --easy: #55efc4;
            --medium: #ffeaa7;
            --hard: #ff7675;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Fredoka', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white; display: flex; justify-content: center; align-items: center;
        }

        .generator-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 40px;
            border: 3px solid var(--secondary);
            text-align: center;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { color: var(--secondary); font-size: 2.5rem; margin-bottom: 10px; }
        p { opacity: 0.8; margin-bottom: 30px; }

        .difficulty-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .diff-btn {
            padding: 20px;
            border-radius: 20px;
            border: none;
            font-family: 'Fredoka';
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .diff-btn:hover { transform: scale(1.03); }

        .easy { background: var(--easy); color: #00b894; }
        .medium { background: var(--medium); color: #d6a031; }
        .hard { background: var(--hard); color: #d63031; }

        .generate-btn {
            background: var(--primary);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            border: none;
            font-family: 'Fredoka';
            font-weight: 700;
            font-size: 1.5rem;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
            transition: 0.3s;
        }

        .generate-btn:hover {
            background: #5b4bc4;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(108, 92, 231, 0.5);
        }

        .btn-back {
            display: block;
            margin-top: 20px;
            color: white;
            opacity: 0.6;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <audio id="clickSound" src="mouse-click-sound.mp3"></audio>

    <div class="generator-card">
        <h1>🛠️ Generador</h1>
        <p>Selecciona tu nivel para comenzar la misión</p>

        <div class="difficulty-options">
            <button class="diff-btn easy" onclick="selectLevel('facil')">
                🟢 Nivel Fácil <span>(Sumas 1-10)</span>
            </button>
            <button class="diff-btn medium" onclick="selectLevel('medio')">
                🟡 Nivel Medio <span>(Sumas 1-50)</span>
            </button>
            <button class="diff-btn hard" onclick="selectLevel('dificil')">
                🔴 Nivel Difícil <span>(Sumas 1-100)</span>
            </button>
        </div>

        <button class="generate-btn" id="mainBtn" onclick="generateTest()">
            ✨ GENERAR TEST
        </button>

        <a href="home.html" class="btn-back">Volver al Home</a>
    </div>

    <script>
        let selectedLevel = 'facil';
        const clickSound = document.getElementById('clickSound');

        function playSound() {
            clickSound.currentTime = 0; // Reinicia el audio si se clica rápido
            clickSound.play();
        }

        function selectLevel(level) {
            playSound();
            selectedLevel = level;
            
            // Feedback visual simple
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.style.border = "none";
                btn.style.opacity = "0.7";
            });
            event.currentTarget.style.border = "3px solid white";
            event.currentTarget.style.opacity = "1";
        }

        function generateTest() {
            playSound();
            
            // Guardamos la configuración en localStorage para que el juego la lea
            localStorage.setItem('currentDifficulty', selectedLevel);
            
            alert("🚀 ¡Misión Generada! Preparando motores para el nivel " + selectedLevel.toUpperCase());
            
            // Redirigir al juego de sumas (o una versión de test)
            setTimeout(() => {
                window.location.href = "juegos/sumas-espaciales.html";
            }, 500);
        }
    </script>
</body>
</html>
