<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Tienda Galáctica | TLU</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo: #0c1445;
            --celeste: #48dbfb;
            --amarillo: #feca57;
            --rosa: #fd79a8;
            --blanco: #ffffff;
        }

        body {
            margin: 0; font-family: 'Fredoka', sans-serif;
            background: var(--fondo);
            background-image: radial-gradient(circle, #1b277a 0%, #0c1445 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px; border-radius: 40px;
            border: 3px solid var(--celeste);
            width: 90%; max-width: 500px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header h1 { color: var(--amarillo); margin: 0; font-size: 2rem; text-transform: uppercase; }
        
        .market-display {
            background: rgba(0, 0, 0, 0.4);
            padding: 25px; border-radius: 25px;
            margin: 20px 0; font-size: 1.3rem;
            border: 1px solid rgba(255,255,255,0.1);
            min-height: 120px; display: flex; flex-direction: column; justify-content: center;
        }

        .item-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .price { color: var(--amarillo); font-weight: 700; }

        input {
            width: 140px; padding: 15px; border-radius: 20px;
            border: 3px solid var(--celeste); background: #fff;
            font-size: 1.8rem; text-align: center; font-family: 'Fredoka';
            outline: none; transition: 0.3s;
        }

        .btn-check {
            background: var(--rosa); color: white; border: none;
            padding: 15px 40px; border-radius: 50px;
            font-size: 1.3rem; font-weight: 700; cursor: pointer;
            margin-top: 15px; transition: 0.3s;
            box-shadow: 0 6px 0 #d63031;
        }

        .btn-check:hover { transform: scale(1.05); }
        .btn-check:active { transform: translateY(6px); box-shadow: none; }

        .feedback { margin-top: 20px; font-size: 1.2rem; font-weight: 700; height: 30px; }
        
        .score-panel { position: absolute; top: 20px; right: 20px; font-size: 1.2rem; color: var(--amarillo); }
    </style>
</head>
<body>

    <div class="score-panel">🌟 Misiones: <span id="score">0</span></div>

    <div class="game-card">
        <div class="header">
            <h1>🛒 La Tienda</h1>
            <p id="mission-text">Calculando próxima venta...</p>
        </div>

        <div class="market-display" id="problem-area">
            </div>

        <div class="input-area">
            <input type="number" id="userAnswer" placeholder="0" autofocus>
            <br>
            <button class="btn-check" onclick="checkAnswer()">ENVIAR DATOS 🚀</button>
        </div>

        <div class="feedback" id="feedback"></div>

        <a href="../../juegos.html" style="color: white; opacity: 0.5; text-decoration: none; display: block; margin-top: 20px; font-size: 0.9rem;">⬅ Salir de la tienda</a>
    </div>

    <script>
        let currentAnswer = 0;
        let score = 0;

        const productos = [
            { n: "🍬 Chicle Galáctico", p: [50, 100, 150] },
            { n: "🍦 Helado Lunar", p: [200, 250, 300] },
            { n: "🍫 Barra de Asteroide", p: [80, 120, 160] },
            { n: "🥤 Soda de Supernova", p: [150, 180, 220] },
            { n: "🥪 Sándwich Cósmico", p: [300, 350, 400] }
        ];

        function generateProblem() {
            const problemArea = document.getElementById('problem-area');
            const missionText = document.getElementById('mission-text');
            const input = document.getElementById('userAnswer');
            document.getElementById('feedback').innerText = "";
            input.value = "";
            input.focus();

            const modoVuelto = Math.random() > 0.5;

            if (!modoVuelto) {
                // MODO SUMA: 2 productos aleatorios
                let p1 = productos[Math.floor(Math.random() * productos.length)];
                let p2 = productos[Math.floor(Math.random() * productos.length)];
                while(p1 === p2) p2 = productos[Math.floor(Math.random() * productos.length)];

                let precio1 = p1.p[Math.floor(Math.random() * p1.p.length)];
                let precio2 = p2.p[Math.floor(Math.random() * p2.p.length)];
                
                currentAnswer = precio1 + precio2;
                missionText.innerText = "¡Suma el total de la compra!";
                problemArea.innerHTML = `
                    <div class="item-row"><span>${p1.n}</span> <span class="price">$${precio1}</span></div>
                    <div class="item-row"><span>${p2.n}</span> <span class="price">$${precio2}</span></div>
                    <hr style="opacity: 0.2">
                    <strong>¿Total a pagar?</strong>
                `;
            } else {
                // MODO RESTA: Vuelto con 500
                let p = productos[Math.floor(Math.random() * productos.length)];
                let precio = p.p[Math.floor(Math.random() * p.p.length)];
                let pagoCon = 500;
                
                currentAnswer = pagoCon - precio;
                missionText.innerText = "¡Calcula el vuelto!";
                problemArea.innerHTML = `
                    <div class="item-row"><span>Total Compra:</span> <span class="price">$${precio}</span></div>
                    <div class="item-row"><span>Pagas con:</span> <span class="price" style="color:var(--celeste)">$${pagoCon}</span></div>
                    <hr style="opacity: 0.2">
                    <strong>¿Tu vuelto es?</strong>
                `;
            }
        }

        function checkAnswer() {
            const userVal = parseInt(document.getElementById('userAnswer').value);
            const feedback = document.getElementById('feedback');

            if (userVal === currentAnswer) {
                score++;
                document.getElementById('score').innerText = score;
                feedback.innerHTML = "¡EXCELENTE! ✨";
                feedback.style.color = var(--celeste);
                setTimeout(generateProblem, 1500);
            } else {
                feedback.innerHTML = "¡Casi! Revisa la cuenta 🛰️";
                feedback.style.color = var(--rosa);
            }
        }

        // Detectar tecla Enter
        document.getElementById('userAnswer').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkAnswer();
        });

        window.onload = generateProblem;
    </script>
</body>
</html>
