<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Orden Numérico - L-Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body { background: #060918; color: white; font-family: 'Montserrat', sans-serif; text-align: center; }
        .container { padding: 50px; }
        h1 { font-family: 'Fredoka One'; color: #feca57; }
        .numbers-container { display: flex; justify-content: center; gap: 20px; margin: 40px 0; min-height: 100px; }
        .number-box { background: #48dbfb; color: #060918; padding: 20px; border-radius: 15px; font-family: 'Fredoka One'; font-size: 2rem; cursor: grab; width: 60px; }
        .btn-check { background: #1dd1a1; border: none; padding: 15px 40px; border-radius: 50px; font-family: 'Fredoka One'; cursor: pointer; color: #060918; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Misión: Ordenar Números</h1>
        <p>Arrastra los números para ordenarlos de **MENOR a MAYOR**</p>
        
        <div class="numbers-container" id="game-board">
            </div>

        <button class="btn-check" onclick="checkOrder()">VERIFICAR SISTEMAS</button>
        <p id="msg"></p>
        <br>
        <a href="matematicas.html" style="color: white;">Volver</a>
    </div>

    <script>
        let numbers = [45, 12, 89, 3, 27].sort(() => Math.random() - 0.5);
        const board = document.getElementById('game-board');

        function render() {
            board.innerHTML = '';
            numbers.forEach((n, index) => {
                const div = document.createElement('div');
                div.className = 'number-box';
                div.innerText = n;
                div.draggable = true;
                div.ondragstart = (e) => e.dataTransfer.setData('text', index);
                div.ondragover = (e) => e.preventDefault();
                div.ondrop = (e) => {
                    const from = e.dataTransfer.getData('text');
                    const to = index;
                    [numbers[from], numbers[to]] = [numbers[to], numbers[from]];
                    render();
                };
                board.appendChild(div);
            });
        }

        function checkOrder() {
            const isCorrect = numbers.every((val, i) => i === 0 || val >= numbers[i - 1]);
            const msg = document.getElementById('msg');
            if (isCorrect) {
                msg.innerHTML = "✨ ¡EXCELENTE! Órbita estabilizada.";
                msg.style.color = "#1dd1a1";
            } else {
                msg.innerHTML = "❌ Los cálculos fallaron. ¡Intenta de nuevo!";
                msg.style.color = "#ff6b6b";
            }
        }
        render();
    </script>
</body>
</html>
