<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Revisión | The Learning Universe</title>
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; padding: 20px; }
        .review-panel { max-width: 800px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid var(--s); }
        .q-row { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        .correct { color: #1dd1a1; }
        .wrong { color: #ff6b6b; }
        .security-box { margin-top: 30px; background: #000; padding: 20px; border-radius: 15px; text-align: center; }
        input { padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid var(--s); background: transparent; color: white; }
    </style>
</head>
<body>
    <div class="review-panel">
        <h2 id="stName">Selecciona un Estudiante</h2>
        <select id="studentSelect" style="width:100%; padding:10px; margin-bottom:20px;">
            <option value="">-- Lista de Cadetes con Pruebas Enviadas --</option>
        </select>

        <div id="examContent"></div>

        <div class="security-box" id="footerRev" style="display:none;">
            <p>Ingresa el código de 6 dígitos de tu Inbox para calificar:</p>
            <input type="text" id="authCode" placeholder="Código">
            <input type="text" id="grade" placeholder="Nota Final (1.0 - 7.0)">
            <button id="btnSave" style="background:var(--s); padding:10px 20px; border:none; cursor:pointer; font-weight:bold;">GUARDAR NOTA</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* TU CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gID = new URLSearchParams(window.location.search).get('grupo');

        // FIX: Cargar lista de estudiantes que ENVIARON
        const q = query(collection(db, "grupos", gID, "miembros"), where("enviado", "==", true));
        onSnapshot(q, (snap) => {
            const select = document.getElementById('studentSelect');
            select.innerHTML = '<option value="">-- Selecciona un cadete para revisar --</option>';
            snap.forEach(d => {
                select.innerHTML += `<option value="${d.id}">${d.data().nombre}</option>`;
            });
        });

        document.getElementById('studentSelect').addEventListener('change', async (e) => {
            const uid = e.target.value;
            if(!uid) return;

            const tSnap = await getDoc(doc(db, "pruebas", gID));
            const mSnap = await getDoc(doc(db, "grupos", gID, "miembros", uid));
            
            const test = tSnap.data();
            const alum = mSnap.data();
            
            document.getElementById('stName').innerText = "Revisando a: " + alum.nombre;
            document.getElementById('footerRev').style.display = "block";
            
            let html = "";
            test.preguntas.forEach((q, i) => {
                const respAlum = alum.respuestasAlumno[i] || "NO RESPONDIDA";
                const esCorrecta = respAlum === q.correcta;
                html += `
                    <div class="q-row">
                        <p><b>${i+1}. ${q.pregunta}</b></p>
                        <p class="${esCorrecta ? 'correct' : 'wrong'}">Resp: ${respAlum} ${esCorrecta ? '✅' : '❌'}</p>
                        <p style="font-size:0.8rem; opacity:0.6">Correcta: ${q.correcta}</p>
                    </div>`;
            });
            document.getElementById('examContent').innerHTML = html;

            // Guardar Nota
            document.getElementById('btnSave').onclick = async () => {
                const gSnap = await getDoc(doc(db, "grupos", gID));
                if(document.getElementById('authCode').value !== gSnap.data().masterCode) {
                    return alert("Código incorrecto.");
                }
                await updateDoc(doc(db, "grupos", gID, "miembros", uid), {
                    nota: document.getElementById('grade').value
                });
                alert("Nota guardada.");
                location.reload();
            };
        });
    </script>
</body>
</html>
