<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calificar Cadete | The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        body { 
            background: var(--bg); color: white; font-family: 'Montserrat'; 
            padding: 40px 20px; margin: 0; min-height: 100vh;
        }
        .container { 
            max-width: 850px; margin: auto; background: rgba(255,255,255,0.03); 
            padding: 40px; border-radius: 25px; border: 1px solid rgba(72, 219, 251, 0.3);
            backdrop-filter: blur(10px);
        }
        h1 { font-family: 'Fredoka One'; color: var(--p); text-align: center; margin-bottom: 30px; }
        
        .q-item { 
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; 
            margin-bottom: 20px; border-left: 5px solid transparent;
        }
        .correct-border { border-left-color: #1dd1a1; }
        .wrong-border { border-left-color: #ff6b6b; }

        .answer-label { font-size: 0.85rem; opacity: 0.6; text-transform: uppercase; margin-top: 10px; }
        .answer-text { font-weight: 600; margin-bottom: 5px; }
        .status-tag { font-weight: bold; font-size: 0.9rem; }

        /* Panel de Calificación */
        .grade-panel { 
            margin-top: 40px; padding: 30px; background: rgba(254, 202, 87, 0.1); 
            border-radius: 20px; border: 1px solid var(--s); text-align: center;
        }
        .grade-panel input { 
            background: #000; border: 1px solid var(--s); color: white; 
            padding: 12px; border-radius: 10px; width: 150px; text-align: center; font-size: 1.1rem;
            margin: 10px;
        }
        .btn-save { 
            background: var(--s); color: #000; border: none; padding: 15px 40px; 
            border-radius: 50px; font-family: 'Fredoka One'; cursor: pointer; font-size: 1rem;
            transition: 0.3s;
        }
        .btn-save:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(254, 202, 87, 0.4); }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="cadeteName">REVISANDO MISIÓN</h1>
        <div id="examReview">Cargando datos del cadete...</div>

        <div class="grade-panel" id="panelCalificar" style="display:none;">
            <h2 style="font-family:'Fredoka One'; color:var(--s); margin-top:0;">CALIFICACIÓN FINAL</h2>
            <p>Ingresa el Código Maestro de tu Inbox y la nota obtenida.</p>
            <input type="text" id="authCode" placeholder="CÓDIGO SEG.">
            <input type="text" id="notaInput" placeholder="NOTA (0.0 - 7.0)">
            <br><br>
            <button class="btn-save" id="btnGuardar">PUBLICAR NOTA EN EL SISTEMA</button>
        </div>

        <center>
            <button onclick="location.href='view-teacher.html'" style="margin-top:30px; background:none; border:1px solid var(--p); color:var(--p); padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:bold;">
                ⬅ VOLVER AL RADAR
            </button>
        </center>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", 
            authDomain: "thelearninguniverse-26.firebaseapp.com", 
            projectId: "thelearninguniverse-26", 
            storageBucket: "thelearninguniverse-26.firebasestorage.app", 
            messagingSenderId: "85338996011", 
            appId: "1:85338996011:web:1f3bb216900c07e735596e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Obtenemos ID de grupo del storage y UID de la URL
        const gID = localStorage.getItem('currentGroup');
        const params = new URLSearchParams(window.location.search);
        const uID = params.get('uid');

        async function cargarRevision() {
            if (!uID || !gID) {
                alert("Error: No se encontró el cadete o el grupo.");
                window.location.href = "view-teacher.html";
                return;
            }

            try {
                const docAlumno = await getDoc(doc(db, "grupos", gID, "miembros", uID));
                const docPrueba = await getDoc(doc(db, "pruebas", gID));

                if (!docAlumno.exists() || !docPrueba.exists()) {
                    alert("Información no encontrada.");
                    return;
                }

                const alumno = docAlumno.data();
                const prueba = docPrueba.data();
                
                document.getElementById('cadeteName').innerText = "REVISANDO A: " + alumno.nombre.toUpperCase();
                document.getElementById('panelCalificar').style.display = "block";

                let htmlContent = "";
                prueba.preguntas.forEach((pregunta, index) => {
                    const respuestaAlumno = alumno.respuestasAlumno ? alumno.respuestasAlumno[index] : "No respondió";
                    const esCorrecta = respuestaAlumno === pregunta.correcta;

                    htmlContent += `
                        <div class="q-item ${esCorrecta ? 'correct-border' : 'wrong-border'}">
                            <p style="font-weight:bold;">${index + 1}. ${pregunta.pregunta}</p>
                            
                            <div class="answer-label">Respuesta del Cadete:</div>
                            <div class="answer-text">${respuestaAlumno}</div>
                            
                            <div class="answer-label">Respuesta Correcta:</div>
                            <div class="answer-text" style="color:var(--p)">${pregunta.correcta}</div>
                            
                            <div class="status-tag" style="color:${esCorrecta ? '#1dd1a1' : '#ff6b6b'}">
                                ${esCorrecta ? '✔ PUNTO OBTENIDO' : '✘ INCORRECTA'}
                            </div>
                        </div>
                    `;
                });

                document.getElementById('examReview').innerHTML = htmlContent;

            } catch (error) {
                console.error("Error cargando revisión:", error);
            }
        }

        document.getElementById('btnGuardar').onclick = async () => {
            const codigoIngresado = document.getElementById('authCode').value;
            const notaNueva = document.getElementById('notaInput').value;

            if (!codigoIngresado || !notaNueva) return alert("Completa todos los campos.");

            const docGrupo = await getDoc(doc(db, "grupos", gID));
            const masterCode = docGrupo.data().masterCode;

            if (codigoIngresado !== masterCode) {
                alert("❌ CÓDIGO DE SEGURIDAD INCORRECTO. Revisa tu Inbox.");
                return;
            }

            try {
                await updateDoc(doc(db, "grupos", gID, "miembros", uID), {
                    nota: notaNueva
                });
                alert("🚀 NOTA PUBLICADA CON ÉXITO");
                window.location.href = "view-teacher.html";
            } catch (e) {
                alert("Error al guardar nota.");
            }
        };

        cargarRevision();
    </script>
</body>
</html>
