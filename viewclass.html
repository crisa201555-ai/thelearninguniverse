<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Clase | The Learning Universe</title>
    <style>
        body { background: #060918; color: white; font-family: sans-serif; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; padding: 20px; }
        #chat { background: rgba(0,0,0,0.4); height: 500px; overflow-y: auto; padding: 15px; border-radius: 15px; border: 1px solid #48dbfb; }
        .msg { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid #48dbfb; }
        .controls { margin-top: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: none; }
        .sidebar { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-test { width: 100%; padding: 15px; background: #feca57; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div>
        <h2 id="className">Cargando Clase...</h2>
        <div id="chat"></div>
        <div class="controls">
            <input type="text" id="msg" placeholder="Escribe al grupo...">
            <button id="send" style="padding:10px 20px; background:#48dbfb; border:none; border-radius:10px; cursor:pointer;">ENVIAR</button>
        </div>
    </div>
    
    <div class="sidebar">
        <h3>Estado del Estudiante</h3>
        <p id="userEmail">Usuario: ...</p>
        <hr>
        <div id="gradeBox" style="font-size: 1.2rem; color: #feca57;">Nota Actual: Pendiente</div>
        <button id="btnTest" class="btn-test" style="display:none;" onclick="location.href='take-test.html'">REALIZAR PRUEBA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const gID = localStorage.getItem('currentGroup');

        onAuthStateChanged(auth, async (user) => {
            if(!user) return window.location.href = "login.html";
            document.getElementById('userEmail').innerText = "Usuario: " + user.email;

            // Cargar info del grupo
            const gSnap = await getDoc(doc(db, "grupos", gID));
            if(gSnap.exists()) document.getElementById('className').innerText = "Grupo: " + gSnap.data().nombreGrupo;

            // Chat en tiempo real
            const q = query(collection(db, "grupos", gID, "chat"), orderBy("time", "asc"));
            onSnapshot(q, snap => {
                const box = document.getElementById('chat');
                box.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    box.innerHTML += `<div class="msg"><b>${data.u.split('@')[0]}:</b> ${data.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            // Verificar Nota y Prueba
            const mSnap = await getDoc(doc(db, "grupos", gID, "miembros", user.uid));
            if(mSnap.exists()) document.getElementById('gradeBox').innerText = "Nota Actual: " + mSnap.data().nota;

            const tSnap = await getDoc(doc(db, "pruebas", gID));
            if(tSnap.exists() && tSnap.data().activa) document.getElementById('btnTest').style.display = "block";
        });

        document.getElementById('send').addEventListener('click', async () => {
            const m = document.getElementById('msg').value;
            if(!m) return;
            await addDoc(collection(db, "grupos", gID, "chat"), {
                u: auth.currentUser.email,
                t: m,
                time: Date.now()
            });
            document.getElementById('msg').value = "";
        });
    </script>
</body>
</html>
