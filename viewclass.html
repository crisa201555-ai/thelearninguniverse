<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Mi Clase</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --accent: #fd79a8;
            --dark-bg: #0f172a;
            --danger: #ff7675;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Fredoka', sans-serif;
            background: var(--dark-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .class-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--secondary);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        h1 { color: var(--secondary); margin-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.8; }

        .class-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            margin: 30px 0;
        }

        .btn-leave {
            background: var(--danger);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-leave:hover {
            transform: scale(1.05);
            background: #d63031;
            box-shadow: 0 0 20px rgba(255, 118, 117, 0.4);
        }

        .btn-back {
            display: block;
            margin-top: 20px;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="class-card">
        <h1>🚀 Mi Clase Activa</h1>
        <p>¡Qué bueno verte de nuevo por aquí!</p>

        <div class="class-info">
            <h2 id="className">Cargando clase...</h2>
            <p>Profesor: <span id="teacherName">...</span></p>
        </div>

        <button class="btn-leave" onclick="leaveClass()">❌ Abandonar la clase</button>
        
        <a href="home.html" class="btn-back">Volver al Home</a>
    </div>

    <script>
        // 1. VALIDACIÓN AL ENTRAR
        window.onload = function() {
            // Simulamos buscar una clase guardada (usando localStorage)
            const activeClass = localStorage.getItem('userClass');

            if (!activeClass) {
                // Si no hay clase, alerta y para el home
                alert("⚠️ ¡Ups! No tienes ninguna clase asignada todavía.");
                window.location.href = "home.html";
            } else {
                // Si hay clase, mostramos los datos
                document.getElementById('className').innerText = activeClass;
                document.getElementById('teacherName').innerText = "Profesor Galáctico";
            }
        };

        // 2. FUNCIÓN PARA ABANDONAR LA CLASE
        function leaveClass() {
            if (confirm("¿Estás seguro de que quieres abandonar esta clase? 😢")) {
                // Borramos la clase del "sistema"
                localStorage.removeItem('userClass');
                alert("Has abandonado la clase correctamente.");
                window.location.href = "home.html";
            }
        }

        // --- NOTA PARA PRUEBAS ---
        // Para probar que funciona la entrada, puedes escribir esto en la consola:
        // localStorage.setItem('userClass', 'Matemáticas Espaciales');
    </script>
</body>
</html>
