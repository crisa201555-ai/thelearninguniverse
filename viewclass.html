<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sector de Clase | The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        body { background: var(--bg); color: white; font-family: 'Montserrat'; margin: 0; display: grid; grid-template-columns: 300px 1fr; height: 100vh; }
        
        /* Lateral */
        .sidebar { background: rgba(0,0,0,0.4); border-right: 1px solid rgba(72, 219, 251, 0.2); padding: 20px; display: flex; flex-direction: column; }
        .status-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--p); text-align: center; }
        
        /* Chat */
        .chat-container { display: flex; flex-direction: column; height: 100vh; }
        .chat-header { padding: 20px; background: rgba(72, 219, 251, 0.1); font-family: 'Fredoka One'; color: var(--p); border-bottom: 1px solid rgba(72, 219, 251, 0.2); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { background: rgba(255,255,255,0.07); padding: 10px 15px; border-radius: 15px; max-width: 70%; position: relative; }
        .bubble.me { align-self: flex-end; background: rgba(72, 219, 251, 0.2); border: 1px solid var(--p); }
        .bubble b { display: block; font-size: 0.7rem; color: var(--s); margin-bottom: 4px; }

        .chat-input { padding: 20px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: #111; border: 1px solid var(--p); color: white; padding: 15px; border-radius: 10px; outline: none; }
        .btn-send { background: var(--p); border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-family: 'Fredoka One'; }

        .btn-test { background: var(--s); color: #000; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-family: 'Fredoka One'; width: 100%; margin-top: 15px; }
        .btn-sos { background: #ff6b6b; color: #fff; border: none; padding: 10px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="status-card">
            <p id="userMail" style="font-size: 0.8rem; opacity: 0.6;">Cargando...</p>
            <h2 id="myGrade">Nota: --</h2>
            <div id="testArea">
                <button class="btn-test" id="btnGoTest" style="display:none;" onclick="location.href='take-test.html'">INICIAR PRUEBA</button>
            </div>
            <button class="btn-sos" id="btnSOS">🚨 HABLAR CON DOCENTE</button>
        </div>
        <h3 style="margin-top:30px; font-family:'Fredoka One'; font-size:1rem; color:var(--p)">CADETES ONLINE</h3>
        <div id="onlineList" style="font-size: 0.9rem; opacity: 0.8;"></div>
        <button onclick="location.href='home.html'" style="margin-top:auto; background:none; color:white; border:1px solid #555; padding:10px; cursor:pointer; border-radius:10px;">🏠 Volver al Home</button>
    </div>

    <div class="chat-container">
        <div class="chat-header" id="className">CONECTANDO AL SECTOR...</div>
        <div id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chatMsg" placeholder="Escribe un mensaje y presiona Enter...">
            <button class="btn-send" id="btnSend">ENVIAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", 
            authDomain: "thelearninguniverse-26.firebaseapp.com", 
            projectId: "thelearninguniverse-26", 
            storageBucket: "thelearninguniverse-26.firebasestorage.app", 
            messagingSenderId: "85338996011", 
            appId: "1:85338996011:web:1f3bb216900c07e735596e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // LEER ID DESDE STORAGE (Para no usar ?grupo=O45TP)
        const gID = localStorage.getItem('currentGroup');

        onAuthStateChanged(auth, async (user) => {
            if(!user || !gID) return window.location.href = "home.html";
            document.getElementById('userMail').innerText = user.email;

            // 1. Cargar nombre de clase
            const gSnap = await getDoc(doc(db, "grupos", gID));
            document.getElementById('className').innerText = "SECTOR: " + gSnap.data().nombreGrupo;

            // 2. Verificar Estado de Prueba y Nota (Realtime)
            onSnapshot(doc(db, "grupos", gID, "miembros", user.uid), (d) => {
                const me = d.data();
                document.getElementById('myGrade').innerText = "Nota: " + (me.nota || "Pendiente");
                
                // Solo mostrar botón si no ha enviado y la prueba está activa
                onSnapshot(doc(db, "pruebas", gID), (t) => {
                    const test = t.data();
                    if(test && test.activa && !me.enviado) {
                        document.getElementById('btnGoTest').style.display = "block";
                    } else {
                        document.getElementById('btnGoTest').style.display = "none";
                    }
                });
            });

            // 3. Chat Realtime
            const qChat = query(collection(db, "grupos", gID, "chat"), orderBy("time", "asc"));
            onSnapshot(qChat, (snap) => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.uid === user.uid;
                    box.innerHTML += `<div class="bubble ${isMe?'me':''}"><b>${m.name}</b>${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            // Enviar Mensaje
            const send = async () => {
                const text = document.getElementById('chatMsg').value.trim();
                if(!text) return;
                document.getElementById('chatMsg').value = "";
                await addDoc(collection(db, "grupos", gID, "chat"), {
                    uid: user.uid, name: user.email.split('@')[0], text: text, time: Date.now()
                });
            };
            document.getElementById('btnSend').onclick = send;
            document.getElementById('chatMsg').onkeypress = (e) => { if(e.key==='Enter') send(); };

            // SOS
            document.getElementById('btnSOS').onclick = async () => {
                const msg = prompt("¿Qué necesitas decirle al docente?");
                if(msg) {
                    await addDoc(collection(db, "grupos", gID, "alertas"), {
                        estudiante: user.email, mensaje: msg, fecha: Date.now()
                    });
                    alert("Alerta enviada al radar docente.");
                }
            };
        });
    </script>
</body>
</html>
