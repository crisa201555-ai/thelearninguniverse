<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Aula Virtual</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --bg: #0f172a; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; display: grid; grid-template-columns: 1fr 300px; height: 100vh; margin: 0; }
        .chat-area { display: flex; flex-direction: column; padding: 20px; }
        #chatBox { flex-grow: 1; overflow-y: auto; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; margin-bottom: 10px; }
        .sidebar { background: rgba(0,0,0,0.3); padding: 20px; border-left: 1px solid var(--p); }
        .btn-tests { background: var(--s); color: #004d3b; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-area">
        <div id="chatBox"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="msgIn" style="flex-grow:1; padding:10px; border-radius:10px; border:none;">
            <button onclick="enviar()">Enviar</button>
        </div>
    </div>
    <div class="sidebar">
        <h3>🟢 Conectados</h3>
        <div id="onlineList" style="margin-bottom: 30px;"></div>
        <button class="btn-tests" onclick="window.location.href='activetests.html'">VER PRUEBAS ACTIVAS 📋</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gid = localStorage.getItem('activeGroupId');
        const userEmail = "estudiante@ejemplo.com"; // Aquí iría el email del login

        window.enviar = async () => {
            const txt = document.getElementById('msgIn').value;
            if(!txt) return;
            await addDoc(collection(db, "messages"), { groupId: gid, sender: userEmail, text: txt, time: serverTimestamp() });
            document.getElementById('msgIn').value = "";
        };

        onSnapshot(query(collection(db, "messages"), where("groupId", "==", gid), orderBy("time", "asc")), (snap) => {
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            snap.forEach(d => {
                box.innerHTML += `<p><b>${d.data().sender}:</b> ${d.data().text}</p>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        onSnapshot(query(collection(db, "members"), where("groupId", "==", gid), where("online", "==", true)), (snap) => {
            const list = document.getElementById('onlineList');
            list.innerHTML = snap.docs.map(d => `<p>🟢 ${d.data().email}</p>`).join('');
        });
    </script>
</body>
</html>
