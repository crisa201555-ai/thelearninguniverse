<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clase | The Learning Universe</title>
    <style>
        body { background: #060918; color: white; font-family: sans-serif; display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 15px; padding: 20px; }
        .panel { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid #48dbfb; }
        #chat { height: 400px; overflow-y: auto; border-bottom: 1px solid #48dbfb; margin-bottom: 10px; }
        .user-link { display: block; padding: 10px; color: #feca57; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .user-link:hover { background: rgba(72, 219, 251, 0.1); }
        input { width: 70%; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>Mi Estado</h3>
        <p id="myEmail">Cargando...</p>
        <button id="btnTest" style="display:none; width:100%; background:#feca57; padding:10px; border:none; border-radius:10px; cursor:pointer;" onclick="location.href='take-test.html'">HACER PRUEBA</button>
    </div>

    <div class="panel">
        <h2 id="className">Clase</h2>
        <div id="chat"></div>
        <input type="text" id="msg" placeholder="Escribe un mensaje...">
        <button id="send">ENVIAR</button>
    </div>

    <div class="panel">
        <h3>Compañeros</h3>
        <div id="userList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const gID = localStorage.getItem('currentGroup');

        onAuthStateChanged(auth, async user => {
            if(!user) return;
            document.getElementById('myEmail').innerText = user.email;
            
            // Cargar Miembros
            onSnapshot(collection(db, "grupos", gID, "miembros"), snap => {
                const list = document.getElementById('userList');
                list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    const a = document.createElement('a');
                    a.className = "user-link";
                    a.innerText = u.nombre;
                    a.onclick = () => { window.location.href = `activetests.html?uid=${d.id}&grupo=${gID}`; };
                    list.appendChild(a);
                });
            });

            // Verificar Prueba
            const tSnap = await getDoc(doc(db, "pruebas", gID));
            if(tSnap.exists() && tSnap.data().activa) document.getElementById('btnTest').style.display = "block";
        });

        // Chat y Nombre de Clase (Igual al anterior...)
    </script>
</body>
</html>
