<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rescate - The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --fondo: #0c1445; --rojo: #ff6b6b; --celeste: #48dbfb; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--fondo); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); padding: 40px; border-radius: 35px; border: 2px solid var(--rojo); width: 100%; max-width: 380px; text-align: center; color: white; box-shadow: 0 15px 40px rgba(255, 107, 107, 0.2); }
        .logo { font-family: 'Fredoka One'; font-size: 2.2rem; color: var(--rojo); margin-bottom: 15px; }
        input { width: 100%; padding: 14px 20px; margin-bottom: 20px; border-radius: 50px; border: none; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; background: var(--rojo); color: white; font-family: 'Fredoka One'; font-size: 1.1rem; cursor: pointer; box-shadow: 0 5px 0 #b33939; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .status { margin-top: 20px; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">RESCATE</div>
        <p style="margin-bottom: 25px; opacity: 0.9;">Escribe tu correo para que la base central te envíe una nueva llave.</p>
        <input type="email" id="email" placeholder="tu-correo@espacial.com">
        <button class="btn" id="resetBtn">ENVIAR SEÑAL</button>
        <div id="status" class="status"></div>
        <a href="login.html" style="color:var(--celeste); text-decoration:none; display:block; margin-top:20px; font-size:0.8rem;">← Volver al Centro de Mando</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI",
            authDomain: "thelearninguniverse-26.firebaseapp.com",
            projectId: "thelearninguniverse-26",
            storageBucket: "thelearninguniverse-26.firebasestorage.app",
            messagingSenderId: "85338996011",
            appId: "1:85338996011:web:1f3bb216900c07e735596e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('resetBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const status = document.getElementById('status');
            try {
                await sendPasswordResetEmail(auth, email);
                status.style.color = "#1dd1a1";
                status.innerText = "✅ ¡Señal enviada! Revisa tu bandeja de entrada.";
            } catch (error) {
                status.style.color = "#ff6b6b";
                status.innerText = "❌ Error: " + error.code;
            }
        });
    </script>
</body>
</html>
