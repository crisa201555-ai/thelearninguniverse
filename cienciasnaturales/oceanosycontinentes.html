<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ciencias | Océanos y Continentes</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-blue: #0ea5e9; --p-pink: #f472b6; --bg: #0f172a; --card-bg: #1e293b; }
        body { margin: 0; font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; transition: 0.8s; }
        body.focus-mode { background: #0f172a; --accent: var(--p-blue); }
        body.twice-mode { background: #1a0a14; --accent: var(--p-pink); }
        .header-img { height: 30vh; width: 100%; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; position: relative; }
        .header-img::after { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
        .container { max-width: 900px; margin: -40px auto 100px; background: var(--card-bg); padding: 50px; border-radius: 40px; position: relative; z-index: 10; border: 1px solid rgba(255,255,255,0.1); }
        .grid-labels { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
        .label-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--accent); color: white; padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .label-btn:hover { background: var(--accent); transform: scale(1.05); }
        .btn-finish { width: 100%; padding: 22px; border-radius: 25px; border: none; background: var(--accent); color: white; font-weight: 700; font-size: 1.4rem; cursor: pointer; margin-top: 40px; }
    </style>
</head>
<body id="mainBody">
    <audio id="finishSound" src="https://thelearninguniverses.pages.dev/takedown.mp3"></audio>
    <div class="header-img" id="hero"><h1 style="position:relative; z-index:2;">Océanos y Continentes</h1></div>
    <div class="container">
        <h2>Explora el Mundo</h2>
        <div id="display" style="background:rgba(0,0,0,0.2); padding:20px; border-radius:20px; text-align:center; border:1px solid var(--accent);">
            <h3 id="display-title" style="color:var(--accent);">Selecciona un lugar</h3>
            <p id="display-desc">Haz clic en los botones de abajo.</p>
        </div>
        <h3>Continentes</h3>
        <div class="grid-labels">
            <button class="label-btn" onclick="show('América', 'El continente donde estamos.')">🌎 América</button>
            <button class="label-btn" onclick="show('Antártida', 'Hielo puro y pingüinos.')">🐧 Antártida</button>
        </div>
        <button class="btn-finish" onclick="playAndFinish()">FINALIZAR MISIÓN</button>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const sound = document.getElementById('finishSound');
        if (mode === 'twice') {
            document.body.classList.add('twice-mode');
            document.getElementById('hero').style.backgroundImage = "url('https://thelearninguniverses.pages.dev/twice_classroom.jpg')";
        } else {
            document.body.classList.add('focus-mode');
            document.getElementById('hero').style.backgroundImage = "url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000')";
        }
        function show(t, d) { document.getElementById('display-title').innerText = t; document.getElementById('display-desc').innerText = d; }
        function playAndFinish() {
            sound.play();
            alert("Misión completada!");
            setTimeout(() => { location.href = '../cienciasnaturales.html'; }, 800);
        }
    </script>
</body>
</html>
