<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLU | Océanos y Continentes</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ocean: #0f172a;
            --twice-pink: #ff5fa2;
            --twice-apricot: #fcc89b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--ocean);
            background: radial-gradient(circle at center, #1e3a8a 0%, #0f172a 100%);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- CONTENIDO DE LA LECCIÓN --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px 250px; /* Margen abajo para que no tapen las fotos */
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h1 { color: var(--twice-apricot); font-size: 2.5rem; }
        p { line-height: 1.6; font-size: 1.1rem; opacity: 0.9; }

        /* --- SISTEMA DE PERSONAJES TWICE --- */
        .twice-container {
            position: fixed;
            bottom: -300px; /* Escondidas al inicio */
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 5%;
            pointer-events: none;
            z-index: 1000;
            transition: bottom 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .twice-container.show {
            bottom: -20px; /* Suben hasta aquí */
        }

        .character-box {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
        }

        .img-twice {
            width: 280px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            cursor: pointer;
        }

        /* Burbujas de texto */
        .bubble {
            background: white;
            color: #1e293b;
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            opacity: 0;
            transform: scale(0.8);
            transition: 0.3s ease;
            max-width: 200px;
            position: relative;
        }

        .bubble.active {
            opacity: 1;
            transform: scale(1);
        }

        .bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid white;
        }

        .btn-next {
            background: var(--twice-pink);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            font-family: 'Fredoka';
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Océanos y Continentes</h1>
            <p>¡Bienvenido! Hoy vamos a explorar las grandes masas de agua y tierra de nuestro planeta.</p>
            <hr style="opacity: 0.1; margin: 30px 0;">
            <div id="content">
                <h3>🌊 El Océano Pacífico</h3>
                <p>Es el océano más grande de la Tierra. ¡Ocupa la tercera parte de toda la superficie del planeta!</p>
            </div>
            <button class="btn-next" onclick="nextLesson()">Siguiente dato...</button>
        </div>
    </div>

    <div class="twice-container" id="twiceUI">
        <div class="character-box" onclick="speak('mina')">
            <div class="bubble" id="bubble-mina"></div>
            <img src="/mina.png" class="img-twice">
        </div>

        <div class="character-box" onclick="speak('sana')">
            <div class="bubble" id="bubble-sana"></div>
            <img src="/sana.png" class="img-twice">
        </div>
    </div>

    <script>
        // Mensajes Aleatorios
        const minaQuotes = [
            "¿Sabías que el agua cubre el 70% de la Tierra? ✨",
            "Mantén la calma y sigue aprendiendo. ¡Lo haces genial!",
            "El Océano Antártico es el más frío de todos. ❄️",
            "¡Qué elegancia al estudiar! Sigue así. ✨"
        ];

        const sanaQuotes = [
            "¡Shy Shy Shy! ¡Vas muy rápido, genio! 🍭",
            "¡Hwaiting! ¡Tú puedes con los 6 continentes! 🔥",
            "¡No olvides el Océano Índico, es muy cálido! ☀️",
            "¡Eres el mejor alumno del universo! 🍭"
        ];

        // Función para que hablen
        function speak(member) {
            const bubble = document.getElementById(`bubble-${member}`);
            const quotes = member === 'mina' ? minaQuotes : sanaQuotes;
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            
            bubble.innerText = randomQuote;
            bubble.classList.add('active');
            
            setTimeout(() => {
                bubble.classList.remove('active');
            }, 4000);
        }

        // Animación de entrada al cargar
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('twiceUI').classList.add('show');
            }, 800);
        }

        function nextLesson() {
            // Aquí puedes cambiar el texto del div 'content' para avanzar
            alert("¡Mina y Sana están orgullosas de tu progreso!");
        }
    </script>
</body>
</html>
