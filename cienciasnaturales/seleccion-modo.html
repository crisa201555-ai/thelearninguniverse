<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración de Interfaz</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; background: #020617; color: white; font-family: 'Fredoka', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        .modes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 800px; width: 90%; }
        .mode-card {
            background: rgba(255,255,255,0.02); border: 2px solid rgba(255,255,255,0.1); padding: 50px 30px;
            border-radius: 40px; cursor: pointer; transition: 0.4s; text-align: center;
        }
        .focus:hover { border-color: #0ea5e9; background: rgba(14, 165, 233, 0.05); transform: translateY(-10px); }
        .twice:hover { border-color: #f472b6; background: rgba(244, 114, 182, 0.05); transform: translateY(-10px); }
        .icon { font-size: 4rem; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>ELIGE TU INTERFAZ</h1>
    <div class="modes-grid">
        <div class="mode-card focus" onclick="setMode('focus')">
            <span class="icon">🛰️</span>
            <h3>MODO FOCUS</h3>
        </div>
        <div class="mode-card twice" onclick="setMode('twice')">
            <span class="icon">🍭</span>
            <h3>MODO TWICE</h3>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lessonName = urlParams.get('lesson');

        function setMode(mode) {
            // Se queda en la misma carpeta para buscar la lección
            location.href = `${lessonName}.html?mode=${mode}`;
        }
    </script>
</body>
</html>
