<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLU | Configuración</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --twice: #ff5fa2; --bg: #0f172a; }
        body {
            background: var(--bg); color: white; font-family: 'Fredoka', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        .config-card {
            background: rgba(255, 255, 255, 0.03); padding: 50px; border-radius: 40px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; max-width: 500px; width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        .mode-options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 35px 0; }
        .mode-btn {
            padding: 25px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-family: 'Fredoka';
        }
        .mode-btn:hover { transform: translateY(-10px); background: rgba(255,255,255,0.1); }
        .mode-btn.active-none { border-color: var(--p); background: rgba(108, 92, 231, 0.2); }
        .mode-btn.active-twice { border-color: var(--twice); background: rgba(255, 95, 162, 0.2); }
        
        .start-btn {
            background: #00cec9; color: #0f172a; border: none; padding: 18px;
            border-radius: 50px; font-weight: 700; cursor: pointer; width: 100%;
            font-size: 1.2rem; transition: 0.3s; box-shadow: 0 10px 20px rgba(0, 206, 201, 0.2);
        }
        .start-btn:hover { transform: scale(1.02); background: white; }
    </style>
</head>
<body>

    <div class="config-card">
        <h1>Modo de Estudio</h1>
        <p style="opacity: 0.7;">Personaliza tu entorno de aprendizaje</p>
        
        <div class="mode-options">
            <button class="mode-btn" id="m-none" onclick="setMode('none')">
                <div style="font-size: 2.5rem; margin-bottom: 10px;">🌑</div>
                <b>Clásico</b><br><small>Foco total</small>
            </button>
            <button class="mode-btn" id="m-twice" onclick="setMode('twice')">
                <div style="font-size: 2.5rem; margin-bottom: 10px;">🍭</div>
                <b>TWICE</b><br><small>Con Mina y Sana</small>
            </button>
        </div>

        <button class="start-btn" onclick="start()">¡Comenzar ahora!</button>
    </div>

    <script>
        let mode = 'none';
        function setMode(m) {
            mode = m;
            document.getElementById('m-none').className = 'mode-btn' + (m === 'none' ? ' active-none' : '');
            document.getElementById('m-twice').className = 'mode-btn' + (m === 'twice' ? ' active-twice' : '');
        }
        function start() {
            window.location.href = `oceanosycontinentes.html?classNumber=1&mode=${mode}`;
        }
        setMode('none'); // Default
    </script>
</body>
</html>
