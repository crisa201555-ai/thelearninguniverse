<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración | TLU</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo: #0c1445;
            --celeste: #48dbfb;
            --amarillo: #feca57;
            --morado: #6c5ce7;
            --blanco: #ffffff;
        }

        body {
            margin: 0; font-family: 'Fredoka', sans-serif;
            background: var(--fondo);
            background-image: radial-gradient(circle at center, #1b277a 0%, #0c1445 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            color: white;
        }

        .config-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px; border-radius: 35px;
            border: 2px solid var(--celeste);
            width: 90%; max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { color: var(--amarillo); text-align: center; margin-bottom: 30px; font-size: 2rem; }

        .setting-group {
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px; border-radius: 20px;
        }

        .setting-group label {
            display: block; margin-bottom: 15px;
            font-weight: 700; color: var(--celeste); font-size: 1.1rem;
        }

        /* Estilo del Selector */
        select {
            width: 100%; padding: 12px; border-radius: 12px;
            background: var(--fondo); color: white;
            border: 2px solid var(--morado); font-family: 'Fredoka';
            font-size: 1rem; outline: none; cursor: pointer;
        }

        .btn-save {
            width: 100%; padding: 15px; border-radius: 50px;
            border: none; background: var(--morado); color: white;
            font-weight: 700; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }

        .btn-save:hover { transform: scale(1.05); background: #5b4bc4; }

        .back-link {
            display: block; text-align: center; margin-top: 20px;
            color: white; opacity: 0.6; text-decoration: none; font-size: 0.9rem;
        }

        /* Efecto de guardado exitoso */
        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--celeste); color: var(--fondo);
            padding: 10px 30px; border-radius: 50px; font-weight: 700;
            display: none; animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    </style>
</head>
<body>

    <div class="config-card">
        <h1>⚙️ Configuración</h1>

        <div class="setting-group">
            <label>🌎 Idioma Global / Language</label>
            <select id="languageSelect">
                <option value="es">Español (Chile)</option>
                <option value="en">English (US)</option>
                <option value="pt">Português (Brasil)</option>
            </select>
        </div>

        <div class="setting-group">
            <label>🎧 Efectos de Sonido</label>
            <select id="soundSettings">
                <option value="on">Activados</option>
                <option value="off">Desactivados</option>
            </select>
        </div>

        <button class="btn-save" onclick="saveSettings()">GUARDAR CAMBIOS 🚀</button>
        
        <a href="home.html" class="back-link">⬅ Volver al Centro de Mando</a>
    </div>

    <div id="toast">¡Ajustes guardados con éxito!</div>

    <script>
        // Cargar ajustes guardados al abrir
        window.onload = function() {
            const savedLang = localStorage.getItem('selectedLang') || 'es';
            const savedSound = localStorage.getItem('soundSetting') || 'on';
            
            document.getElementById('languageSelect').value = savedLang;
            document.getElementById('soundSettings').value = savedSound;
        };

        function saveSettings() {
            const lang = document.getElementById('languageSelect').value;
            const sound = document.getElementById('soundSettings').value;

            // Guardamos en LocalStorage para que afecte a todas las páginas
            localStorage.setItem('selectedLang', lang);
            localStorage.setItem('soundSetting', sound);

            // Mostrar aviso de éxito
            const toast = document.getElementById('toast');
            toast.style.display = "block";
            
            setTimeout(() => {
                toast.style.display = "none";
                // Redirigir o recargar para aplicar traducción
                window.location.href = "home.html";
            }, 1500);
        }
    </script>
</body>
</html>
