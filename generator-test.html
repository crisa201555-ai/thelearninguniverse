<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador | TLU</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        body { background: var(--bg); color: white; font-family: 'Montserrat'; padding: 30px; }
        .container { max-width: 700px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn-pub { background: var(--p); color: #000; border: none; padding: 20px; border-radius: 10px; font-family: 'Fredoka One'; cursor: pointer; width: 100%; margin-top: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="font-family:'Fredoka One'; color:var(--s)">CREAR MISIÓN</h1>
        <input type="text" id="testName" placeholder="Nombre de la Prueba">
        <input type="date" id="testDate">
        <div style="margin:15px 0;">
            <input type="checkbox" id="aiHelp" style="width:auto;"> Habilitar Pistas de IA
        </div>
        <div id="qContainer"></div>
        <button onclick="addQ()" style="cursor:pointer; background:none; color:var(--p); border:none;">+ Añadir Pregunta</button>
        
        <button class="btn-pub" id="btnSave">PUBLICAR Y IR AL RADAR</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* TU CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gID = localStorage.getItem('currentGroup');

        window.addQ = () => {
            const d = document.createElement('div');
            d.className = "q-block";
            d.innerHTML = `
                <input type="text" class="p-txt" placeholder="Pregunta">
                <input type="number" class="pts" placeholder="Puntos" style="width:100px" value="1">
                <input type="text" class="opt" placeholder="Opción A">
                <input type="text" class="opt" placeholder="Opción B">
                <select class="correct"><option value="A">A</option><option value="B">B</option></select>
                <input type="text" class="hint" placeholder="Pista de IA">
                <hr style="opacity:0.1">
            `;
            document.getElementById('qContainer').appendChild(d);
        };

        document.getElementById('btnSave').onclick = async () => {
            const preguntas = [];
            document.querySelectorAll('.q-block').forEach(b => {
                preguntas.push({
                    pregunta: b.querySelector('.p-txt').value,
                    puntos: b.querySelector('.pts').value,
                    correcta: b.querySelector('.correct').value,
                    pista: b.querySelector('.hint').value,
                    opciones: [b.querySelectorAll('.opt')[0].value, b.querySelectorAll('.opt')[1].value]
                });
            });

            await setDoc(doc(db, "pruebas", gID), {
                nombrePrueba: document.getElementById('testName').value,
                fecha: document.getElementById('testDate').value,
                aiHabilitada: document.getElementById('aiHelp').checked,
                preguntas: preguntas,
                activa: true
            });

            alert("Prueba publicada. Entrando al Radar Docente...");
            window.location.href = "view-teacher.html";
        };

        addQ();
    </script>
</body>
</html>
