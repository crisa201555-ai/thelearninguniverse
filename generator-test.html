<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador | TLU</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        body { background: var(--bg); color: white; font-family: 'Montserrat'; padding: 30px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid var(--p); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn-add-q { background: none; border: 2px dashed var(--p); color: var(--p); padding: 20px; width: 100%; border-radius: 15px; cursor: pointer; font-family: 'Fredoka One'; }
        .btn-pub { background: var(--s); color: #000; border: none; padding: 20px; width: 100%; border-radius: 15px; font-family: 'Fredoka One'; cursor: pointer; margin-top: 20px; font-size: 1.2rem; }
        .q-preview { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--s); }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="font-family:'Fredoka One'; text-align:center;">CONFIGURAR PRUEBA</h1>
        
        <div class="card">
            <input type="text" id="testName" placeholder="Nombre de la Prueba (Obligatorio)">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>APARICIÓN</label><input type="date" id="dS"><input type="time" id="tS"></div>
                <div><label>CIERRE</label><input type="date" id="dE"><input type="time" id="tE"></div>
            </div>
        </div>

        <div id="qBox"></div>
        <button class="btn-add-q" onclick="lanzarSecuencia()">🚀 AÑADIR PREGUNTA (PASO A PASO)</button>
        <button class="btn-pub" onclick="publicar()">PUBLICAR MISIÓN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const gID = localStorage.getItem('currentGroup');
        let preguntas = [];

        window.lanzarSecuencia = () => {
            const q = prompt("PASO 1: Pregunta:"); if(!q) return;
            let n = parseInt(prompt("PASO 2: ¿Cuántas opciones? (Máx 5):", "2"));
            let opts = [];
            for(let i=1; i<=n; i++) opts.push(prompt(`PASO ${2+i}: Respuesta ${i}:`));
            let pts = parseFloat(prompt("PASO 8: Puntos:", "1"));
            let correct = parseInt(prompt(`FINAL: ¿Cuál es la correcta? (1 a ${n}):`));

            preguntas.push({titulo: q, opciones: opts, puntos: pts, correcta: correct});
            dibujar();
        };

        function dibujar() {
            const box = document.getElementById('qBox');
            box.innerHTML = "";
            preguntas.forEach((item, i) => {
                box.innerHTML += `<div class="q-preview"><b>${i+1}. ${item.titulo}</b> (${item.puntos} pts)</div>`;
            });
        }

        window.publicar = async () => {
            const name = document.getElementById('testName').value;
            if(!name || preguntas.length === 0) return alert("Completa los datos");

            await db.collection("pruebas").doc(gID).set({
                nombre: name,
                inicio: document.getElementById('dS').value + " " + document.getElementById('tS').value,
                fin: document.getElementById('dE').value + " " + document.getElementById('tE').value,
                preguntas: preguntas,
                activa: true
            });
            alert("Publicado");
            location.href = "view-teacher.html";
        };
    </script>
</body>
</html>
