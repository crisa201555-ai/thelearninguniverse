<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Pruebas | TLU</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --bg: #0f172a; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 30px; border: 1px solid var(--s); }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-top: 5px; font-family: 'Fredoka'; }
        .question-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; margin-bottom: 20px; border-left: 5px solid var(--p); }
        .option-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .btn { padding: 12px 25px; border-radius: 50px; border: none; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-add { background: var(--s); color: var(--bg); }
        .btn-save { background: var(--p); color: white; width: 100%; margin-top: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Creador de Evaluación</h1>
    
    <div class="config-grid">
        <div>
            <label>Título de la Prueba</label>
            <input type="text" id="testTitle" placeholder="Ej: Sumas Galácticas Nivel 1">
        </div>
        <div>
            <label>Puntos por Pregunta</label>
            <input type="number" id="defaultPoints" value="10">
        </div>
        <div>
            <label>Fecha y Hora Inicio</label>
            <input type="datetime-local" id="startDate">
        </div>
        <div>
            <label>Fecha y Hora Cierre</label>
            <input type="datetime-local" id="endDate">
        </div>
    </div>

    <hr style="opacity:0.2; margin: 30px 0;">

    <div id="questionsContainer">
        </div>

    <button class="btn btn-add" onclick="addQuestion()">➕ Añadir Pregunta</button>
    <button class="btn btn-save" onclick="saveTest()">PUBLICAR PRUEBA 🚀</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-web-cloud-firestore.js";

    const db = getFirestore(initializeApp({ /* TU CONFIG */ }));
    const groupId = localStorage.getItem('activeGroupId');
    let questionCount = 0;

    window.addQuestion = () => {
        questionCount++;
        const div = document.createElement('div');
        div.className = 'question-card';
        div.innerHTML = `
            <h3>Pregunta ${questionCount}</h3>
            <input type="text" class="q-text" placeholder="¿Cuánto es 2 + 2?">
            <div class="option-row">
                <input type="radio" name="correct_${questionCount}" value="0">
                <input type="text" class="opt" placeholder="Opción 1">
            </div>
            <div class="option-row">
                <input type="radio" name="correct_${questionCount}" value="1">
                <input type="text" class="opt" placeholder="Opción 2">
            </div>
            <div class="option-row">
                <input type="radio" name="correct_${questionCount}" value="2">
                <input type="text" class="opt" placeholder="Opción 3">
            </div>
            <p style="font-size: 0.8rem; color: var(--s); margin-top: 10px;">* Marca el círculo de la respuesta correcta</p>
        `;
        document.getElementById('questionsContainer').appendChild(div);
    };

    window.saveTest = async () => {
        const title = document.getElementById('testTitle').value;
        const pts = document.getElementById('defaultPoints').value;
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        
        const questions = [];
        document.querySelectorAll('.question-card').forEach((card, index) => {
            const qIdx = index + 1;
            const correctOpt = card.querySelector(`input[name="correct_${qIdx}"]:checked`);
            
            questions.push({
                text: card.querySelector('.q-text').value,
                options: Array.from(card.querySelectorAll('.opt')).map(i => i.value),
                correctIndex: correctOpt ? parseInt(correctOpt.value) : 0,
                points: parseInt(pts)
            });
        });

        if(!title || questions.length === 0) return alert("Completa el título y al menos una pregunta");

        try {
            await addDoc(collection(db, "tests"), {
                groupId: groupId,
                title: title,
                start: start,
                end: end,
                questions: questions,
                active: true
            });
            alert("¡Prueba creada con éxito!");
            window.location.href = "view-teacher.html";
        } catch (e) { console.error(e); }
    };

    // Agregar la primera pregunta por defecto
    addQuestion();
</script>
</body>
</html>
