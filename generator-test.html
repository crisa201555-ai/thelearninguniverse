<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Generador Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --bg: #0f172a; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        input, select, textarea { padding: 12px; border-radius: 12px; border: none; width: 100%; box-sizing: border-box; font-family: 'Fredoka'; background: rgba(0,0,0,0.3); color: white; }
        
        .q-card { background: rgba(255,255,255,0.07); padding: 20px; border-radius: 20px; margin-top: 15px; border-left: 6px solid var(--p); position: relative; }
        .type-badge { background: var(--p); padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
        
        .option-item { display: flex; gap: 10px; align-items: center; margin-top: 8px; }
        .correct-check { width: 30px !important; height: 30px; cursor: pointer; accent-color: var(--s); }
        
        .btn { padding: 12px 25px; border-radius: 50px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Fredoka'; }
        .btn-add { background: var(--s); color: #004d3b; margin-top: 15px; }
        .btn-opt { background: rgba(255,255,255,0.1); color: white; font-size: 0.8rem; margin-top: 10px; }
        .btn-save { background: var(--p); color: white; width: 100%; margin-top: 30px; font-size: 1.2rem; box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3); }
    </style>
</head>
<body>

<div class="container">
    <h1>✏️ Configuración de Evaluación TLU</h1>
    <div class="form-grid">
        <input type="text" id="tTitle" placeholder="Nombre de la prueba">
        <input type="number" id="tMaxGrade" placeholder="Nota Máxima (Ej: 7.0)">
        <input type="number" id="tMaxScore" placeholder="Puntaje Máximo Total">
        <input type="number" id="tDemand" placeholder="Exigencia % (Ej: 60)">
        <input type="datetime-local" id="tStart">
        <input type="datetime-local" id="tEnd">
    </div>

    <hr style="opacity: 0.1; margin: 30px 0;">
    
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3>Preguntas del Examen</h3>
        <div>
            <button class="btn btn-add" onclick="addQuestion('abierta')">📝 + Abierta</button>
            <button class="btn btn-add" style="background: var(--p); color:white;" onclick="addQuestion('opcion')">🔘 + Opción</button>
        </div>
    </div>

    <div id="questionsContainer"></div>

    <button class="btn btn-save" id="saveTest">PUBLICAR PRUEBA COMPLETA</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const gid = localStorage.getItem('activeGroupId');

    window.addQuestion = (type) => {
        const container = document.getElementById('questionsContainer');
        const qId = Date.now();
        const qDiv = document.createElement('div');
        qDiv.className = 'q-card';
        qDiv.dataset.type = type;
        
        let content = `
            <span class="type-badge">${type === 'abierta' ? 'RESPUESTA ABIERTA' : 'OPCIÓN MÚLTIPLE'}</span>
            <textarea class="q-text" placeholder="Escribe el enunciado de la pregunta..." style="margin-bottom:10px;"></textarea>
            <input type="number" class="q-points" placeholder="Puntos" style="width: 120px; margin-bottom: 10px;">
        `;

        if (type === 'opcion') {
            content += `
                <div class="options-area" id="opts-${qId}">
                    <p style="font-size:0.8rem; opacity:0.6;">Marca el círculo de la respuesta correcta:</p>
                </div>
                <button class="btn btn-opt" onclick="addOption('${qId}')">+ Añadir Alternativa</button>
            `;
        }

        qDiv.innerHTML = content;
        container.appendChild(qDiv);
    };

    window.addOption = (qId) => {
        const optArea = document.getElementById(`opts-${qId}`);
        const div = document.createElement('div');
        div.className = 'option-item';
        div.innerHTML = `
            <input type="radio" name="correct-${qId}" class="correct-check">
            <input type="text" class="opt-text" placeholder="Escribe una opción...">
        `;
        optArea.appendChild(div);
    };

    document.getElementById('saveTest').onclick = async () => {
        const questions = [];
        document.querySelectorAll('.q-card').forEach(card => {
            const type = card.dataset.type;
            const qData = {
                type: type,
                text: card.querySelector('.q-text').value,
                points: parseFloat(card.querySelector('.q-points').value) || 0
            };

            if (type === 'opcion') {
                qData.options = [];
                card.querySelectorAll('.option-item').forEach((item, index) => {
                    qData.options.push({
                        text: item.querySelector('.opt-text').value,
                        isCorrect: item.querySelector('.correct-check').checked
                    });
                });
            }
            questions.push(qData);
        });

        try {
            await addDoc(collection(db, "tests"), {
                groupId: gid,
                title: document.getElementById('tTitle').value,
                maxGrade: document.getElementById('tMaxGrade').value,
                maxScore: document.getElementById('tMaxScore').value,
                demand: document.getElementById('tDemand').value,
                start: document.getElementById('tStart').value,
                end: document.getElementById('tEnd').value,
                questions: questions,
                createdAt: Date.now()
            });
            alert("¡Prueba Publicada Exitosamente!");
            window.location.href = "view-teacher.html";
        } catch (e) {
            alert("Error al guardar: " + e.message);
        }
    };
</script>
</body>
</html>
