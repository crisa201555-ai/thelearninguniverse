<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Misiones | TLU</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        body { background: var(--bg); color: white; font-family: 'Montserrat'; padding: 30px; }
        .container { max-width: 800px; margin: auto; }
        .q-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--p); margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .btn { background: var(--p); color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-family: 'Fredoka One'; cursor: pointer; }
        .btn-add { background: var(--s); margin-bottom: 20px; }
        .points-input { width: 120px; border-color: var(--s); font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="font-family:'Fredoka One'; color:var(--p)">CONFIGURACIÓN DE PRUEBA</h1>
        <p>Ajusta las preguntas y asigna el puntaje para cada una.</p>

        <div id="questionsContainer">
            </div>

        <button class="btn btn-add" id="btnAdd">➕ AÑADIR PREGUNTA</button>
        <button class="btn" id="btnSave">🚀 PUBLICAR PRUEBA AL SECTOR</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", 
            authDomain: "thelearninguniverse-26.firebaseapp.com", 
            projectId: "thelearninguniverse-26", 
            storageBucket: "thelearninguniverse-26.firebasestorage.app", 
            messagingSenderId: "85338996011", 
            appId: "1:85338996011:web:1f3bb216900c07e735596e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gID = localStorage.getItem('currentGroup');

        let qCount = 0;

        const addQuestion = () => {
            qCount++;
            const div = document.createElement('div');
            div.className = 'q-card';
            div.innerHTML = `
                <div class="row">
                    <b style="color:var(--s)">Pregunta ${qCount}</b>
                    <input type="number" class="points-input" placeholder="Puntos" value="1" min="1">
                </div>
                <input type="text" class="p-text" placeholder="¿Cuál es la pregunta?">
                <div class="row">
                    <input type="text" class="opt" placeholder="Opción A">
                    <input type="text" class="opt" placeholder="Opción B">
                </div>
                <div class="row">
                    <input type="text" class="opt" placeholder="Opción C">
                    <select class="correct">
                        <option value="">Selecciona la correcta</option>
                        <option value="A">Opción A</option>
                        <option value="B">Opción B</option>
                        <option value="C">Opción C</option>
                    </select>
                </div>
            `;
            document.getElementById('questionsContainer').appendChild(div);
        };

        document.getElementById('btnAdd').onclick = addQuestion;

        document.getElementById('btnSave').onclick = async () => {
            const cards = document.querySelectorAll('.q-card');
            const preguntas = [];

            cards.forEach(card => {
                const opts = card.querySelectorAll('.opt');
                preguntas.push({
                    pregunta: card.querySelector('.p-text').value,
                    puntos: parseFloat(card.querySelector('.points-input').value),
                    opciones: [opts[0].value, opts[1].value, opts[2].value],
                    correcta: card.querySelector('.correct').value // Guarda 'A', 'B' o 'C'
                });
            });

            if(!gID) return alert("No hay grupo seleccionado.");

            try {
                await setDoc(doc(db, "pruebas", gID), {
                    preguntas: preguntas,
                    activa: true,
                    fecha: Date.now()
                });
                alert("Misión publicada con éxito en el sector " + gID);
                window.location.href = "view-teacher.html";
            } catch (e) { alert("Error: " + e.message); }
        };

        // Iniciar con una pregunta
        addQuestion();
    </script>
</body>
</html>
