<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Generador de Prueba</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --bg: #0f172a; --s: #00cec9; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, select, textarea { padding: 12px; border-radius: 10px; border: none; width: 100%; box-sizing: border-box; font-family: 'Fredoka'; }
        .q-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-top: 10px; border-left: 5px solid var(--s); }
        .btn { padding: 12px; border-radius: 50px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-add { background: var(--s); color: #004d3b; margin-top: 10px; }
        .btn-save { background: var(--p); color: white; width: 100%; margin-top: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Configurar Prueba y Preguntas</h1>
        <div class="form-grid">
            <input type="text" id="tTitle" placeholder="Nombre de la prueba">
            <input type="number" id="tMaxGrade" placeholder="Nota Máxima">
            <input type="number" id="tMaxScore" placeholder="Puntaje Máximo">
            <input type="number" id="tDemand" placeholder="Exigencia %">
            <input type="datetime-local" id="tStart">
            <input type="datetime-local" id="tEnd">
        </div>

        <hr style="opacity: 0.2;">
        <h3>Preguntas</h3>
        <div id="questionsContainer"></div>
        <button class="btn btn-add" onclick="addQuestionField()">+ Añadir Pregunta</button>

        <button class="btn btn-save" id="saveTest">GUARDAR PRUEBA COMPLETA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gid = localStorage.getItem('activeGroupId');

        window.addQuestionField = () => {
            const container = document.getElementById('questionsContainer');
            const qDiv = document.createElement('div');
            qDiv.className = 'q-card';
            qDiv.innerHTML = `
                <textarea class="q-text" placeholder="Escribe la pregunta aquí..." style="margin-bottom:10px;"></textarea>
                <input type="number" class="q-points" placeholder="Puntos para esta pregunta" style="width: 200px;">
            `;
            container.appendChild(qDiv);
        };

        document.getElementById('saveTest').onclick = async () => {
            const questions = [];
            document.querySelectorAll('.q-card').forEach(card => {
                questions.push({
                    text: card.querySelector('.q-text').value,
                    points: card.querySelector('.q-points').value
                });
            });

            await addDoc(collection(db, "tests"), {
                groupId: gid,
                title: document.getElementById('tTitle').value,
                maxGrade: document.getElementById('tMaxGrade').value,
                maxScore: document.getElementById('tMaxScore').value,
                demand: document.getElementById('tDemand').value,
                start: document.getElementById('tStart').value,
                end: document.getElementById('tEnd').value,
                questions: questions,
                createdAt: Date.now()
            });
            alert("¡Prueba y preguntas guardadas!");
        };
    </script>
</body>
</html>
