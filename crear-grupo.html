<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Flotas - Docente</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #48dbfb; --bg: #060918; }
        body { background: var(--bg); color: white; font-family: 'Montserrat'; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid var(--accent); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-family: 'Montserrat'; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 15px rgba(72, 219, 251, 0.3); }
        .btn { background: var(--accent); color: #060918; border: none; padding: 18px; width: 100%; border-radius: 50px; font-family: 'Fredoka One'; cursor: pointer; font-size: 1.1rem; transition: 0.4s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loader { width: 20px; height: 20px; border: 3px solid #000; border-top: 3px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; display: none; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="font-family:'Fredoka One'; text-align: center; color: #feca57;">CONFIGURAR MISIÓN</h1>
        <div id="form">
            <label style="font-size: 0.8rem; opacity: 0.7;">Nombre de la Flota</label>
            <input type="text" id="gName" placeholder="Ej: Ciencias del Espacio">
            
            <label style="font-size: 0.8rem; opacity: 0.7;">Código de Acceso (Auto-generado)</label>
            <input type="text" id="gCode" readonly style="background: rgba(255,255,255,0.05); color: var(--accent); font-weight: bold;">
            
            <button class="btn" id="btnCrear">
                <span id="textBtn">INICIAR SECUENCIA</span>
                <div class="loader" id="loader"></div>
            </button>
        </div>
        <p id="feedback" style="text-align: center; font-size: 0.8rem; margin-top: 15px;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Generar código aleatorio al cargar
        const generateCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();
        document.getElementById('gCode').value = generateCode();

        const btn = document.getElementById('btnCrear');
        const loader = document.getElementById('loader');
        const textBtn = document.getElementById('textBtn');
        const feedback = document.getElementById('feedback');

        btn.addEventListener('click', async () => {
            const name = document.getElementById('gName').value.trim();
            const code = document.getElementById('gCode').value;

            if (name.length < 3) {
                feedback.innerText = "❌ El nombre es muy corto";
                feedback.style.color = "#ff6b6b";
                return;
            }

            // UI State: Loading
            btn.disabled = true;
            textBtn.style.display = 'none';
            loader.style.display = 'block';

            try {
                const user = auth.currentUser;
                const expirationDate = Date.now() + (18 * 60 * 60 * 1000);

                await setDoc(doc(db, "grupos", code), {
                    nombre: name,
                    creador: user.uid,
                    creadoEn: Date.now(),
                    expiraEn: expirationDate,
                    activo: true,
                    docenteNombre: user.displayName || user.email
                });

                feedback.innerText = "🚀 ¡Sistemas sincronizados!";
                feedback.style.color = "#1dd1a1";
                
                setTimeout(() => {
                    window.location.href = `create-test.html?grupo=${code}`;
                }, 1000);

            } catch (error) {
                console.error("Critical Error:", error);
                feedback.innerText = "🚨 Error de conexión";
                btn.disabled = false;
                textBtn.style.display = 'inline';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
