<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tests Activos | The Learning Universe</title>
    <style>
        body { background: #060918; color: white; font-family: 'Montserrat', sans-serif; padding: 40px; }
        .test-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border-left: 5px solid #feca57; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .nota { font-size: 1.5rem; font-weight: bold; color: #48dbfb; }
        .pendiente { color: #ff6b6b; font-style: italic; }
    </style>
</head>
<body>
    <button onclick="history.back()">⬅ VOLVER A LA CLASE</button>
    <h1 id="title">Pruebas del Estudiante</h1>
    <div id="testsContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const uid = params.get('uid');
        const gID = params.get('grupo');

        async function loadTests() {
            const mSnap = await getDoc(doc(db, "grupos", gID, "miembros", uid));
            const container = document.getElementById('testsContainer');
            
            if(mSnap.exists()) {
                const data = mSnap.data();
                document.getElementById('title').innerText = "Expediente de: " + data.nombre;

                // Simulando lista de tests (puedes expandir esto a una subcolección)
                const notaDisplay = data.nota === "Pendiente" ? '<span class="pendiente">Pendiente...</span>' : `<span class="nota">${data.nota}</span>`;
                
                container.innerHTML = `
                    <div class="test-card">
                        <div>
                            <h3>Examen de Unidad</h3>
                            <p>Estado: ${data.nota === "Pendiente" ? "En revisión" : "Calificado"}</p>
                        </div>
                        <div>${notaDisplay}</div>
                    </div>
                `;
            }
        }
        loadTests();
    </script>
</body>
</html>
