<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Pruebas | TLU</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --bg: #0f172a; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .test-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--p); display: flex; justify-content: space-between; align-items: center; }
        .btn-status { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📋 Mis Pruebas Activas</h1>
    <div id="activeList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gid = localStorage.getItem('activeGroupId');
        const userEmail = "estudiante@ejemplo.com"; 

        onSnapshot(query(collection(db, "tests"), where("groupId", "==", gid)), (snap) => {
            const list = document.getElementById('activeList');
            list.innerHTML = "";
            snap.forEach(async (d) => {
                const t = d.data();
                // Aquí buscaríamos si ya existe un resultado para este alumno
                const div = document.createElement('div');
                div.className = 'test-card';
                div.innerHTML = `
                    <div><h3>${t.title}</h3><p>Puntaje Máximo: ${t.maxScore}</p></div>
                    <button class="btn-status" id="btn-${d.id}">Acceder</button>
                `;
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
