<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Ciencias Naturales</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --accent: #0ea5e9; --glass: rgba(14, 165, 233, 0.05); }
        body {
            background: var(--bg); color: white; font-family: 'Fredoka', sans-serif; margin: 0;
            display: flex; flex-direction: column; height: 100vh;
            background: radial-gradient(circle at bottom right, #0c4a6e, #020617);
        }
        .nav-top { padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; }
        .back-link { color: var(--accent); text-decoration: none; font-weight: 600; }
        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; gap: 20px; }
        h1 { font-size: 3.5rem; color: #7dd3fc; margin: 0; text-transform: uppercase; letter-spacing: 4px; text-align: center; }
        .unit-card {
            width: 100%; max-width: 800px; background: var(--glass);
            border-radius: 35px; border: 1px solid rgba(14, 165, 233, 0.2);
            padding: 30px 40px; backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .unit-card:hover { border-color: var(--accent); transform: scale(1.02); background: rgba(14, 165, 233, 0.1); }
        .unit-info h2 { margin: 0; font-size: 1.8rem; color: white; }
        .btn-launch {
            background: var(--accent); color: white; border: none; padding: 15px 35px;
            border-radius: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Fredoka';
        }
        .btn-launch:hover { box-shadow: 0 0 20px rgba(14, 165, 233, 0.5); background: #38bdf8; }
    </style>
</head>
<body>
    <nav class="nav-top">
        <a href="home.html" class="back-link">← VOLVER AL HOME</a>
        <div style="color: var(--accent); font-weight: 700; letter-spacing: 2px;">CIENCIAS NATURALES</div>
    </nav>
    <div class="content">
        <h1>Laboratorio Terrestre</h1>

        <div class="unit-card">
            <div class="unit-info">
                <h2>Los Seres de la Tierra</h2>
                <p>Seres vivos e inertes.</p>
            </div>
            <button class="btn-launch" onclick="location.href='cienciasnaturales/seleccion-modo.html?lesson=seres'">MISION 01</button>
        </div>

        <div class="unit-card">
            <div class="unit-info">
                <h2>Océanos y Continentes</h2>
                <p>Grandes masas de agua y tierra.</p>
            </div>
            <button class="btn-launch" onclick="location.href='cienciasnaturales/seleccion-modo.html?lesson=oceanosycontinentes'">MISION 02</button>
        </div>
    </div>
</body>
</html>
