<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Ciencias Naturales</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(to bottom, #0f172a, #1e3a8a);
        }

        .clock-box { position: fixed; top: 20px; right: 40px; text-align: right; }
        #time { font-size: 2rem; font-weight: 700; color: #00cec9; }

        .header-box { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 3.5rem; margin: 0; text-shadow: 0 0 20px rgba(0,206,201,0.5); }

        .btn-main {
            background: #00cec9;
            color: #0f172a;
            border: none;
            padding: 20px 50px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,206,201,0.3);
        }

        .btn-main:hover { transform: scale(1.05); background: white; }

        /* TABLA MODAL */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center;
        }

        .table-container {
            background: #1e293b;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid #334155;
            width: 80%;
            max-width: 800px;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #94a3b8; padding: 10px; }
        td { padding: 20px 10px; border-bottom: 1px solid #334155; }
        
        .btn-enter {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="clock-box">
        <div id="time">00:00:00</div>
        <div id="date">-- / -- / ----</div>
    </div>

    <div class="header-box">
        <h1>Ciencias Naturales</h1>
        <p style="opacity: 0.6;">Explora el Planeta Azul con TWICE</p>
    </div>

    <button class="btn-main" onclick="document.getElementById('m').style.display='flex'">Ver temas</button>

    <div id="m" class="modal" onclick="this.style.display='none'">
        <div class="table-container" onclick="event.stopPropagation()">
            <h2>Temas de Aprendizaje</h2>
            <table>
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Tiempo</th>
                        <th>Nivel</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><b>Océanos y Continentes</b></td>
                        <td>5-10 min</td>
                        <td>2° a 5° Básico</td>
                        <td><button class="btn-enter" onclick="location.href='/cienciasnaturales/oceanosycontinentes.html'">Entrar...</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function update() {
            const n = new Date();
            document.getElementById('time').innerText = n.toLocaleTimeString();
            document.getElementById('date').innerText = n.toLocaleDateString();
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
