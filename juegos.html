<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Juegos - The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body { background: #060918; color: white; font-family: 'Montserrat', sans-serif; }
        .container { padding: 50px; text-align: center; }
        h1 { font-family: 'Fredoka One'; color: #ff6b6b; font-size: 3rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 50px; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 2px dashed rgba(255,255,255,0.2); }
        .btn { display: inline-block; margin-top: 40px; color: #48dbfb; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zona Recreativa</h1>
        <div class="grid">
            <div class="card">
                <h2>🚀 Próximamente</h2>
                <p>Carrera de Operaciones</p>
            </div>
            <div class="card">
                <h2>🛰️ Próximamente</h2>
                <p>Memoria Espacial</p>
            </div>
        </div>
        <a href="home.html" class="btn">← Regresar al Mando</a>
    </div>
</body>
</html>
