<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación | The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; padding-top: 40px; }
        .test-title { font-family: 'Fredoka One'; color: var(--s); font-size: 2.2rem; text-align: center; }
        .q-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(72, 219, 251, 0.2); margin-bottom: 25px; }
        .option { display: block; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; margin: 10px 0; cursor: pointer; border: 1px solid transparent; }
        .option:hover { background: rgba(72, 219, 251, 0.1); border-color: var(--p); }
        .selected { background: rgba(72, 219, 251, 0.2) !important; border-color: var(--p) !important; }
        .btn-submit { background: var(--p); color: var(--bg); border: none; padding: 20px; width: 100%; border-radius: 50px; font-family: 'Fredoka One'; font-size: 1.2rem; cursor: pointer; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="tName" class="test-title">Cargando...</h1>
        <div id="quiz-container"></div>
        <button id="btnFinish" class="btn-submit">ENVIAR RESPUESTAS E TERMINAR PRUEBA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const gID = new URLSearchParams(window.location.search).get('grupo') || localStorage.getItem('currentGroup');
        let testData = null;

        onAuthStateChanged(auth, user => { if(user) loadTest(); });

        async function loadTest() {
            const tSnap = await getDoc(doc(db, "pruebas", gID));
            testData = tSnap.data();
            document.getElementById('tName').innerText = testData.nombrePrueba;
            const container = document.getElementById('quiz-container');
            
            testData.preguntas.forEach((q, i) => {
                const opts = [q.correcta, ...q.incorrectas].sort(() => Math.random() - 0.5);
                container.innerHTML += `
                    <div class="q-card">
                        <p><b>${i+1}. ${q.pregunta}</b></p>
                        ${opts.map(o => `<label class="option"><input type="radio" name="q${i}" value="${o}" onclick="selectOpt(this)"> ${o}</label>`).join('')}
                    </div>`;
            });
        }

        window.selectOpt = (el) => {
            document.querySelectorAll(`input[name="${el.name}"]`).forEach(i => i.parentElement.classList.remove('selected'));
            el.parentElement.classList.add('selected');
        };

        document.getElementById('btnFinish').addEventListener('click', async () => {
            const qs = document.querySelectorAll('.q-card');
            let resp = {};
            let count = 0;
            qs.forEach((_, i) => {
                const sel = document.querySelector(`input[name="q${i}"]:checked`);
                if(sel) { resp[i] = sel.value; count++; }
            });

            const pendientes = testData.preguntas.length - count;
            if(pendientes > 0) {
                if(!confirm(`¿Estás seguro de enviar tus respuestas? Revisa antes de enviar, te ${pendientes === 1 ? 'ha' : 'han'} quedado ${pendientes} ${pendientes === 1 ? 'pregunta' : 'preguntas'} por responder.`)) return;
            } else {
                if(!confirm("¿Deseas finalizar y enviar la prueba?")) return;
            }

            await updateDoc(doc(db, "grupos", gID, "miembros", auth.currentUser.uid), {
                enviado: true,
                nota: "Pendiente",
                respuestasAlumno: resp,
                fechaEnvio: Date.now()
            });
            window.location.href = `activetests.html?uid=${auth.currentUser.uid}&grupo=${gID}`;
        });
    </script>
</body>
</html>
