<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Sector | The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        body { background: var(--bg); color: white; font-family: 'Montserrat'; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 25px; border: 1px solid var(--p); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(72, 219, 251, 0.2); }
        h1 { font-family: 'Fredoka One'; color: var(--s); margin: 0; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid var(--p); background: #000; color: white; box-sizing: border-box; }
        .btn { background: var(--p); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-family: 'Fredoka One'; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn:hover { background: var(--s); transform: scale(1.02); }
        #loader { display: none; margin-top: 15px; color: var(--p); font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>NUEVA CLASE</h1>
        <p style="opacity:0.7">Define el nombre de tu sector galáctico.</p>
        <input type="text" id="groupName" placeholder="Nombre de la Clase...">
        <button class="btn" id="btnCreate">INICIALIZAR SECTOR</button>
        <div id="loader">ESTABLECIENDO CONEXIÓN...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", 
            authDomain: "thelearninguniverse-26.firebaseapp.com", 
            projectId: "thelearninguniverse-26", 
            storageBucket: "thelearninguniverse-26.firebasestorage.app", 
            messagingSenderId: "85338996011", 
            appId: "1:85338996011:web:1f3bb216900c07e735596e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const generarID = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // Evitamos O e I para no confundir
            let res = '';
            for (let i = 0; i < 6; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            return res;
        };

        document.getElementById('btnCreate').onclick = async () => {
            const name = document.getElementById('groupName').value.trim();
            if(!name) return alert("Escribe un nombre.");

            const user = auth.currentUser;
            const randomID = generarID(); 
            const masterCode = Math.floor(100000 + Math.random() * 900000).toString(); 

            document.getElementById('btnCreate').style.display = "none";
            document.getElementById('loader').style.display = "block";

            try {
                // 1. Crear el grupo
                await setDoc(doc(db, "grupos", randomID), {
                    nombreGrupo: name,
                    docente: user.email,
                    docenteUID: user.uid,
                    idGrupo: randomID,
                    masterCode: masterCode,
                    creadoEn: Date.now()
                });

                // 2. Enviar a INBOX (Asegúrate de que la colección se llame 'invitaciones')
                await addDoc(collection(db, "invitaciones"), {
                    para: user.email,
                    titulo: "CÓDIGO DE CALIFICACIÓN",
                    mensaje: `Has creado: ${name}. Código Maestro: ${masterCode}. ID del Grupo: ${randomID}`,
                    esSistema: true,
                    fecha: Date.now()
                });

                alert(`¡SECTOR CREADO!\n\nID: ${randomID}\nCódigo Maestro: ${masterCode}\n(Guarda este código para poner notas)`);
                localStorage.setItem('currentGroup', randomID);
                window.location.href = "home.html";

            } catch (e) {
                console.error(e);
                alert("Error al conectar con la base de datos.");
                document.getElementById('btnCreate').style.display = "block";
                document.getElementById('loader').style.display = "none";
            }
        };
    </script>
</body>
</html>
