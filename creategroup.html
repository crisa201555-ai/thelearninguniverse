<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Sector | The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        body { 
            background: var(--bg); color: white; font-family: 'Montserrat'; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
            background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }
        .card { 
            background: rgba(255,255,255,0.05); padding: 40px; border-radius: 25px; 
            border: 1px solid var(--p); width: 100%; max-width: 400px; 
            text-align: center; backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(72, 219, 251, 0.1);
        }
        h1 { font-family: 'Fredoka One'; color: var(--s); margin-bottom: 10px; }
        p { font-size: 0.9rem; opacity: 0.8; margin-bottom: 25px; }
        input { 
            width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; 
            border: 1px solid var(--p); background: rgba(0,0,0,0.5); color: white; 
            box-sizing: border-box; font-size: 1rem; outline: none;
        }
        input:focus { box-shadow: 0 0 10px var(--p); }
        .btn { 
            background: var(--p); color: #000; border: none; padding: 15px; 
            width: 100%; border-radius: 12px; font-family: 'Fredoka One'; 
            cursor: pointer; font-size: 1.1rem; transition: 0.3s;
        }
        .btn:hover { background: var(--s); transform: translateY(-2px); }
        .btn:disabled { background: #555; cursor: not-allowed; }
        #timer-info { margin-top: 15px; font-size: 0.8rem; color: var(--p); display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>NUEVO SECTOR</h1>
        <p>Inicia una nueva aventura de aprendizaje.</p>
        
        <input type="text" id="groupName" placeholder="Nombre de la Clase (Ej: Astronomía 101)">
        
        <button class="btn" id="btnCreate">INICIALIZAR SECTOR</button>
        
        <div id="timer-info">Redirigiendo automáticamente en <span id="seconds">30</span>s...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIGURACIÓN DE FIREBASE (Asegúrate de que sean tus credenciales)
        const firebaseConfig = { 
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", 
            authDomain: "thelearninguniverse-26.firebaseapp.com", 
            projectId: "thelearninguniverse-26", 
            storageBucket: "thelearninguniverse-26.firebasestorage.app", 
            messagingSenderId: "85338996011", 
            appId: "1:85338996011:web:1f3bb216900c07e735596e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Generar ID Aleatorio (6 caracteres)
        const generarID = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let res = '';
            for (let i = 0; i < 6; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            return res;
        };

        document.getElementById('btnCreate').onclick = async () => {
            const name = document.getElementById('groupName').value.trim();
            const btn = document.getElementById('btnCreate');
            
            if(!name) return alert("Por favor, ponle un nombre a tu clase.");
            
            btn.disabled = true;
            btn.innerText = "CREANDO...";

            const user = auth.currentUser;
            if(!user) return alert("Debes estar logueado para crear un grupo.");

            const randomID = generarID();
            const masterCode = Math.floor(100000 + Math.random() * 900000).toString();

            try {
                // 1. Crear el grupo en Firestore
                await setDoc(doc(db, "grupos", randomID), {
                    nombreGrupo: name,
                    docente: user.email,
                    docenteUID: user.uid,
                    idGrupo: randomID,
                    masterCode: masterCode,
                    creadoEn: Date.now()
                });

                // 2. Enviar Código Maestro al Inbox
                await addDoc(collection(db, "invitaciones"), {
                    para: user.email,
                    titulo: "🔑 CÓDIGO MAESTRO: " + name,
                    mensaje: `Sector creado con éxito. Tu ID de grupo es: ${randomID}. Tu Código para poner notas es: ${masterCode}`,
                    esSistema: true,
                    fecha: Date.now()
                });

                // Guardar en LocalStorage para las siguientes páginas
                localStorage.setItem('currentGroup', randomID);

                // Lógica de Redirección (30 segundos)
                document.getElementById('timer-info').style.display = "block";
                let timeLeft = 30;
                const countdown = setInterval(() => {
                    timeLeft--;
                    document.getElementById('seconds').innerText = timeLeft;
                    if(timeLeft <= 0) {
                        clearInterval(countdown);
                        window.location.href = "viewmembers.html";
                    }
                }, 1000);

                // Opción 2: Redirección inmediata al aceptar el Alert
                alert(`🚀 ¡SECTOR INICIALIZADO!\n\nID: ${randomID}\nCÓDIGO MAESTRO: ${masterCode}\n\nHemos enviado una copia de estos datos a tu Inbox.`);
                
                clearInterval(countdown);
                window.location.href = "viewmembers.html";

            } catch (e) {
                console.error(e);
                alert("Hubo un error al crear el grupo. Intenta de nuevo.");
                btn.disabled = false;
                btn.innerText = "INICIALIZAR SECTOR";
            }
        };
    </script>
</body>
</html>
