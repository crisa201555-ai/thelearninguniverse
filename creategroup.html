<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Crear Grupo</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --bg: #0f172a; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; border: 1px solid var(--p); width: 350px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: none; font-family: 'Fredoka'; box-sizing: border-box; }
        .btn { background: var(--p); color: white; border: none; padding: 15px; border-radius: 50px; cursor: pointer; width: 100%; font-weight: 700; transition: 0.3s; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🆕 Nueva Clase</h1>
        <input type="text" id="className" placeholder="Nombre de la Clase">
        <input type="text" id="teacherName" placeholder="Nombre del Docente">
        <button class="btn" id="createBtn">CREAR GRUPO</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI",
            authDomain: "thelearninguniverse-26.firebaseapp.com",
            projectId: "thelearninguniverse-26",
            storageBucket: "thelearninguniverse-26.firebasestorage.app",
            messagingSenderId: "85338996011",
            appId: "1:85338996011:web:1f3bb216900c07e735596e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('createBtn').onclick = async () => {
            const name = document.getElementById('className').value;
            const teacher = document.getElementById('teacherName').value;
            if(!name || !teacher) return alert("Completa los campos");

            const docRef = await addDoc(collection(db, "groups"), {
                className: name,
                teacherName: teacher,
                testStatus: 'unlocked',
                createdAt: Date.now()
            });
            localStorage.setItem('activeGroupId', docRef.id);
            window.location.href = "view-teacher.html";
        };
    </script>
</body>
</html>
