<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Clase | TLU Teacher</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --bg: #0f172a; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; border: 2px solid var(--s); width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: none; outline: none; box-sizing: border-box; font-family: 'Fredoka'; }
        .btn { background: var(--p); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; cursor: pointer; font-weight: 700; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ Nueva Clase</h1>
        <input type="text" id="className" placeholder="Nombre de la Clase (ej: 4to Básico A)">
        <input type="text" id="teacherName" placeholder="Nombre del Docente">
        <button class="btn" onclick="createGroup()">CREAR UNIVERSO 🚀</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-web-cloud-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { /* TU CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.createGroup = async () => {
            const name = document.getElementById('className').value;
            const teacher = document.getElementById('teacherName').value;
            
            if(name && teacher) {
                try {
                    const docRef = await addDoc(collection(db, "groups"), {
                        className: name,
                        teacherName: teacher,
                        adminId: auth.currentUser.uid,
                        createdAt: new Date(),
                        testStatus: 'blocked'
                    });
                    localStorage.setItem('activeGroupId', docRef.id);
                    window.location.href = "viewmembers.html";
                } catch (e) { alert("Error al crear: " + e); }
            }
        }
    </script>
</body>
</html>
