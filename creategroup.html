<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Sector | The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        body { background: var(--bg); color: white; font-family: 'Montserrat'; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 25px; border: 1px solid var(--p); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-family: 'Fredoka One'; color: var(--s); }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid var(--p); background: #000; color: white; box-sizing: border-box; }
        .btn { background: var(--p); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-family: 'Fredoka One'; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>NUEVO SECTOR</h1>
        <input type="text" id="groupName" placeholder="Nombre de la Clase...">
        <button class="btn" id="btnCreate">INICIALIZAR</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { /* TU CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        document.getElementById('btnCreate').onclick = async () => {
            const name = document.getElementById('groupName').value.trim();
            if(!name) return;
            
            const user = auth.currentUser;
            const randomID = Math.random().toString(36).substring(2,8).toUpperCase();
            const masterCode = Math.floor(100000 + Math.random() * 900000).toString();

            try {
                await setDoc(doc(db, "grupos", randomID), {
                    nombreGrupo: name, docente: user.email, masterCode: masterCode
                });

                localStorage.setItem('currentGroup', randomID);

                // Lógica de redirección: Alert o 30 segundos
                const timerRedir = setTimeout(() => {
                    window.location.href = "viewmembers.html";
                }, 30000);

                alert(`¡Sector Creado!\nID: ${randomID}\nCódigo Maestro: ${masterCode}\n\nPresiona Aceptar para ir a invitar alumnos ahora.`);
                
                clearTimeout(timerRedir);
                window.location.href = "viewmembers.html";

            } catch (e) { alert("Error"); }
        };
    </script>
</body>
</html>
