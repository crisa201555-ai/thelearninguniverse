<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Centro de Comando de Clases</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --accent: #fd79a8;
            --dark-bg: #0f172a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Fredoka', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white; display: flex; justify-content: center; align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .command-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 3px solid var(--primary);
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .panel-header h1 {
            font-size: 2.5rem;
            color: var(--secondary);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .panel-header p {
            opacity: 0.7;
            margin-bottom: 30px;
        }

        /* Formulario Estilo Moderno */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--accent);
            padding-left: 10px;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            font-family: 'Fredoka';
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--secondary);
            background: rgba(0,0,0,0.4);
        }

        /* Botones */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-create {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
            transition: 0.3s;
        }

        .btn-create:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(108, 92, 231, 0.5);
        }

        .btn-home {
            background: transparent;
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-home:hover {
            background: rgba(255,255,255,0.1);
            border-color: white;
        }

        .icon-box {
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="command-panel">
            <div class="icon-box">🛰️</div>
            <div class="panel-header">
                <h1>Nueva Misión</h1>
                <p>Configura los parámetros de tu nueva clase educativa</p>
            </div>

            <div class="input-group">
                <label>Nombre de la Clase</label>
                <input type="text" id="className" placeholder="Ej: Exploradores de Marte">
            </div>

            <div class="input-group">
                <label>Profesor a Cargo</label>
                <input type="text" id="teacherName" placeholder="Tu nombre o alias">
            </div>

            <div class="input-group">
                <label>Objetivo de la Misión</label>
                <textarea id="description" rows="3" placeholder="¿Qué aprenderemos hoy?"></textarea>
            </div>

            <div class="actions">
                <button class="btn-create" onclick="crearClase()">✨ INICIAR CLASE</button>
                <a href="home.html" class="btn-home">⬅ Volver al Home</a>
            </div>
        </div>
    </div>

    <script>
        function crearClase() {
            const nombre = document.getElementById('className').value;
            const profe = document.getElementById('teacherName').value;
            const desc = document.getElementById('description').value;

            if (!nombre || !profe) {
                alert("⚠️ ¡Capitán! Necesitamos el nombre de la clase y del profesor para despegar.");
                return;
            }

            // 1. Guardar para la vista activa
            localStorage.setItem('userClass', nombre);
            localStorage.setItem('userTeacher', profe);

            // 2. Generar mensaje para el Inbox
            const nuevoMensaje = {
                id: Date.now(),
                titulo: "🚀 ¡Misión Iniciada!",
                cuerpo: `La clase "${nombre}" ha sido creada con éxito bajo el mando del profesor ${profe}. ¡A aprender!`,
                hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                fecha: new Date().toLocaleDateString(),
            };

            let bandeja = JSON.parse(localStorage.getItem('inboxMessages')) || [];
            bandeja.unshift(nuevoMensaje);
            localStorage.setItem('inboxMessages', JSON.stringify(bandeja));

            alert("✨ ¡Clase creada! Los datos han sido enviados a tu Bandeja de Entrada.");
            window.location.href = "home.html";
        }
    </script>
</body>
</html>
