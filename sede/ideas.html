<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.D.E. | Enviar Idea</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --bg: #0f172a; --danger: #ff7675; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); background-image: radial-gradient(circle at top, #1b277a 0%, #0f172a 100%); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; border: 2px solid var(--p); width: 100%; max-width: 500px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: var(--s); margin-bottom: 10px; }
        input, textarea { width: 100%; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: none; outline: none; font-family: 'Fredoka'; font-size: 1rem; box-sizing: border-box; }
        textarea { height: 120px; resize: none; }
        .btn { background: var(--p); color: white; border: none; padding: 18px 30px; border-radius: 50px; cursor: pointer; font-weight: 700; width: 100%; transition: 0.3s; font-size: 1.1rem; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        #status-msg { margin-top: 20px; font-size: 0.9rem; color: var(--danger); font-weight: 700; }
        .footer-link { margin-top: 30px; color: var(--s); text-decoration: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>💡 Ideas-New</h1>
        <p>Propón una mejora para S.E.D.E.</p>
        
        <input type="text" id="authorName" placeholder="Tu nombre o apodo">
        <textarea id="ideaText" placeholder="Escribe tu idea aquí..."></textarea>
        
        <button id="sendBtn" class="btn">ENVIAR AL SISTEMA 🚀</button>
        <div id="status-msg"></div>
    </div>

    <a href="top-ideas.html" class="footer-link">Ver el Top 50 →</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI",
            authDomain: "thelearninguniverse-26.firebaseapp.com",
            projectId: "thelearninguniverse-26",
            storageBucket: "thelearninguniverse-26.firebasestorage.app",
            messagingSenderId: "85338996011",
            appId: "1:85338996011:web:1f3bb216900c07e735596e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const sendBtn = document.getElementById('sendBtn');

        async function verificarCapacidad() {
            try {
                const coll = collection(db, "ideas");
                const snapshot = await getCountFromServer(coll);
                if (snapshot.data().count >= 1000) {
                    sendBtn.disabled = true;
                    document.getElementById('status-msg').innerText = "🛑 SISTEMA APAGADO: Límite de 1000 ideas alcanzado.";
                }
            } catch (e) { console.error(e); }
        }

        sendBtn.addEventListener('click', async () => {
            const content = document.getElementById('ideaText').value.trim();
            const author = document.getElementById('authorName').value.trim() || "Anónimo";

            if (!content) return alert("Escribe tu idea.");

            sendBtn.disabled = true;
            sendBtn.innerText = "PROPULSANDO...";

            try {
                await addDoc(collection(db, "ideas"), {
                    content: content,
                    author: author,
                    likes: 0,
                    dislikes: 0,
                    createdAt: Date.now()
                });
                window.location.href = "top-ideas.html";
            } catch (error) {
                alert("Error al enviar.");
                sendBtn.disabled = false;
            }
        });

        verificarCapacidad();
    </script>
</body>
</html>
