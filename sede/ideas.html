<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>S.E.D.E. | Enviar Idea</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --bg: #0f172a; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; padding: 20px; display: flex; justify-content: center; }
        .card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 25px; border: 2px solid var(--p); width: 100%; max-width: 500px; text-align: center; }
        textarea { width: 100%; height: 150px; border-radius: 15px; padding: 15px; margin: 15px 0; border: none; font-family: 'Fredoka'; box-sizing: border-box; }
        .btn { background: var(--s); color: var(--bg); border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: 700; width: 100%; }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        #status-msg { margin-top: 15px; font-size: 0.9rem; color: var(--danger); }
    </style>
</head>
<body>
    <div class="card">
        <h1>💡 Propón una mejora</h1>
        <p>Tu idea llegará al Ministerio de TLU.</p>
        <textarea id="ideaText" placeholder="Escribe tu idea aquí..."></textarea>
        <button id="sendBtn" class="btn" onclick="enviarIdea()">ENVIAR AL SISTEMA 🚀</button>
        <div id="status-msg"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-web-cloud-firestore.js";

        const db = getFirestore(initializeApp({ /* TU CONFIG */ }));

        async function verificarCapacidad() {
            const coll = collection(db, "ideas");
            const snapshot = await getCountFromServer(coll);
            const count = snapshot.data().count;

            if (count >= 1000) {
                document.getElementById('sendBtn').disabled = true;
                document.getElementById('status-msg').innerText = "🛑 Capacidad máxima de ideas alcanzada (1000/1000). El sistema se ha apagado.";
            }
        }

        window.enviarIdea = async () => {
            const text = document.getElementById('ideaText').value;
            if(!text) return;

            await addDoc(collection(db, "ideas"), {
                content: text,
                likes: 0,
                dislikes: 0,
                createdAt: Date.now(),
                author: localStorage.getItem('userEmail') || 'Anónimo'
            });

            alert("¡Idea enviada al corazón de S.E.D.E!");
            window.location.href = "top-ideas.html";
        };

        verificarCapacidad();
    </script>
</body>
</html>
