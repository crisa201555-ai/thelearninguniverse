<div class="card">
    <h1>💡 Ideas-New</h1>
    <p>Tu propuesta para mejorar S.E.D.E llegará al Ministerio de TLU.</p>
    
    <input type="text" id="authorName" placeholder="Tu nombre o apodo (opcional)" 
           style="width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 15px; border: none; font-family: 'Fredoka'; box-sizing: border-box;">
    
    <textarea id="ideaText" placeholder="Describe tu idea aquí..."></textarea>
    
    <button id="sendBtn" class="btn">ENVIAR AL SISTEMA 🚀</button>
    <div id="status-msg"></div>
</div>

<script type="module">
    // ... (Importaciones y config igual que antes) ...

    const sendBtn = document.getElementById('sendBtn');

    sendBtn.addEventListener('click', async () => {
        const contenido = document.getElementById('ideaText').value.trim();
        const autor = document.getElementById('authorName').value.trim() || "Explorador Anónimo";

        if (!contenido) {
            alert("Escribe una idea antes de enviar.");
            return;
        }

        sendBtn.disabled = true;
        sendBtn.innerText = "ENVIANDO...";

        try {
            await addDoc(collection(db, "ideas"), {
                content: contenido,
                author: autor, // CONECTADO: Aquí se guarda el nombre
                likes: 0,
                dislikes: 0,
                createdAt: Date.now()
            });

            alert("¡Idea enviada exitosamente!");
            window.location.href = "top-ideas.html";
        } catch (error) {
            alert("Error al conectar.");
            sendBtn.disabled = false;
        }
    });
</script>
