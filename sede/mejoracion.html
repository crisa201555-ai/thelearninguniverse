<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mejoración | S.E.D.E.</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; background: #0f172a; color: white; padding: 40px; }
        .timeline { max-width: 600px; margin: auto; border-left: 2px solid #00cec9; padding-left: 20px; }
        .event { margin-bottom: 30px; position: relative; }
        .event::before { content: ''; position: absolute; left: -31px; top: 5px; width: 20px; height: 20px; background: #6c5ce7; border-radius: 50%; }
        .date { color: #00cec9; font-weight: 700; }
    </style>
</head>
<body>
    <h1>🛰️ Historial de Mejoración</h1>
    <div class="timeline">
        <div class="event">
            <div class="date">Mayo 2026</div>
            <h3>Lanzamiento de Ideas-New</h3>
            <p>Se integra el sistema de ranking dinámico y votación comunitaria para mejorar S.E.D.E.</p>
        </div>
        <div class="event">
            <div class="date">Abril 2026</div>
            <h3>Fundación Ministerio TLU</h3>
            <p>Nace el sistema educacional del estudiante con soporte para clases en tiempo real.</p>
        </div>
    </div>
</body>
</html>
