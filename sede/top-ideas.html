<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Top Ideas | S.E.D.E.</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --bg: #0f172a; --danger: #ff7675; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        h1 { text-align: center; color: var(--s); font-size: 2.5rem; margin-bottom: 5px; }
        .idea-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 20px; border-left: 6px solid var(--p); }
        .rank-num { font-size: 1.8rem; font-weight: 700; color: var(--s); min-width: 45px; }
        .content { flex-grow: 1; }
        .content p { margin: 0; font-size: 1.1rem; }
        .author-tag { color: var(--s); font-size: 0.85rem; font-weight: 700; margin-top: 5px; display: block; }
        .actions { display: flex; flex-direction: column; gap: 8px; }
        .btn-vote { border: none; padding: 8px 12px; border-radius: 12px; cursor: pointer; font-family: 'Fredoka'; font-weight: 700; transition: 0.2s; }
        .btn-up { background: #55efc4; color: #004d3b; }
        .btn-down { background: var(--danger); color: #4d0000; }
        .btn-vote:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Top Ideas S.E.D.E.</h1>
    <p style="text-align:center; opacity:0.6; margin-bottom:40px;">Ranking del 1 al 50. Borrado automático tras 24h o 50,000 dislikes.</p>
    <div id="ideasContainer"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, onSnapshot, doc, updateDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI",
        authDomain: "thelearninguniverse-26.firebaseapp.com",
        projectId: "thelearninguniverse-26",
        storageBucket: "thelearninguniverse-26.firebasestorage.app",
        messagingSenderId: "85338996011",
        appId: "1:85338996011:web:1f3bb216900c07e735596e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const q = query(collection(db, "ideas"), orderBy("likes", "desc"), limit(50));

    onSnapshot(q, (snapshot) => {
        const container = document.getElementById('ideasContainer');
        container.innerHTML = "";
        let i = 1;

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;
            const yaVoto = localStorage.getItem(`voto_${id}`);

            // Borrado 24h
            if (Date.now() - data.createdAt > 86400000) {
                deleteDoc(doc(db, "ideas", id));
                return;
            }

            const card = document.createElement('div');
            card.className = 'idea-card';
            card.innerHTML = `
                <div class="rank-num">#${i}</div>
                <div class="content">
                    <p>${data.content}</p>
                    <span class="author-tag">🖋️ Autor: ${data.author || 'Anónimo'}</span>
                </div>
                <div class="actions">
                    <button class="btn-vote btn-up" id="up-${id}" ${yaVoto ? 'disabled' : ''}>👍 ${data.likes}</button>
                    <button class="btn-vote btn-down" id="down-${id}" ${yaVoto ? 'disabled' : ''}>👎 ${data.dislikes}</button>
                </div>
            `;
            container.appendChild(card);

            document.getElementById(`up-${id}`).onclick = () => votar(id, 'likes');
            document.getElementById(`down-${id}`).onclick = () => votar(id, 'dislikes', data.dislikes);
            i++;
        });
    });

    async function votar(id, campo, currentDislikes = 0) {
        if (localStorage.getItem(`voto_${id}`)) return;
        const ref = doc(db, "ideas", id);

        if (campo === 'dislikes' && currentDislikes >= 49999) {
            await deleteDoc(ref);
            alert("Eliminado por 50,000 dislikes.");
        } else {
            await updateDoc(ref, { [campo]: increment(1) });
            localStorage.setItem(`voto_${id}`, 'true');
        }
    }
</script>
</body>
</html>
