<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Top Ideas | S.E.D.E.</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; background: #0f172a; color: white; padding: 20px; }
        .ranking-container { max-width: 800px; margin: auto; }
        .idea-item { 
            background: rgba(255,255,255,0.05); margin-bottom: 15px; padding: 20px; 
            border-radius: 20px; display: flex; align-items: center; gap: 20px;
            border-left: 5px solid #6c5ce7;
        }
        .rank-num { font-size: 2rem; font-weight: 700; color: #00cec9; min-width: 50px; }
        .idea-content { flex-grow: 1; }
        .votes { display: flex; flex-direction: column; gap: 5px; }
        .vote-btn { border: none; padding: 5px 15px; border-radius: 10px; cursor: pointer; font-family: 'Fredoka'; }
    </style>
</head>
<body>
    <div class="ranking-container">
        <h1>🏆 Clasificación de Ideas-New</h1>
        <p>Las ideas con más dislikes desaparecen del sistema.</p>
        <div id="topList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-web-cloud-firestore.js";

        const db = getFirestore(initializeApp({ /* TU CONFIG */ }));

        // Cargar Top 50 ordenado por Likes
        const q = query(collection(db, "ideas"), orderBy("likes", "desc"), limit(50));

        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('topList');
            list.innerHTML = "";
            let rank = 1;

            snapshot.forEach((docSnap) => {
                const idea = docSnap.data();
                const id = docSnap.id;

                // Regla de las 24 horas: Si pasaron más de 86400 segundos, ignorar/borrar
                const tiempoPasado = (Date.now() - idea.createdAt) / 1000;
                if (tiempoPasado > 86400) {
                    deleteDoc(doc(db, "ideas", id));
                    return;
                }

                const div = document.createElement('div');
                div.className = 'idea-item';
                div.innerHTML = `
                    <div class="rank-num">#${rank}</div>
                    <div class="idea-content">
                        <p>${idea.content}</p>
                        <small>Enviado por: ${idea.author}</small>
                    </div>
                    <div class="votes">
                        <button class="vote-btn" style="background:#55efc4" onclick="votar('${id}', 'likes')">👍 ${idea.likes}</button>
                        <button class="vote-btn" style="background:#ff7675" onclick="votar('${id}', 'dislikes', ${idea.dislikes})">👎 ${idea.dislikes}</button>
                    </div>
                `;
                list.appendChild(div);
                rank++;
            });
        });

        window.votar = async (id, tipo, currentDislikes) => {
            const ref = doc(db, "ideas", id);
            if (tipo === 'dislikes' && currentDislikes >= 10) {
                // Según tu documentación: Si tiene dislikes, desaparece
                await deleteDoc(ref);
                alert("Idea eliminada por la comunidad.");
            } else {
                await updateDoc(ref, { [tipo]: increment(1) });
            }
        };
    </script>
</body>
</html>
