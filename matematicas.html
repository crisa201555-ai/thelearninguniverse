<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLU | Matemáticas</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; 
            --accent: #d946ef; /* Magenta/Fucsia para Matemáticas */
            --glass: rgba(217, 70, 239, 0.05); 
            --border: rgba(217, 70, 239, 0.2);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: radial-gradient(circle at bottom left, #4c1d95, #020617);
            overflow-x: hidden;
        }

        .nav-top { 
            padding: 25px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-link { 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: 600; 
            transition: 0.3s;
        }

        .content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 60px 20px; 
            gap: 25px; 
        }

        h1 { 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            color: #f5d0fe; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            text-align: center;
            text-shadow: 0 0 20px rgba(217, 70, 239, 0.3);
        }

        .unit-card {
            width: 100%;
            max-width: 850px;
            background: var(--glass);
            border-radius: 30px;
            border: 1px solid var(--border);
            padding: 30px 45px;
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.4s;
        }

        .unit-card:hover {
            border-color: var(--accent);
            transform: scale(1.03);
            background: rgba(217, 70, 239, 0.1);
        }

        .unit-info h2 { margin: 0; font-size: 1.8rem; }
        .unit-info p { margin: 8px 0 0; opacity: 0.7; color: #f5d0fe; }

        .btn-launch {
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Fredoka';
        }

        .btn-launch:hover {
            background: #e879f9;
            box-shadow: 0 0 25px rgba(217, 70, 239, 0.6);
        }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="home.html" class="back-link">← VOLVER AL HOME</a>
        <div style="color: var(--accent); font-weight: 700; letter-spacing: 2px;">MATH UNIVERSE</div>
    </nav>

    <div class="content">
        <h1>Cálculo Estelar</h1>
        <p style="color: var(--accent); font-weight: 600; letter-spacing: 2px;">CÓDIGOS NUMÉRICOS</p>

        <div class="unit-card">
            <div class="unit-info">
                <h2>Operaciones Básicas</h2>
                <p>Domina las sumas y restas intergalácticas.</p>
            </div>
            <button class="btn-launch" onclick="location.href='matematicas/seleccion-modo.html?lesson=operaciones'">MISION 01</button>
        </div>

        <div class="unit-card">
            <div class="unit-info">
                <h2>Formas y Figuras</h2>
                <p>Triángulos, cuadrados y círculos espaciales.</p>
            </div>
            <button class="btn-launch" onclick="location.href='matematicas/seleccion-modo.html?lesson=geometria'">MISION 02</button>
        </div>

        <div class="unit-card">
            <div class="unit-info">
                <h2>Fracciones</h2>
                <p>Aprende a dividir el todo en partes iguales.</p>
            </div>
            <button class="btn-launch" onclick="location.href='matematicas/seleccion-modo.html?lesson=fracciones'">MISION 03</button>
        </div>

    </div>

</body>
</html>
