<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Biblioteca de Resúmenes</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="../js/auth.js"></script>
    <style>
        :root {
            --tlu-blue: #38bdf8;
            --tlu-purple: #d946ef;
            --bg: #020617;
        }

        body {
            margin: 0;
            font-family: 'Fredoka', sans-serif;
            background: var(--bg);
            background: radial-gradient(circle at top left, #1e1b4b 0%, #020617 100%);
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--tlu-blue);
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            margin-bottom: 10px;
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 50px;
            width: 100%;
            max-width: 500px;
            color: white;
            font-size: 1rem;
            margin: 20px auto;
            display: block;
            outline: none;
            transition: 0.3s;
        }

        .search-bar:focus {
            border-color: var(--tlu-blue);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .book-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: 0.4s;
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .book-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--tlu-blue);
        }

        .book-card img {
            width: 140px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .book-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            margin: 10px 0 5px 0;
            color: var(--tlu-blue);
        }

        .book-card p {
            font-size: 0.9rem;
            opacity: 0.7;
            margin: 0;
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--tlu-purple);
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 50px;
            font-weight: bold;
        }

        .btn-back {
            display: inline-block;
            margin-top: 50px;
            padding: 10px 25px;
            color: #94a3b8;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-back:hover { color: white; }

        footer {
            text-align: center;
            margin-top: 100px;
            padding-bottom: 40px;
            opacity: 0.3;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>CENTRAL DE LIBROS</h1>
            <p>Explora más de 500 resúmenes exclusivos para cadetes de TLU.</p>
            <input type="text" class="search-bar" placeholder="Buscar un libro o autor...">
        </header>

        <div class="books-grid">
            
            <a href="resumendelibros/elprincipito.html" class="book-card">
                <span class="badge">CLÁSICO</span>
                <img src="principito.jpg" alt="El Principito">
                <h3>El Principito</h3>
                <p>Antoine de Saint-Exupéry</p>
            </a>

            <a href="resumendelibros/loscretinos.html" class="book-card">
                <span class="badge">NUEVO</span>
                <img src="los-cretinos.jpg" alt="Los Cretinos">
                <h3>Los Cretinos</h3>
                <p>Roald Dahl</p>
            </a>

            <a href="resumendelibros/papelucho.html" class="book-card">
                <img src="papelucho-diario.jpg" alt="Papelucho">
                <h3>Papelucho</h3>
                <p>Marcela Paz</p>
            </a>

            <a href="resumendelibros/papelucho-dixleso.html" class="book-card">
                <img src="papelucho-dixleso.jpg" alt="Papelucho Dix-leso">
                <h3>¿Soy Dix-leso?</h3>
                <p>Marcela Paz</p>
            </a>

            <a href="resumendelibros/papelucho-clinica.html" class="book-card">
                <img src="papelucho-clinica.jpg" alt="Papelucho Clínica">
                <h3>En la Clínica</h3>
                <p>Marcela Paz</p>
            </a>

        </div>

        <center>
            <a href="../lenguaje.html" class="btn-back">← Volver a Lenguaje</a>
        </center>
