<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | History Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --accent: #d4af37; --glass: rgba(255, 255, 255, 0.03); }
        body {
            background: var(--bg); color: white; font-family: 'Fredoka', sans-serif; margin: 0;
            display: flex; flex-direction: column; height: 100vh;
            background: radial-gradient(circle at top right, #1c1917, #0a0a0a);
        }
        .nav-top { padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; }
        .back-link { color: #888; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .back-link:hover { color: var(--accent); }
        
        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        h1 { font-size: 3.5rem; color: var(--accent); margin-bottom: 50px; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }

        .history-table {
            width: 100%; max-width: 1000px; background: var(--glass);
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; backdrop-filter: blur(15px); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(212, 175, 55, 0.15); color: var(--accent); padding: 25px; text-align: left; font-size: 0.85rem; letter-spacing: 1px; }
        td { padding: 30px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .badge { background: rgba(74, 222, 128, 0.1); color: #4ade80; padding: 6px 15px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(74, 222, 128, 0.2); }
        .btn-enter {
            background: var(--accent); color: #000; border: none; padding: 14px 30px;
            border-radius: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Fredoka';
        }
        .btn-enter:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body>
    <nav class="nav-top">
        <a href="home.html" class="back-link">← DASHBOARD</a>
        <div style="color: var(--accent); font-weight: 700; letter-spacing: 2px;">HISTORY UNIVERSE</div>
    </nav>
    <div class="content">
        <h1>Cronología</h1>
        <div class="history-table">
            <table>
                <thead>
                    <tr>
                        <th>UNIDAD</th>
                        <th>TEMA</th>
                        <th>DURACIÓN</th>
                        <th>ESTADO</th>
                        <th>ACCIÓN</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><b>Pueblos Originarios</b></td>
                        <td>Raíces y diversidad en Chile</td>
                        <td>5-10 min</td>
                        <td><span class="badge">DISPONIBLE</span></td>
                        <td><button class="btn-enter" onclick="location.href='history/select-mode.html'">ENTRAR</button></td>
                    </tr>
                    <tr style="opacity: 0.3;">
                        <td><b>Edad Media</b></td>
                        <td>Castillos y Feudalismo</td>
                        <td>20 min</td>
                        <td><span style="font-size: 0.8rem;">BLOQUEADO</span></td>
                        <td><button class="btn-enter" style="background:#333; color:#777; cursor:not-allowed;">CERRADO</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
