<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLU | Mis Cursos</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --p-light: #f3f0ff; --s: #00cec9; --bg: #ffffff; --text: #1e293b; --danger: #ff7675; }
        
        body { font-family: 'Fredoka', sans-serif; background: #fbfcfe; color: var(--text); margin: 0; padding: 0; }

        /* HEADER & NAVBAR */
        nav { background: white; padding: 0 5%; height: 75px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #edf2f7; position: sticky; top: 0; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.4rem; color: var(--p); cursor: pointer; }
        
        /* PERFIL DE USUARIO */
        .user-section { position: relative; }
        .avatar-frame { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--p); padding: 2px; cursor: pointer; transition: 0.2s; }
        .avatar-frame:hover { transform: scale(1.05); }
        .avatar-frame img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .profile-dropdown { 
            position: absolute; top: 60px; right: 0; width: 260px; background: white; 
            border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            border: 1px solid #edf2f7; display: none; padding: 20px; text-align: center;
        }
        .profile-dropdown.active { display: block; animation: slideDown 0.3s ease; }
        .profile-dropdown h4 { margin: 10px 0 5px; font-size: 1.1rem; }
        .profile-dropdown p { margin: 0 0 20px; font-size: 0.85rem; color: #64748b; word-break: break-all; }

        /* CONTENIDO PRINCIPAL */
        .main-container { max-width: 1100px; margin: 50px auto; padding: 0 25px; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header-actions h1 { font-size: 2rem; font-weight: 700; margin: 0; }

        /* GRID DE CURSOS */
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .course-card { 
            background: white; border-radius: 24px; padding: 25px; border: 1px solid #edf2f7; 
            transition: all 0.3s ease; display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        }
        .course-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02); border-color: var(--p); }
        
        .tag-expiry { font-size: 0.75rem; font-weight: 600; color: var(--danger); background: #fff5f5; padding: 6px 12px; border-radius: 12px; width: fit-content; }
        .course-name { font-size: 1.5rem; font-weight: 700; margin: 0; color: var(--text); }
        .course-teacher { font-size: 0.9rem; color: #64748b; margin: 0; }

        /* BOTONES */
        .btn { padding: 12px 20px; border-radius: 15px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: 'Fredoka'; font-size: 0.9rem; }
        .btn-new { background: var(--p); color: white; display: flex; align-items: center; gap: 8px; }
        .btn-test { background: var(--p); color: white; }
        .btn-members { background: var(--p-light); color: var(--p); }
        .btn-logout { background: #fee2e2; color: #ef4444; width: 100%; margin-top: 10px; }
        .card-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="location.href='/viewmygroups'">
            <img src="https://thelearninguniverses.pages.dev/unnamed-removebg-preview.png" width="45">
            <span>TLU</span>
        </div>
        <div class="user-section">
            <div class="avatar-frame" onclick="toggleDropdown()">
                <img id="navPhoto" src="https://ui-avatars.com/api/?name=Docente&background=6c5ce7&color=fff" alt="Perfil">
            </div>
            <div id="drop" class="profile-dropdown">
                <h4 id="dropName">Usuario</h4>
                <p id="dropEmail">email@tlu.com</p>
                <hr style="opacity: 0.1; margin: 15px 0;">
                <button class="btn btn-logout" onclick="globalLogout()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <main class="main-container">
        <div class="header-actions">
            <div>
                <h1>Mis Cursos</h1>
                <p style="opacity: 0.6; margin: 5px 0 0;">Gestión de aulas activas en las últimas 24 horas.</p>
            </div>
            <button class="btn btn-new" onclick="location.href='/creategroup.html'">
                <span>+</span> Crear Nueva Clase
            </button>
        </div>

        <div id="coursesGrid" class="courses-grid">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 1. Control de Autenticación y Perfil
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('navPhoto').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.email}`;
                document.getElementById('dropName').innerText = user.displayName || "Docente TLU";
                document.getElementById('dropEmail').innerText = user.email;
                syncMyCourses(user.email);
            } else {
                window.location.href = "/login";
            }
        });

        window.toggleDropdown = () => document.getElementById('drop').classList.toggle('active');

        window.globalLogout = () => {
            signOut(auth).then(() => {
                localStorage.clear();
                window.location.href = "/login";
            });
        };

        // 2. Lógica de Sincronización y Expiración (24 Horas)
        function syncMyCourses(email) {
            const grid = document.getElementById('coursesGrid');
            const unDia = 24 * 60 * 60 * 1000;

            onSnapshot(query(collection(db, "groups"), where("teacherEmail", "==", email)), (snap) => {
                grid.innerHTML = "";
                const ahora = Date.now();

                if (snap.empty) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px; opacity: 0.5;">No tienes cursos activos. ¡Crea uno para empezar!</div>`;
                }

                snap.forEach((d) => {
                    const data = d.data();
                    const transcurrido = ahora - data.createdAt;

                    if (transcurrido > unDia) {
                        deleteDoc(doc(db, "groups", d.id)); // Borrado automático
                    } else {
                        const horasRestantes = Math.round((unDia - transcurrido) / (1000 * 60 * 60));
                        
                        const card = document.createElement('div');
                        card.className = 'course-card';
                        card.innerHTML = `
                            <div class="tag-expiry">⏳ Expira en ${horasRestantes}h</div>
                            <h2 class="course-name">${data.className}</h2>
                            <p class="course-teacher">Prof. ${data.teacherName}</p>
                            <div class="card-footer">
                                <button class="btn btn-members" onclick="location.href='/viewmygroups/viewmembers?uidclass=${d.id}'">👥 Miembros</button>
                                <button class="btn btn-test" onclick="location.href='/generator-test.html?uidclass=${d.id}'">✏️ Prueba</button>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            });
        }

        // Cerrar dropdown al hacer click fuera
        window.onclick = function(event) {
            if (!event.target.closest('.user-section')) {
                document.getElementById('drop').classList.remove('active');
            }
        }
    </script>
</body>
</html>
