<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLU | Dashboard Docente</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --bg: #ffffff; --text: #1e293b; --danger: #ff7675; --border: #edf2f7; }
        
        body { font-family: 'Fredoka', sans-serif; background: #fbfcfe; color: var(--text); margin: 0; padding: 0; }

        /* --- NAVEGACIÓN --- */
        nav { 
            background: white; padding: 0 5%; height: 75px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; 
        }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.4rem; color: var(--p); cursor: pointer; }
        
        .profile-container { position: relative; cursor: pointer; }
        .user-photo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--p); padding: 2px; }
        
        .profile-frame { 
            position: absolute; top: 60px; right: 0; width: 260px; background: white; 
            border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            border: 1px solid var(--border); display: none; padding: 20px; text-align: center;
        }
        .profile-frame.active { display: block; animation: slideIn 0.3s ease; }
        .profile-frame h4 { margin: 10px 0 5px; font-size: 1.1rem; }
        .profile-frame p { margin: 0 0 20px; font-size: 0.85rem; color: #64748b; }

        /* --- CONTENIDO --- */
        .main { max-width: 1100px; margin: 50px auto; padding: 0 25px; }
        .welcome-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .welcome-section h1 { font-size: 2.2rem; font-weight: 700; margin: 0; }

        /* --- GRID DE CURSOS --- */
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        .course-card { 
            background: white; border-radius: 25px; padding: 25px; border: 1px solid var(--border); 
            transition: 0.3s; display: flex; flex-direction: column; gap: 15px; position: relative;
        }
        .course-card:hover { transform: translateY(-8px); border-color: var(--p); box-shadow: 0 20px 25px rgba(0,0,0,0.05); }
        
        .expiry-badge { 
            font-size: 0.75rem; font-weight: 700; color: var(--danger); background: #fff1f1; 
            padding: 6px 12px; border-radius: 12px; width: fit-content; 
        }

        /* --- BOTONES --- */
        .btn { padding: 12px 20px; border-radius: 15px; border: none; font-weight: 600; cursor: pointer; font-family: 'Fredoka'; transition: 0.3s; }
        .btn-main { background: var(--p); color: white; }
        .btn-secondary { background: #f1f5f9; color: var(--text); }
        .btn-danger { background: #fee2e2; color: #ef4444; width: 100%; }
        
        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="location.href='/viewmygroups'">
            <img src="https://thelearninguniverses.pages.dev/unnamed-removebg-preview.png" width="40">
            <span>The Learning Universe</span>
        </div>
        <div class="profile-container" onclick="toggleProfile()">
            <img id="navAvatar" class="user-photo" src="https://ui-avatars.com/api/?name=Docente&background=6c5ce7&color=fff">
            <div id="profileFrame" class="profile-frame">
                <h4 id="profName">Nombre Docente</h4>
                <p id="profEmail">correo@ejemplo.com</p>
                <hr style="opacity: 0.1; margin: 15px 0;">
                <button class="btn btn-danger" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <main class="main">
        <div class="welcome-section">
            <div>
                <h1>Mis Cursos</h1>
                <p style="opacity: 0.6; margin-top: 5px;">Recuerda: Los cursos se eliminan tras 24 horas de inactividad.</p>
            </div>
            <button class="btn btn-main" onclick="location.href='/creategroup.html'">+ Nueva Clase</button>
        </div>

        <div id="grid" class="courses-grid">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", 
            authDomain: "thelearninguniverse-26.firebaseapp.com", 
            projectId: "thelearninguniverse-26", 
            storageBucket: "thelearninguniverse-26.firebasestorage.app", 
            messagingSenderId: "85338996011", 
            appId: "1:85338996011:web:1f3bb216900c07e735596e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 1. Control de Perfil y Sesión
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('profName').innerText = user.displayName || "Docente TLU";
                document.getElementById('profEmail').innerText = user.email;
                if(user.photoURL) document.getElementById('navAvatar').src = user.photoURL;
                loadMyGroups(user.email);
            } else {
                window.location.href = "/login";
            }
        });

        window.toggleProfile = () => document.getElementById('profileFrame').classList.toggle('active');
        
        window.logout = () => {
            signOut(auth).then(() => {
                localStorage.clear();
                window.location.href = "/login";
            });
        };

        // 2. Cargar Cursos con Lógica de Auto-Borrado (24 Horas)
        function loadMyGroups(email) {
            const grid = document.getElementById('grid');
            const unDiaMS = 24 * 60 * 60 * 1000;

            onSnapshot(query(collection(db, "groups"), where("teacherEmail", "==", email)), (snap) => {
                grid.innerHTML = "";
                const ahora = Date.now();

                if (snap.empty) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 100px; opacity: 0.4;">
                        <h3>Aún no has creado ningún curso.</h3>
                    </div>`;
                    return;
                }

                snap.forEach(d => {
                    const data = d.data();
                    const tiempoTranscurrido = ahora - data.createdAt;

                    // Si pasaron más de 24h, lo borramos de Firebase
                    if (tiempoTranscurrido > unDiaMS) {
                        deleteDoc(doc(db, "groups", d.id));
                        return;
                    }

                    const horasRestantes = Math.max(0, Math.round((unDiaMS - tiempoTranscurrido) / (1000 * 60 * 60)));

                    const card = document.createElement('div');
                    card.className = 'course-card';
                    card.innerHTML = `
                        <div class="expiry-badge">⏳ Expira en ${horasRestantes}h</div>
                        <h2 style="margin: 0; color: var(--p); font-size: 1.5rem;">${data.className}</h2>
                        <p style="margin: 0; font-size: 0.9rem; opacity: 0.6;">Prof. ${data.teacherName}</p>
                        <div class="card-actions">
                            <button class="btn btn-secondary" onclick="location.href='/viewmygroups/viewmembers?uidclass=${d.id}'">👥 Miembros</button>
                            <button class="btn btn-main" onclick="location.href='/generator-test?uidclass=${d.id}'">📝 Examen</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }
    </script>
</body>
</html>
