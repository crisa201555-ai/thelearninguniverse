<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLU | Panel del Docente</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --bg: #f8fafc; --text: #1e293b; --danger: #ff7675; }
        
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* --- NAVBAR --- */
        nav { background: white; padding: 0 5%; height: 70px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #edf2f7; position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--p); font-size: 1.3rem; }
        
        .profile-zone { position: relative; cursor: pointer; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--p); }
        .dropdown { position: absolute; top: 55px; right: 0; width: 220px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; padding: 20px; border: 1px solid #eee; }
        .dropdown.active { display: block; }

        /* --- CONTENIDO --- */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #edf2f7; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        /* --- BOTONES --- */
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; font-family: 'Fredoka'; transition: 0.3s; }
        .btn-p { background: var(--p); color: white; width: 100%; margin-top: 10px; }
        .btn-logout { background: #fff1f1; color: var(--danger); width: 100%; margin-top: 10px; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--p); color: white; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4); z-index: 998; }

        /* --- PANEL FLOTANTE (DRAG & DROP) --- */
        #invitePanel { 
            position: fixed; top: 100px; left: 50px; width: 300px; 
            background: white; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            border: 2px solid var(--p); z-index: 999; display: none; touch-action: none;
        }
        #inviteHeader { 
            background: var(--p); color: white; padding: 15px; 
            border-radius: 15px 15px 0 0; cursor: move; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .panel-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .panel-input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; font-family: 'Fredoka'; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <img src="https://thelearninguniverses.pages.dev/unnamed-removebg-preview.png" width="35"> TLU
        </div>
        <div class="profile-zone" onclick="toggleDrop()">
            <img id="userImg" class="avatar" src="https://ui-avatars.com/api/?name=Docente">
            <div id="drop" class="dropdown">
                <b id="userName">Docente</b>
                <p id="userEmail" style="font-size: 0.8rem; opacity: 0.6; margin: 5px 0;"></p>
                <button class="btn btn-logout" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>Mis Cursos</h1>
            <button class="btn" style="background: var(--s); color: #004d3b;" onclick="location.href='creategroup.html'">+ Nuevo Grupo</button>
        </div>
        <div id="coursesGrid" class="grid">
            </div>
    </div>

    <button class="fab" onclick="togglePanel()">+</button>

    <div id="invitePanel">
        <div id="inviteHeader">
            <span>🚀 Invitar Alumno</span>
            <span onclick="togglePanel()" style="cursor: pointer;">&times;</span>
        </div>
        <div class="panel-body">
            <input type="email" id="invEmail" class="panel-input" placeholder="correo@estudiante.com">
            <button class="btn btn-p" id="sendInv">ENVIAR INVITACIÓN</button>
            <p id="invStatus" style="display:none; color: var(--s); font-size: 0.8rem; text-align: center;">✅ Enviada con éxito</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, addDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 1. Gestión de Sesión
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userName').innerText = user.displayName || "Docente";
                document.getElementById('userEmail').innerText = user.email;
                if(user.photoURL) document.getElementById('userImg').src = user.photoURL;
                loadCourses(user.email);
            } else {
                window.location.href = "/login";
            }
        });

        window.toggleDrop = () => document.getElementById('drop').classList.toggle('active');
        window.logout = () => { signOut(auth).then(() => { localStorage.clear(); window.location.href = "/login"; }); };

        // 2. Cargar Cursos (Lógica 24h)
        function loadCourses(email) {
            onSnapshot(query(collection(db, "groups"), where("teacherEmail", "==", email)), (snap) => {
                const grid = document.getElementById('coursesGrid');
                grid.innerHTML = "";
                const ahora = Date.now();
                
                snap.forEach(d => {
                    const data = d.data();
                    const transcurrido = ahora - data.createdAt;
                    if (transcurrido > 86400000) { deleteDoc(doc(db, "groups", d.id)); return; }

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3 style="margin:0; color:var(--p)">${data.className}</h3>
                        <p style="font-size:0.8rem; opacity:0.6">ID: ${d.id}</p>
                        <button class="btn btn-p" onclick="localStorage.setItem('activeGroupId','${d.id}'); alert('Clase seleccionada para invitar');">Seleccionar para Invitar</button>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        // 3. Lógica del Panel Flotante e Invitación
        window.togglePanel = () => {
            const p = document.getElementById('invitePanel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        };

        document.getElementById('sendInv').onclick = async () => {
            const email = document.getElementById('invEmail').value;
            const gid = localStorage.getItem('activeGroupId');
            if(!email || !gid) return alert("Escribe un email y selecciona una clase de la lista.");

            await addDoc(collection(db, "members"), {
                groupId: gid, email: email, status: "invited", createdAt: Date.now()
            });

            document.getElementById('invStatus').style.display = 'block';
            document.getElementById('invEmail').value = "";
            setTimeout(() => document.getElementById('invStatus').style.display = 'none', 3000);
        };

        // --- LÓGICA DRAG & DROP (MOVIMIENTO) ---
        const panel = document.getElementById("invitePanel");
        const header = document.getElementById("inviteHeader");
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        header.addEventListener("mousedown", dragStart);
        document.addEventListener("mousemove", drag);
        document.addEventListener("mouseup", dragEnd);

        function dragStart(e) {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
            if (e.target === header || e.target.parentNode === header) active = true;
        }
        function drag(e) {
            if (active) {
                e.preventDefault();
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
                xOffset = currentX; yOffset = currentY;
                panel.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        }
        function dragEnd() { active = false; }

    </script>
</body>
</html>
