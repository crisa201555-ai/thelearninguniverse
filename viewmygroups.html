<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Nueva Clase</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --bg: #ffffff; }
        body { font-family: 'Fredoka', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); width: 350px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid #eee; font-family: 'Fredoka'; box-sizing: border-box; }
        .btn { background: var(--p); color: white; border: none; padding: 15px; border-radius: 50px; cursor: pointer; width: 100%; font-weight: 700; transition: 0.3s; margin-top: 10px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3); }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://thelearninguniverses.pages.dev/unnamed-removebg-preview.png" width="70">
        <h2 style="color: var(--p)">Configura tu Clase</h2>
        <input type="text" id="className" placeholder="Nombre de la materia (ej: Física)">
        <input type="text" id="teacherName" placeholder="Tu nombre">
        <button class="btn" id="createBtn">CREAR GRUPO</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        document.getElementById('createBtn').onclick = async () => {
            const user = auth.currentUser;
            if(!user) return alert("Inicia sesión primero");

            const docRef = await addDoc(collection(db, "groups"), {
                className: document.getElementById('className').value,
                teacherName: document.getElementById('teacherName').value,
                teacherEmail: user.email,
                createdAt: Date.now()
            });
            localStorage.setItem('activeGroupId', docRef.id);
            window.location.href = "viewmembers.html";
        };
    </script>
</body>
</html>
