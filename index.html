<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI",
    authDomain: "thelearninguniverse-26.firebaseapp.com",
    projectId: "thelearninguniverse-26",
    storageBucket: "thelearninguniverse-26.firebasestorage.app",
    messagingSenderId: "85338996011",
    appId: "1:85338996011:web:1f3bb216900c07e735596e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Lógica de redirección de la raíz /
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = "home.html"; // Si está logueado, va al home
    } else {
      window.location.href = "login.html"; // Si no, al login
    }
  });
</script>
