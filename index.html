<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Learning Universe - Ingreso</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo: #0c1445;
            --celeste: #48dbfb;
            --amarillo: #feca57;
            --blanco: #ffffff;
            --rojo: #ff6b6b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: var(--fondo);
            background-image: radial-gradient(circle at center, #1b277a 0%, #0c1445 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Efecto de Estrellas de fondo */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: 0;
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-title {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            color: var(--amarillo);
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: var(--celeste);
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            color: var(--blanco);
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            margin-left: 10px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            box-shadow: 0 0 15px var(--celeste);
        }

        .btn-ingresar {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: var(--celeste);
            color: var(--fondo);
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 5px 0 #34ace0;
        }

        .btn-ingresar:hover {
            background: var(--amarillo);
            box-shadow: 0 5px 0 #f39c12;
            transform: translateY(-2px);
        }

        .btn-ingresar:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #f39c12;
        }

        .footer-links {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .footer-links a:hover {
            color: var(--amarillo);
        }

        .olvidaste-btn {
            color: var(--rojo) !important;
            font-weight: 600;
        }

        /* Animación de entrada */
        .login-card {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="login-card">
        <div class="logo-title">UNIVERSE</div>
        <div class="subtitle">Misión: Aprender</div>

        <form id="loginForm">
            <div class="input-group">
                <label>Nombre de Usuario o Email</label>
                <input type="text" id="username" placeholder="Ej: Explorador_Cristobal" required>
            </div>

            <div class="input-group">
                <label>Tu Llave Secreta (Password)</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-ingresar">¡INICIAR VIAJE!</button>
        </form>

        <div class="footer-links">
            <a href="#" class="olvidaste-btn" onclick="alert('¡No te preocupes! Contacta a tu profesor o al grupo BMC para resetear tu llave.')">¿Olvidaste tu contraseña?</a>
            <a href="#">¿Eres nuevo? ¡Regístrate aquí!</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Simulación de ingreso exitoso
            window.location.href = 'home.html';
        });
    </script>
</body>
</html>
