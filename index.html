<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Learning Universe - Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-google { background: #4285F4; color: white; }
        .btn-more { background: #e4e6eb; color: #050505; }
        
        /* Estilos del Modal (Ventana de más opciones) */
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; border-radius: 10px; width: 280px; text-align: center; }
        .btn-yahoo { background: #6001d2; color: white; }
        .close { float: right; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>The Learning Universe</h1>
        <p>Inicia sesión para continuar</p>
        
        <button class="btn-google" onclick="loginGoogle()">Iniciar con Google</button>
        
        <button class="btn-more" onclick="openModal()">Ver más opciones...</button>
    </div>

    <div id="moreOptionsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>Otras opciones</h3>
            <button class="btn-yahoo" onclick="loginYahoo()">Iniciar con Yahoo</button>
            <p style="font-size: 12px; color: gray;">Más métodos próximamente...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, OAuthProvider } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI",
            authDomain: "thelearninguniverse-26.firebaseapp.com",
            projectId: "thelearninguniverse-26",
            storageBucket: "thelearninguniverse-26.firebasestorage.app",
            messagingSenderId: "85338996011",
            appId: "1:85338996011:web:1f3bb216900c07e735596e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Funciones de Login Globales
        window.loginGoogle = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                alert("¡Hola " + result.user.displayName + "!");
            } catch (error) {
                alert("Error con Google: " + error.message);
            }
        };

        window.loginYahoo = async () => {
            const provider = new OAuthProvider('yahoo.com');
            try {
                await signInWithPopup(auth, provider);
                alert("Sesión iniciada con Yahoo");
                closeModal();
            } catch (error) {
                alert("Error con Yahoo: " + error.message);
            }
        };

        // Funciones para la Ventana Modal
        const modal = document.getElementById("moreOptionsModal");
        window.openModal = () => modal.style.display = "block";
        window.closeModal = () => modal.style.display = "none";
        
        // Cerrar si hacen clic fuera de la ventana
        window.onclick = (event) => {
            if (event.target == modal) closeModal();
        }
    </script>

</body>
</html>
