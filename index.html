<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, OAuthProvider, 
             signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } 
    from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI",
        authDomain: "thelearninguniverse-26.firebaseapp.com",
        projectId: "thelearninguniverse-26",
        storageBucket: "thelearninguniverse-26.firebasestorage.app",
        messagingSenderId: "85338996011",
        appId: "1:85338996011:web:1f3bb216900c07e735596e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // --- MEJORA: Función para limpiar errores previos ---
    const handleError = (error, providerName) => {
        if (error.code === 'auth/popup-closed-by-user') {
            console.log("El usuario cerró la ventana de " + providerName);
        } else if (error.code === 'auth/cancelled-popup-request') {
            console.log("Solicitud cancelada por nueva petición");
        } else {
            alert("Error con " + providerName + ": " + error.message);
        }
    };

    window.loginGoogle = async () => {
        const provider = new GoogleAuthProvider();
        // Forzar a que siempre pida seleccionar cuenta
        provider.setCustomParameters({ prompt: 'select_account' });
        
        try {
            const result = await signInWithPopup(auth, provider);
            alert("¡Bienvenido, " + result.user.displayName + "!");
        } catch (error) {
            handleError(error, "Google");
        }
    };

    window.loginYahoo = async () => {
        const provider = new OAuthProvider('yahoo.com');
        // Intentar pedir el correo a Yahoo
        provider.addScope('sdpp-w'); 
        provider.addScope('email');

        try {
            const result = await signInWithPopup(auth, provider);
            alert("Sesión iniciada con Yahoo");
            closeModal();
        } catch (error) {
            handleError(error, "Yahoo");
        }
    };

    // ... (Mantén tus funciones de loginEmail, registerUser y modal igual que antes) ...
</script>
