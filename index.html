<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión Matemáticas - Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --naranja: #ff9f43; --celeste: #48dbfb; --amarillo: #feca57; --fondo: #0c1445; --rojo: #ff6b6b; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--fondo); color: white; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* MENÚ SUPERIOR */
        .navbar { background: rgba(255,255,255,0.1); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
        .logo { font-family: 'Fredoka One'; color: var(--amarillo); font-size: 1.5rem; text-decoration: none; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; font-size: 0.9rem; }

        /* CONTENIDO */
        .container { flex: 1; padding: 40px; text-align: center; max-width: 1000px; margin: 0 auto; }
        h1 { font-family: 'Fredoka One'; font-size: 3rem; margin-bottom: 10px; color: var(--celeste); text-shadow: 3px 3px rgba(0,0,0,0.5); }
        
        .grid-opciones { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        
        .card { background: white; border-radius: 30px; padding: 40px; cursor: pointer; transition: 0.3s; border-bottom: 8px solid #ccc; text-decoration: none; display: block; }
        .card:hover { transform: translateY(-10px); }
        .card h2 { font-family: 'Fredoka One'; font-size: 1.8rem; margin: 15px 0; }
        .card p { color: #555; font-weight: 600; }

        .juegos { border-color: var(--naranja); }
        .juegos h2 { color: var(--naranja); }
        .tests { border-color: var(--rojo); }
        .tests h2 { color: var(--rojo); }

        .emoji { font-size: 4rem; display: block; }
        .btn-volver { margin-top: 40px; color: var(--celeste); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="../home.html" class="logo">🚀 UNIVERSE</a>
        <div class="nav-links">
            <a href="../home.html">INICIO</a>
            <a href="../chat.html">CHAT</a>
            <a href="#">MI PERFIL</a>
        </div>
    </nav>

    <div class="container">
        <h1>MISIÓN MATEMÁTICAS</h1>
        <p>¿Qué aventura numérica quieres comenzar hoy?</p>

        <div class="grid-opciones">
            <a href="juego.html" class="card juegos">
                <span class="emoji">🎮</span>
                <h2>JUEGOS EDUCATIVOS</h2>
                <p>¡Aprende jugando con retos espaciales y estrellas!</p>
            </a>

            <a href="test.html" class="card tests">
                <span class="emoji">📝</span>
                <h2>GENERADOR DE TEST</h2>
                <p>¡Pon a prueba tus poderes y conviértete en genio!</p>
            </a>
        </div>

        <a href="../home.html" class="btn-volver">← VOLVER A LA NAVE PRINCIPAL</a>
    </div>

</body>
</html>
