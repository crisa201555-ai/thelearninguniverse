<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Learning Universe - Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f2f5; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { color: #1c1e21; margin-bottom: 0.5rem; }
        p.subtitle { color: #606770; margin-bottom: 20px; font-size: 15px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: #1877f2; }
        
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px; }
        
        .btn-primary { background: #1877f2; color: white; }
        .btn-primary:hover { background: #166fe5; }
        
        .btn-google { background: white; color: #5f6368; border: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google:hover { background: #f8f9fa; }
        
        .btn-more { background: none; color: #1877f2; font-size: 13px; text-decoration: none; border: none; cursor: pointer; padding: 0; }
        .btn-register { background: #42b72a; color: white; margin-top: 20px; }
        .btn-register:hover { background: #36a420; }
        
        .links { margin-top: 15px; font-size: 13px; }
        .links a { color: #1877f2; text-decoration: none; cursor: pointer; }
        
        /* Estilos del Modal */
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 15% auto; padding: 25px; border-radius: 10px; width: 280px; text-align: center; position: relative; }
        .btn-yahoo { background: #6001d2; color: white; }
        .close { position: absolute; right: 15px; top: 10px; cursor: pointer; font-size: 24px; color: #aaa; }
        
        hr { border: 0; border-top: 1px solid #e4e6eb; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>The Learning Universe</h1>
        <p class="subtitle">Bienvenido de nuevo</p>
        
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        
        <button class="btn-primary" onclick="loginEmail()">Iniciar Sesión</button>
        
        <div class="links">
            <a onclick="resetPassword()">¿Olvidaste tu contraseña?</a>
        </div>

        <hr>

        <button class="btn-google" onclick="loginGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/done.svg" width="18" style="display:none">
            Continuar con Google
        </button>
        
        <button class="btn-more" onclick="openModal()">Ver más opciones de acceso...</button>

        <hr>
        
        <button class="btn-register" onclick="registerUser()">Crear cuenta nueva</button>
    </div>

    <div id="moreOptionsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>Otras opciones</h3>
            <button class="btn-yahoo" onclick="loginYahoo()">Acceder con Yahoo</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider, 
            OAuthProvider, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            sendPasswordResetEmail 
        } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        // Tu configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI",
            authDomain: "thelearninguniverse-26.firebaseapp.com",
            projectId: "thelearninguniverse-26",
            storageBucket: "thelearninguniverse-26.firebasestorage.app",
            messagingSenderId: "85338996011",
            appId: "1:85338996011:web:1f3bb216900c07e735596e"
        };

        // Inicialización
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- MANEJO DE ERRORES INTELIGENTE ---
        const handleAuthError = (error, providerName) => {
            // Si el usuario simplemente cierra la ventana, no lanzamos un alert molesto
            if (error.code === 'auth/popup-closed-by-user') {
                console.warn(`Login con ${providerName} cancelado por el usuario.`);
            } else if (error.code === 'auth/cancelled-popup-request') {
                console.warn("Se abrió un nuevo popup antes de cerrar el anterior.");
            } else {
                alert(`Error con ${providerName}: ${error.message}`);
            }
        };

        // --- FUNCIONES DE LOGIN ---

        window.loginEmail = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (!email || !pass) return alert("Por favor rellena todos los campos.");
            
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                alert("¡Sesión iniciada con éxito!");
            } catch (error) {
                alert("Correo o contraseña incorrectos.");
            }
        };

        window.registerUser = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (pass.length < 6) return alert("La contraseña debe tener al menos 6 caracteres.");
            
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("¡Cuenta creada exitosamente! Ya puedes entrar.");
            } catch (error) {
                alert("Error al registrar: " + error.message);
            }
        };

        window.resetPassword = async () => {
            const email = document.getElementById('email').value;
            if (!email) return alert("Escribe tu correo para enviarte el enlace de recuperación.");
            
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Revisa tu bandeja de entrada para restablecer tu contraseña.");
            } catch (error) {
                alert("Error: " + error.message);
            }
        };

        window.loginGoogle = async () => {
            const provider = new GoogleAuthProvider();
            // Esto asegura que siempre te deje elegir cuenta al abrir Google
            provider.setCustomParameters({ prompt: 'select_account' });
            
            try {
                const result = await signInWithPopup(auth, provider);
                alert("Bienvenido, " + result.user.displayName);
            } catch (error) {
                handleAuthError(error, "Google");
            }
        };

        window.loginYahoo = async () => {
            const provider = new OAuthProvider('yahoo.com');
            // Intentamos pedir el email para que no salga vacío en Firebase
            provider.addScope('email');
            provider.addScope('profile');
            
            try {
                await signInWithPopup(auth, provider);
                alert("Sesión iniciada con Yahoo");
                closeModal();
            } catch (error) {
                handleAuthError(error, "Yahoo");
            }
        };

        // --- LÓGICA DEL MODAL ---
        const modal = document.getElementById("moreOptionsModal");
        window.openModal = () => modal.style.display = "block";
        window.closeModal = () => modal.style.display = "none";
        
        // Cerrar si hacen clic fuera del cuadro blanco
        window.onclick = (event) => {
            if (event.target == modal) closeModal();
        };
    </script>

</body>
</html>
