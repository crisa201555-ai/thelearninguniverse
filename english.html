<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TLU | English Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0f1d; --accent: #e63946; --sec: #457b9d; }
        body {
            background: var(--bg); color: white; font-family: 'Fredoka', sans-serif; margin: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
            background: radial-gradient(circle at top right, #1b263b, #0a0f1d);
        }
        .clock-box { position: fixed; top: 20px; right: 40px; text-align: right; }
        #time { font-size: 2rem; font-weight: 700; color: var(--accent); }
        
        .hero { text-align: center; }
        h1 { font-size: 3.5rem; margin: 0; text-shadow: 0 0 20px rgba(230, 57, 70, 0.3); }
        
        .btn-view {
            background: var(--accent); color: white; border: none; padding: 20px 50px;
            border-radius: 50px; font-size: 1.4rem; font-weight: 700; cursor: pointer;
            transition: 0.3s; margin-top: 30px; box-shadow: 0 10px 30px rgba(230, 57, 70, 0.3);
        }
        .btn-view:hover { transform: scale(1.05); background: white; color: var(--accent); }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .table-card {
            background: #161b22; padding: 40px; border-radius: 35px; border: 1px solid #30363d;
            width: 85%; max-width: 850px;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { text-align: left; color: #8b949e; padding: 10px; font-size: 0.9rem; }
        td { padding: 20px 10px; border-bottom: 1px solid #30363d; }
        .btn-start { background: var(--sec); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-start:hover { background: white; color: var(--sec); }
    </style>
</head>
<body>

    <div class="clock-box">
        <div id="time">00:00:00</div>
        <div id="date" style="opacity: 0.6;">---</div>
    </div>

    <div class="hero">
        <h1>English Universe</h1>
        <p style="font-size: 1.2rem; opacity: 0.7;">Let's make learning English a relaxing journey.</p>
        <button class="btn-view" onclick="document.getElementById('m').style.display='flex'">View Lessons</button>
    </div>

    <div id="m" class="modal" onclick="this.style.display='none'">
        <div class="table-card" onclick="event.stopPropagation()">
            <h2 style="margin:0;">🇬🇧 Course Catalog</h2>
            <table>
                <thead>
                    <tr><th>Lesson</th><th>Duration</th><th>Level</th><th>Action</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td><b>Greetings & Introductions</b></td>
                        <td>5 min</td>
                        <td>A1 Beginner</td>
                        <td><button class="btn-start" onclick="location.href='english-selection-mode.html'">Start Lesson</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function update() {
            const n = new Date();
            document.getElementById('time').innerText = n.toLocaleTimeString('en-GB');
            document.getElementById('date').innerText = n.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
