<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Invitar Cadetes | TLU</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        body { background: var(--bg); color: white; font-family: 'Montserrat'; padding: 30px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 25px; border: 1px solid var(--p); }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid var(--p); background: #000; color: white; box-sizing: border-box; }
        .btn-invite { background: var(--p); color: #000; border: none; padding: 15px; border-radius: 50px; font-family: 'Fredoka One'; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-ready { background: var(--s); color: #000; border: none; padding: 15px; border-radius: 50px; font-family: 'Fredoka One'; cursor: pointer; width: 100%; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RECLUTAMIENTO</h1>
        <p>Invita a tus alumnos antes de crear la prueba.</p>
        <input type="email" id="studentEmail" placeholder="Correo del alumno...">
        <button class="btn-invite" id="btnSend">ENVIAR INVITACIÓN</button>
        
        <hr style="opacity:0.2; margin: 20px 0;">
        
        <button class="btn-ready" onclick="window.location.href='generator-test.html'">¡ESTOY LISTO! CREAR PRUEBA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* TU CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gID = localStorage.getItem('currentGroup');

        // Lógica de recordatorio cada 1:30 minutos (90,000 ms)
        setInterval(() => {
            const respuesta = confirm("¿Estás listo? Podemos darte más tiempo si lo necesitas.");
            if(respuesta) {
                // Si dice que está listo, no hace nada (espera a que toque el botón Listo)
            }
        }, 90000);

        document.getElementById('btnSend').onclick = async () => {
            const email = document.getElementById('studentEmail').value;
            if(!email) return;
            await addDoc(collection(db, "invitaciones"), {
                para: email, grupoID: gID, fecha: Date.now()
            });
            alert("Invitación enviada.");
            document.getElementById('studentEmail').value = "";
        };
    </script>
</body>
</html>
