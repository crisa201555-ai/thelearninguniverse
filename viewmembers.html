<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Miembros del Grupo | The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #060918; color: white; font-family: 'Montserrat'; padding: 40px; text-align: center; }
        .box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; max-width: 500px; margin: auto; border: 1px solid #48dbfb; }
        input { padding: 12px; width: 80%; border-radius: 10px; border: none; margin-bottom: 15px; }
        button { padding: 12px 20px; border-radius: 10px; border: none; background: #48dbfb; cursor: pointer; font-weight: bold; }
        .btn-next { background: #feca57; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Invitar Estudiantes</h2>
        <p>Envía invitaciones al correo de tus alumnos</p>
        <input type="email" id="email" placeholder="correo@estudiante.com">
        <button id="send">ENVIAR INVITACIÓN</button>
        <hr style="opacity:0.2; margin: 20px 0;">
        <button class="btn-next" onclick="irAPrueba()">CONFIGURAR PRUEBA DEL GRUPO</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const gID = new URLSearchParams(window.location.search).get('grupo');

        document.getElementById('send').addEventListener('click', async () => {
            const email = document.getElementById('email').value.toLowerCase();
            const gSnap = await getDoc(doc(db, "grupos", gID));
            
            await addDoc(collection(db, "invitaciones"), {
                para: email,
                de: auth.currentUser.email,
                grupoID: gID,
                nombreGrupo: gSnap.data().nombreGrupo,
                estado: "pendiente"
            });
            alert("Invitación enviada con éxito.");
        });

        window.irAPrueba = () => { window.location.href = `generator-test.html?grupo=${gID}`; };
    </script>
</body>
</html>
