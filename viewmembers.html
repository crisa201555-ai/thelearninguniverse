<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Invitar Miembros | TLU</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; background: #0f172a; color: white; padding: 40px; }
        .container { max-width: 600px; margin: auto; }
        .invite-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex-grow: 1; padding: 15px; border-radius: 15px; border: none; }
        .member-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-left: 5px solid #00cec9; }
        .btn-del { background: #ff7675; border: none; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👥 Gestionar Alumnos</h1>
        <div class="invite-box">
            <input type="email" id="studentEmail" placeholder="Correo del estudiante...">
            <button onclick="invite()" style="padding: 15px; border-radius: 15px; background: #6c5ce7; color: white; border: none; cursor: pointer;">Invitar</button>
        </div>
        <div id="memberList">
            </div>
        <button onclick="window.location.href='generator-test.html'" style="margin-top:20px; background:none; border: 1px solid white; color:white; cursor:pointer;">Siguiente: Crear Prueba ➡</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-web-cloud-firestore.js";

        const db = getFirestore(initializeApp({ /* TU CONFIG */ }));
        const groupId = localStorage.getItem('activeGroupId');

        // Escuchar cambios en la lista de invitados
        const q = query(collection(db, "members"), where("groupId", "==", groupId));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('memberList');
            list.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                list.innerHTML += `
                    <div class="member-item">
                        <span>${data.email} <i>(${data.status})</i></span>
                        <button class="btn-del" onclick="removeMember('${docSnap.id}')">Eliminar</button>
                    </div>
                `;
            });
        });

        window.invite = async () => {
            const email = document.getElementById('studentEmail').value;
            if(email) {
                await addDoc(collection(db, "members"), {
                    email: email,
                    groupId: groupId,
                    status: 'pending',
                    online: false
                });
                // AQUÍ LÓGICA PARA ENVIAR CORREO O NOTIFICACIÓN AL INBOX
                document.getElementById('studentEmail').value = "";
            }
        };

        window.removeMember = async (id) => {
            if(confirm("¿Eliminar invitado?")) await deleteDoc(doc(db, "members", id));
        };
    </script>
</body>
</html>
