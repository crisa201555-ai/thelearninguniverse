<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Miembros</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --bg: #0f172a; --danger: #ff7675; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .member-card { background: rgba(255,255,255,0.1); padding: 15px; margin-bottom: 10px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .controls button { margin-left: 5px; cursor: pointer; border: none; padding: 5px 10px; border-radius: 5px; }
        .btn-del { background: var(--danger); color: white; }
        .btn-move { background: var(--s); }
        .invite-box { margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👥 Gestionar Miembros</h1>
        <div class="invite-box">
            <input type="email" id="emailInvite" placeholder="Email del estudiante" style="padding: 10px; border-radius: 10px;">
            <button onclick="invitar()" style="padding: 10px;">Invitar</button>
        </div>
        <div id="membersList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gid = localStorage.getItem('activeGroupId');

        window.invitar = async () => {
            const email = document.getElementById('emailInvite').value;
            await addDoc(collection(db, "members"), {
                groupId: gid,
                email: email,
                status: 'invited',
                position: 0,
                online: false
            });
        };

        onSnapshot(query(collection(db, "members"), where("groupId", "==", gid)), (snap) => {
            const list = document.getElementById('membersList');
            list.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div');
                div.className = 'member-card';
                div.innerHTML = `
                    <span>[Pos: ${m.position}] ${m.email}</span>
                    <div class="controls">
                        <button class="btn-move" onclick="mover('${d.id}', 1)">⬇️</button>
                        <button class="btn-move" onclick="mover('${d.id}', -1)">⬆️</button>
                        <button class="btn-del" onclick="eliminar('${d.id}')">Eliminar</button>
                    </div>
                `;
                list.appendChild(div);
            });
        });

        window.eliminar = async (id) => await deleteDoc(doc(db, "members", id));
        window.mover = async (id, val) => await updateDoc(doc(db, "members", id), { position: increment(val) });
    </script>
</body>
</html>
