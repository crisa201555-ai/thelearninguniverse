<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00ffff; --pink: #ff00ff; --dark: #0a0e17; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; }
        .sidebar { width: 250px; border-right: 1px solid #333; background: rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .contact { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        .contact:hover { background: rgba(0,255,255,0.1); }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        #window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 70%; }
        .sent { align-self: flex-end; background: var(--cyan); color: black; }
        .received { align-self: flex-start; background: #222; }
        .input-bar { padding: 20px; display: flex; gap: 10px; background: #111; }
        input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 10px; }
        button { background: var(--pink); border: none; color: white; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 20px; color: var(--cyan);">CONTACTOS</div>
        <div id="list"></div>
        <a href="home.html" style="margin-top:auto; padding:20px; color:white;">← Volver</a>
    </div>
    <div class="chat-area">
        <div id="header" style="padding: 15px; background: #111; border-bottom: 1px solid #333;">Selecciona alguien</div>
        <div id="window"></div>
        <form id="form" class="input-bar">
            <input type="text" id="input" placeholder="Mensaje..." autocomplete="off">
            <button>ENVIAR</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser, activeChat, unsub;

        onAuthStateChanged(auth, (u) => { if(u) { currentUser = u; loadContacts(); } else window.location.href="index.html"; });

        function loadContacts() {
            onSnapshot(collection(db, "users", currentUser.uid, "contacts"), (s) => {
                const l = document.getElementById('list'); l.innerHTML = "";
                s.forEach(d => {
                    const item = document.createElement('div'); item.className="contact"; item.innerText = d.data().contactName;
                    item.onclick = () => start(d.data().contactId, d.data().contactName);
                    l.appendChild(item);
                });
            });
        }

        function start(id, name) {
            document.getElementById('header').innerText = name;
            const chatKey = [currentUser.uid, id].sort().join("_");
            activeChat = chatKey;
            if(unsub) unsub();
            unsub = onSnapshot(query(collection(db, "chats", chatKey, "messages"), orderBy("timestamp", "asc")), (s) => {
                const w = document.getElementById('window'); w.innerHTML = "";
                s.forEach(d => {
                    const m = document.createElement('div'); m.className = `msg ${d.data().senderId === currentUser.uid ? 'sent' : 'received'}`;
                    m.innerText = d.data().text; w.appendChild(m);
                });
                w.scrollTop = w.scrollHeight;
            });
        }

        document.getElementById('form').onsubmit = async (e) => {
            e.preventDefault(); const t = document.getElementById('input').value;
            if(!t || !activeChat) return;
            document.getElementById('input').value = "";
            await addDoc(collection(db, "chats", activeChat, "messages"), { text: t, senderId: currentUser.uid, timestamp: serverTimestamp() });
        };
    </script>
</body>
</html>
