<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Mi Universo Privado</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --bg: #0f172a; --danger: #ff7675; --success: #2ecc71; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; padding: 40px; margin: 0; min-height: 100vh; }
        .container { max-width: 800px; margin: auto; }
        
        /* Pantalla de Bloqueo / Login */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; border: 1px solid var(--p); text-align: center; }

        .section-title { margin-top: 40px; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; justify-content: space-between; }
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        
        .btn { padding: 12px 20px; border-radius: 50px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Fredoka'; }
        .btn-google { background: white; color: #333; display: flex; align-items: center; gap: 10px; margin-top: 20px; }
        .btn-accept { background: var(--success); color: white; }
        .btn-enter { background: var(--p); color: white; }
        .btn-logout { background: transparent; color: var(--danger); font-size: 0.7rem; border: 1px solid var(--danger); padding: 5px 10px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="login-card">
        <img src="https://thelearninguniverses.pages.dev/unnamed-removebg-preview.png" style="width: 80px; margin-bottom: 20px;">
        <h2>Acceso Estudiantil</h2>
        <p>Para ver tus invitaciones privadas, por favor inicia sesión.</p>
        <button class="btn btn-google" id="loginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Continuar con Google
        </button>
    </div>
</div>

<div class="container" id="main-content" style="display:none;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="https://thelearninguniverses.pages.dev/unnamed-removebg-preview.png" style="width: 50px;">
            <h1>Mi Universo</h1>
        </div>
        <div id="user-info" style="text-align: right;">
            <span id="user-email" style="font-size: 0.8rem; opacity: 0.7;"></span><br>
            <button class="btn btn-logout" id="logoutBtn">Cerrar Sesión</button>
        </div>
    </div>

    <div class="section-title">Invitaciones Pendientes 📩</div>
    <div id="invitesList"></div>

    <div class="section-title">Mis Clases Activas 🚀</div>
    <div id="classesList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI",
        authDomain: "thelearninguniverse-26.firebaseapp.com",
        projectId: "thelearninguniverse-26",
        storageBucket: "thelearninguniverse-26.firebasestorage.app",
        messagingSenderId: "85338996011",
        appId: "1:85338996011:web:1f3bb216900c07e735596e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const authOverlay = document.getElementById('auth-overlay');
    const mainContent = document.getElementById('main-content');

    // 1. Manejo de Autenticación
    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            authOverlay.style.display = "none";
            mainContent.style.display = "block";
            document.getElementById('user-email').innerText = user.email;
            cargarInbox(user.email);
        } else {
            authOverlay.style.display = "flex";
            mainContent.style.display = "none";
        }
    });

    // 2. Cargar Datos Sincronizados
    function cargarInbox(email) {
        onSnapshot(query(collection(db, "members"), where("email", "==", email)), (snap) => {
            const invitesCont = document.getElementById('invitesList');
            const classesCont = document.getElementById('classesList');
            invitesCont.innerHTML = ""; classesCont.innerHTML = "";

            snap.forEach(async (memberDoc) => {
                const memberData = memberDoc.data();
                const groupRef = doc(db, "groups", memberData.groupId);
                const groupSnap = await getDoc(groupRef);
                const g = groupSnap.data() || { className: "Cargando...", teacherName: "Docente" };

                const card = document.createElement('div');
                card.className = 'card';
                
                if(memberData.status === "invited") {
                    card.innerHTML = `
                        <div><h3>${g.className}</h3><p>Prof. ${g.teacherName}</p></div>
                        <div class="actions">
                            <button class="btn btn-accept" onclick="responder('${memberDoc.id}', 'aceptar')">Aceptar</button>
                        </div>`;
                    invitesCont.appendChild(card);
                } else {
                    card.innerHTML = `
                        <div><h3>${g.className}</h3><p>Estado: Activo</p></div>
                        <button class="btn btn-enter" onclick="entrar('${memberData.groupId}')">Entrar</button>`;
                    classesCont.appendChild(card);
                }
            });
        });
    }

    // Funciones globales para botones
    window.responder = async (id, accion) => {
        await updateDoc(doc(db, "members", id), { status: "active" });
    };

    window.entrar = (gid) => {
        localStorage.setItem('activeGroupId', gid);
        window.location.href = "viewclass.html";
    };

</script>
</body>
</html>
