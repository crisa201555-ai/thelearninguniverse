<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TLU | Centro de Comunicaciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --accent: #fd79a8;
            --dark-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Fredoka', sans-serif;
            background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            color: white; display: flex; flex-direction: column;
        }

        /* --- HEADER --- */
        .inbox-header {
            padding: 40px 20px;
            text-align: center;
        }

        .inbox-header h1 {
            font-size: 2.5rem;
            color: var(--secondary);
            margin: 0;
            text-shadow: 0 0 15px rgba(0, 206, 201, 0.3);
        }

        /* --- FILTROS --- */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .filter-link {
            text-decoration: none;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            background: var(--glass);
            border: 2px solid transparent;
            font-weight: 700;
            transition: 0.3s;
        }

        .filter-link:hover, .filter-link.active {
            background: var(--primary);
            border-color: white;
            transform: translateY(-2px);
        }

        /* --- CONTENEDOR DE MENSAJES --- */
        .inbox-container {
            max-width: 800px;
            width: 90%;
            margin: 0 auto 50px auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border-left: 6px solid var(--secondary);
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease forwards;
            transition: 0.3s;
        }

        .message-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.01);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .message-title {
            font-size: 1.2rem;
            color: var(--secondary);
            font-weight: 700;
        }

        .message-date {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .message-body {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .message-actions {
            display: flex;
            justify-content: flex-end;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-family: 'Fredoka';
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-delete:hover { color: #ff7675; text-decoration: underline; }

        /* --- BOTÓN VOLVER --- */
        .btn-back-home {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--secondary);
            color: var(--dark-bg);
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(0, 206, 201, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <header class="inbox-header">
        <h1>📧 Bandeja de Entrada</h1>
        <p>Tus comunicaciones del universo educativo</p>
    </header>

    <div class="filter-bar">
        <a href="inbox.html" class="filter-link" id="filter-all">Todos</a>
        <a href="inbox.html?filtro=clases" class="filter-link" id="filter-clases">Clases</a>
        <a href="inbox.html?filtro=sistema" class="filter-link" id="filter-sistema">Sistema</a>
    </div>

    <main class="inbox-container" id="inbox-list">
        </main>

    <a href="home.html" class="btn-back-home">⬅ Volver al Home</a>

    <script>
        // 1. Obtener el filtro de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const currentFilter = urlParams.get('filtro');

        window.onload = function() {
            highlightFilter();
            renderMessages();
        };

        // Resaltar el botón del filtro activo
        function highlightFilter() {
            if (!currentFilter) {
                document.getElementById('filter-all').classList.add('active');
            } else {
                const activeBtn = document.getElementById('filter-' + currentFilter);
                if (activeBtn) activeBtn.classList.add('active');
            }
        }

        function renderMessages() {
            const container = document.getElementById('inbox-list');
            const mensajes = JSON.parse(localStorage.getItem('inboxMessages')) || [];
            
            // 2. Lógica de Filtrado
            let mensajesFiltrados = mensajes;
            if (currentFilter === 'clases') {
                mensajesFiltrados = mensajes.filter(m => m.titulo.toLowerCase().includes('clase') || m.titulo.toLowerCase().includes('misión'));
            } else if (currentFilter === 'sistema') {
                mensajesFiltrados = mensajes.filter(m => !m.titulo.toLowerCase().includes('clase'));
            }

            if (mensajesFiltrados.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p style="font-size: 4rem;">🛸</p>
                        <p>No hay mensajes en esta categoría.</p>
                    </div>`;
                return;
            }

            container.innerHTML = "";
            mensajesFiltrados.forEach((msg, index) => {
                container.innerHTML += `
                    <div class="message-card">
                        <div class="message-header">
                            <span class="message-title">${msg.titulo}</span>
                            <span class="message-date">${msg.fecha} | ${msg.hora}</span>
                        </div>
                        <div class="message-body">${msg.cuerpo}</div>
                        <div class="message-actions">
                            <button class="btn-delete" onclick="borrarMensaje(${index})">Eliminar Registro</button>
                        </div>
                    </div>
                `;
            });
        }

        function borrarMensaje(index) {
            let mensajes = JSON.parse(localStorage.getItem('inboxMessages')) || [];
            mensajes.splice(index, 1);
            localStorage.setItem('inboxMessages', JSON.stringify(mensajes));
            renderMessages();
        }
    </script>
</body>
</html>
