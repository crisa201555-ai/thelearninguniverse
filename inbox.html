<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inbox | TLU</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        body { background: var(--bg); color: white; font-family: 'Montserrat'; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .f-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        .f-btn.active { background: var(--p); color: #000; }
        .msg-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid var(--p); }
        .msg-card.clase { border-left-color: var(--s); }
        .btn-join { background: var(--p); border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="font-family:'Fredoka One'; text-align:center; color:var(--s);">INBOX</h1>
        
        <div class="filter-bar">
            <button class="f-btn active" onclick="render('todo', this)">TODO</button>
            <button class="f-btn" onclick="render('clase', this)">CLASES</button>
            <button class="f-btn" onclick="render('sistema', this)">MENSAJES</button>
        </div>

        <div id="display"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
        // MISMA CONFIG QUE ARRIBA
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // IMPORTANTE: El inbox busca por el correo guardado en localStorage
        const userEmail = (localStorage.getItem('userEmail') || "").toLowerCase();
        let cache = [];

        if(!userEmail) alert("Debes estar logueado para recibir mensajes.");

        db.collection("invitaciones").where("para", "==", userEmail).onSnapshot(snap => {
            cache = [];
            snap.forEach(doc => cache.push({id: doc.id, ...doc.data()}));
            render('todo', document.querySelector('.f-btn'));
        });

        function render(tipo, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const container = document.getElementById('display');
            container.innerHTML = "";

            const filtrados = cache.filter(m => {
                if(tipo === 'todo') return true;
                if(tipo === 'clase') return m.esSistema === false;
                if(tipo === 'sistema') return m.esSistema === true;
            });

            filtrados.forEach(m => {
                const isClase = m.esSistema === false;
                container.innerHTML += `
                    <div class="msg-card ${isClase ? 'clase' : ''}">
                        <h3>${m.titulo}</h3>
                        <p>${m.mensaje}</p>
                        ${isClase ? `<button class="btn-join" onclick="unirse('${m.grupoID}')">ACEPTAR</button>` : ''}
                    </div>`;
            });
        }

        window.unirse = (id) => {
            localStorage.setItem('currentGroup', id);
            alert("Unido al sector " + id);
            location.href = "home-student.html";
        };
    </script>
</body>
</html>
