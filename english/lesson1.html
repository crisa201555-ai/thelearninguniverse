<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lesson 1 | English Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p-blue: #6366f1; 
            --p-pink: #f472b6; 
            --bg: #0f172a; 
            --card-bg: #1e293b;
        }
        
        body { margin: 0; font-family: 'Fredoka', sans-serif; background: var(--bg); color: white; transition: 0.8s; }
        
        /* MODO FOCUS: Colores relajantes */
        body.focus-mode { 
            background: #0f172a; 
            --p-blue: #38bdf8; 
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        /* MODO TWICE: Colores vibrantes */
        body.twice-mode { 
            background: #1a0a14; 
            --p-pink: #ff5fa2;
            --card-bg: #2d101e;
        }

        .header-img { 
            height: 35vh; width: 100%; background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
        }
        .header-img::after { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
        
        .container { 
            max-width: 850px; margin: -40px auto 100px; background: var(--card-bg); 
            padding: 50px; border-radius: 40px; position: relative; z-index: 10; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }

        .bubble { 
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 25px; 
            margin: 15px 0; border-left: 5px solid var(--p-blue); transition: 0.3s; 
        }

        /* BOTÓN TRADUCTOR */
        .translate-btn {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: white; color: black; border: none; padding: 10px 20px;
            border-radius: 50px; font-weight: 700; cursor: pointer; font-family: 'Fredoka';
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .lang-es { display: none; color: var(--p-blue); font-style: italic; font-size: 0.9rem; margin-top: 5px; }
        body.show-tr .lang-es { display: block; }

        .btn-finish { 
            width: 100%; padding: 22px; border-radius: 25px; border: none; 
            background: var(--p-blue); color: white; font-weight: 700; 
            font-size: 1.4rem; cursor: pointer; margin-top: 40px; transition: 0.3s; 
        }
        body.twice-mode .btn-finish { background: var(--p-pink); }
        body.twice-mode .bubble { border-left-color: var(--p-pink); }
    </style>
</head>
<body id="mainBody">

    <button class="translate-btn" onclick="document.body.classList.toggle('show-tr')">
        🌐 Translate / Traducir
    </button>

    <audio id="finishSound" src="https://thelearninguniverses.pages.dev/takedown.mp3"></audio>

    <div class="header-img" id="hero">
        <h1 id="title">Lesson 1: Greetings</h1>
        <p class="lang-es">Lección 1: Saludos</p>
    </div>

    <div class="container">
        <h2 id="section-title">Essential Phrases</h2>
        <p class="lang-es">Frases Esenciales</p>

        <div class="bubble">
            <span style="font-size: 1.3rem; font-weight: 700;">Hello, how are you?</span>
            <span class="lang-es">Hola, ¿cómo estás?</span>
        </div>

        <div class="bubble">
            <span style="font-size: 1.3rem; font-weight: 700;">This is my / This is your</span>
            <span class="lang-es">Esto es mi / Esto es tu</span>
        </div>

        <div style="background: rgba(255,255,255,0.03); padding: 25px; border-radius: 30px; margin-top: 30px; text-align: center; border: 1px dashed var(--p-blue);">
            <h3>How do I say "Esto es"?</h3>
            <p class="lang-es">¿Cómo digo "Esto es"?</p>
            <p style="font-size: 2rem; font-weight: 700; color: var(--p-blue);">THIS IS...</p>
        </div>

        <button class="btn-finish" onclick="playAndFinish()">
            MISSION COMPLETE
        </button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const body = document.getElementById('mainBody');
        const hero = document.getElementById('hero');
        const sound = document.getElementById('finishSound');

        // Configuración según el modo
        if (mode === 'twice') {
            body.classList.add('twice-mode');
            hero.style.backgroundImage = "url('https://thelearninguniverses.pages.dev/twice_classroom.jpg')";
        } else {
            body.classList.add('focus-mode');
            hero.style.backgroundImage = "url('classroom.png')";
        }

        function playAndFinish() {
            sound.play().catch(e => console.log("Error de audio:", e));
            alert("Great job! / ¡Buen trabajo!");
            setTimeout(() => {
                location.href = '../english.html';
            }, 800); 
        }
    </script>
</body>
</html>
