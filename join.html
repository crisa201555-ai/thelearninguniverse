<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Unirse - L-Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #060918; color: white; font-family: 'Montserrat'; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 30px; text-align: center; border: 2px solid #48dbfb; width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; box-sizing: border-box; }
        button { background: #48dbfb; border: none; padding: 15px; width: 100%; border-radius: 50px; font-family: 'Fredoka One'; cursor: pointer; color:#060918; font-size:1.1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="font-family:'Fredoka One'; color:#feca57">UNIRSE A FLOTA</h1>
        <input type="text" id="docId" placeholder="ID del Docente (UID)">
        <input type="text" id="gCode" placeholder="Clave del Grupo" style="text-transform: uppercase;">
        <input type="text" id="sName" placeholder="Tu Nombre Completo">
        <button id="btnJoin">SINCRONIZAR</button>
        <a href="home.html" style="color: white; font-size: 0.8rem; display: block; margin-top: 20px;">Cancelar</a>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        document.getElementById('btnJoin').addEventListener('click', async () => {
            const uid = document.getElementById('docId').value;
            const code = document.getElementById('gCode').value.toUpperCase();
            const name = document.getElementById('sName').value;
            if(!uid || !code || !name) return alert("Faltan datos");

            const gSnap = await getDoc(doc(db, "grupos", code));
            if(gSnap.exists() && gSnap.data().creador === uid) {
                if(Date.now() > gSnap.data().expiraEn) return alert("Misión expirada (18h)");
                
                // Registrar miembro
                await setDoc(doc(db, "grupos", code, "miembros", auth.currentUser.uid), { nombre: name, nota: "Pendiente" });
                localStorage.setItem('currentGroup', code);
                window.location.href = "view-group.html";
            } else { alert("ID o Clave incorrectos"); }
        });
    </script>
</body>
</html>
