<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo: #0c1445;
            --celeste: #48dbfb;
            --amarillo: #feca57;
            --rojo: #ff6b6b;
            --blanco: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: var(--fondo);
            background-image: radial-gradient(circle at top, #1b277a 0%, #0c1445 100%);
            color: var(--blanco);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Galáctica */
        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(72, 219, 251, 0.3);
        }

        .nav-logo {
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            color: var(--amarillo);
        }

        .btn-salir {
            background: var(--rojo);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 0 #b33939;
        }

        .btn-salir:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .btn-salir:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        /* Dashboard Content */
        .container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--celeste);
        }

        .user-welcome {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        /* Grid de Misiones */
        .grid-misiones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 30px;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--celeste);
            transform: translateY(-10px);
        }

        .card i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .card h3 {
            font-family: 'Fredoka One', cursive;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">THE LEARNING UNIVERSE</div>
        <button id="btnCerrarSesion" class="btn-salir">ABORTAR MISIÓN (SALIR)</button>
    </nav>

    <div class="container">
        <h1>¡BIENVENIDO, CADETE!</h1>
        <p class="user-welcome" id="userDisplay">Conectando con la base de datos...</p>

        <div class="grid-misiones">
            <div class="card" onclick="location.href='noticias.html'">
                <div style="font-size: 40px;">📡</div>
                <h3>Noticias BMC</h3>
                <p>Últimas transmisiones de Cristóbal y el equipo.</p>
            </div>
            <div class="card">
                <div style="font-size: 40px;">🧮</div>
                <h3>Matemáticas</h3>
                <p>Misión: Ordenar los bloques numéricos.</p>
            </div>
            <div class="card">
                <div style="font-size: 40px;">🚀</div>
                <h3>Misiones</h3>
                <p>Explora nuevos mundos de conocimiento.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI",
            authDomain: "thelearninguniverse-26.firebaseapp.com",
            projectId: "thelearninguniverse-26",
            storageBucket: "thelearninguniverse-26.firebasestorage.app",
            messagingSenderId: "85338996011",
            appId: "1:85338996011:web:1f3bb216900c07e735596e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 1. VERIFICAR SESIÓN (Si no hay usuario, manda a login)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userDisplay').innerText = `Sesión iniciada como: ${user.email}`;
            } else {
                window.location.replace("login.html");
            }
        });

        // 2. LÓGICA DEL BOTÓN CERRAR SESIÓN
        document.getElementById('btnCerrarSesion').addEventListener('click', () => {
            signOut(auth).then(() => {
                // Al cerrar sesión, lo mandamos al login y limpiamos el historial
                window.location.replace("login.html");
            }).catch((error) => {
                alert("Error al cerrar sesión: " + error.message);
            });
        });
    </script>
</body>
</html>
