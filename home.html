<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>The Learning Universe | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --p: #48dbfb; --s: #feca57; --bg: #060918; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Montserrat'; 
            margin: 0; 
            padding: 0;
            background-image: radial-gradient(circle at top, #1b2735 0%, #090a0f 100%);
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: auto; padding: 40px 20px; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-family: 'Fredoka One'; font-size: 3.5rem; color: var(--p); margin: 0; letter-spacing: 3px; }

        /* --- SECCIÓN APRENDER CLASES --- */
        .divider-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 50px 0 30px 0;
        }
        .line {
            height: 1px;
            flex-grow: 1;
            background: linear-gradient(to right, transparent, var(--p), transparent);
        }
        .divider-text {
            font-family: 'Fredoka One';
            color: var(--p);
            margin: 0 20px;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .btn-math {
            background: rgba(72, 219, 251, 0.1);
            border: 2px solid var(--p);
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(72, 219, 251, 0.2);
            text-align: center;
        }

        .btn-math:hover {
            background: var(--p);
            color: #000;
            transform: scale(1.05);
        }

        .btn-math b { font-family: 'Fredoka One'; font-size: 1.5rem; display: block; }

        /* --- FOOTER --- */
        footer {
            margin-top: 80px;
            padding: 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .footer-link {
            color: var(--p);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>TLU CENTRAL</h1>
        </header>

        <div style="text-align: center;">
            <div class="divider-container">
                <div class="line"></div>
                <div class="divider-text">-- APRENDER CLASES --</div>
                <div class="line"></div>
            </div>

            <a href="matematicas/home.html" class="btn-math">
                <b>🧮 MATEMÁTICAS</b>
                <span style="font-size: 0.8rem; font-weight: bold; opacity: 0.8;">SECTOR DE CÁLCULO ESTELAR</span>
            </a>
        </div>

        <footer>
            <p style="opacity: 0.6; font-size: 0.8rem;">&copy; 2026 The Learning Universe</p>
            <a href="historia.html" class="footer-link">Historia e administración</a>
        </footer>
    </div>

</body>
</html>
