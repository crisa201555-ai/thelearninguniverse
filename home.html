<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - The Learning Universe</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-pink: #ff00ff;
            --bg-dark: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0; font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark); color: white;
            display: flex; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111d2b 0%, #05070a 100%);
        }

        /* --- SIDEBAR TECH --- */
        .sidebar {
            width: 260px; background: rgba(0, 0, 0, 0.4);
            border-right: 1px solid rgba(0, 255, 255, 0.1);
            display: flex; flex-direction: column; padding: 30px 15px;
            backdrop-filter: blur(20px); z-index: 10;
        }

        .sidebar h2 {
            font-family: 'Oswald', sans-serif; color: var(--neon-pink);
            text-align: center; letter-spacing: 3px; margin-bottom: 40px;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .nav-btn {
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.05);
            color: #ddd; padding: 18px; margin-bottom: 12px; border-radius: 12px;
            cursor: pointer; text-align: left; transition: 0.4s;
            font-weight: bold; letter-spacing: 1px; position: relative; overflow: hidden;
        }

        .nav-btn:hover {
            background: rgba(0, 255, 255, 0.05);
            color: var(--neon-cyan); border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* --- MAIN AREA --- */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }

        .header {
            height: 90px; padding: 0 40px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .clock-container {
            padding: 10px 20px; background: var(--glass);
            border-radius: 30px; border: 1px solid rgba(0, 255, 255, 0.2);
            font-family: 'Oswald', sans-serif; color: var(--neon-cyan);
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.1);
        }

        /* --- USER MENU --- */
        .user-box {
            display: flex; align-items: center; gap: 15px;
            cursor: pointer; padding: 8px 20px; border-radius: 40px;
            background: var(--glass); border: 1px solid rgba(255, 0, 255, 0.2);
            transition: 0.3s; position: relative;
        }

        .user-box:hover { box-shadow: 0 0 15px rgba(255, 0, 255, 0.3); }

        .user-avatar {
            width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid var(--neon-pink); object-fit: cover;
        }

        .dropdown {
            position: absolute; top: 70px; right: 0; width: 220px;
            background: #0d1117; border: 1px solid var(--neon-pink);
            border-radius: 15px; display: none; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 100;
        }

        .dropdown.active { display: flex; animation: slideDown 0.3s ease; }

        @keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }

        .dropdown a {
            padding: 15px 25px; color: white; text-decoration: none;
            font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .dropdown a:hover { background: var(--neon-pink); color: white; }

        /* --- CONTENT --- */
        .hero {
            flex: 1; display: flex; justify-content: center; align-items: center;
            flex-direction: column; position: relative;
        }

        .hero h1 {
            font-family: 'Oswald', sans-serif; font-size: 4.5rem; margin: 0;
            background: linear-gradient(45deg, #fff, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 255, 255, 0.3));
        }

        .orbit-icon {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; opacity: 0.2;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>PORTAL</h2>
        <button class="nav-btn">LENGUAJE</button>
        <button class="nav-btn">MATEMÁTICAS</button>
        <button class="nav-btn">HISTORIA</button>
        <button class="nav-btn">INGLÉS</button>
        <button class="nav-btn">TECNOLOGÍA</button>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="clock-container" id="clock">CARGANDO TIEMPO...</div>

            <div class="user-box" onclick="toggleDrop()">
                <div style="text-align: right">
                    <div id="u-name" style="font-weight:bold; font-size:0.9rem">Explorador</div>
                    <div id="u-email" style="font-size:0.7rem; color: #888">conectando...</div>
                </div>
                <img id="u-img" src="https://via.placeholder.com/100" class="user-avatar">
                
                <div class="dropdown" id="myDrop">
                    <a href="#">⚙️ Configuración</a>
                    <a href="#">ℹ️ Información</a>
                    <a href="#" onclick="exit()" style="color: #ff4444">🚀 Cerrar Sesión</a>
                </div>
            </div>
        </div>

        <div class="hero">
            <h1>UNIVERSE</h1>
            <p style="letter-spacing: 5px; color: var(--neon-cyan)">ESTACIÓN CENTRAL DE APRENDIZAJE</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI",
            authDomain: "thelearninguniverse-26.firebaseapp.com",
            projectId: "thelearninguniverse-26",
            storageBucket: "thelearninguniverse-26.firebasestorage.app",
            messagingSenderId: "85338996011",
            appId: "1:85338996011:web:1f3bb216900c07e735596e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('u-name').innerText = user.displayName || "Usuario";
                document.getElementById('u-email').innerText = user.email;
                if(user.photoURL) document.getElementById('u-img').src = user.photoURL;
            } else { window.location.href = "index.html"; }
        });

        window.exit = () => signOut(auth);

        window.toggleDrop = () => document.getElementById('myDrop').classList.toggle('active');

        function startClock() {
            const update = () => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleString('es-ES', { 
                    weekday: 'short', day: '2-digit', month: 'short', 
                    hour: '2-digit', minute: '2-digit', second: '2-digit' 
                }).toUpperCase();
            }
            setInterval(update, 1000); update();
        }
        startClock();
    </script>
</body>
</html>
