<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Learning Universe | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --sidebar-bg: rgba(15, 23, 42, 0.9);
            --accent: #38bdf8;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0; font-family: 'Fredoka', sans-serif; background: var(--bg);
            color: white; display: flex; height: 100vh; overflow: hidden;
            background: radial-gradient(circle at top right, #1e293b, #020617);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px; background: var(--sidebar-bg); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex;
            flex-direction: column; padding: 35px 25px;
        }

        .logo-text { 
            font-size: 1.4rem; font-weight: 700; color: var(--accent); 
            margin-bottom: 50px; text-align: center; line-height: 1.2;
        }

        .nav-group { display: flex; flex-direction: column; gap: 15px; flex-grow: 1; }

        .nav-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.05); 
            color: #94a3b8; padding: 18px; border-radius: 15px; text-align: left; 
            font-size: 1rem; cursor: pointer; transition: 0.3s; font-family: 'Fredoka';
        }

        .nav-btn:hover { background: var(--accent); color: var(--bg); font-weight: 600; transform: translateX(8px); }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        .top-info { position: absolute; top: 30px; right: 50px; text-align: right; }
        #time { font-size: 2.5rem; font-weight: 700; color: var(--accent); margin: 0; }
        #date { opacity: 0.6; }

        h1 { font-size: 3.5rem; margin: 0; letter-spacing: -1px; text-align: center; text-transform: uppercase; }
        .welcome-sub { font-size: 1.2rem; opacity: 0.6; margin-bottom: 40px; }

        .explore-btn {
            background: white; color: var(--bg); border: none; padding: 20px 60px;
            border-radius: 50px; font-size: 1.5rem; font-weight: 700; cursor: pointer;
            transition: 0.3s; box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }
        .explore-btn:hover { transform: scale(1.08); box-shadow: 0 15px 40px rgba(56, 189, 248, 0.4); }

        /* MODAL MATERIAS */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-card {
            background: #0f172a; padding: 40px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1); width: 420px; text-align: center;
        }
        .opt-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 18px; border-radius: 20px; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s; width: 100%; margin-bottom: 12px; font-family: 'Fredoka';
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .opt-btn:hover { background: var(--accent); color: var(--bg); font-weight: 700; }
        
        .logout-link { color: #e63946; background: none; border: none; font-weight: 600; margin-top: 20px; cursor: pointer; opacity: 0.7; font-family: 'Fredoka'; }
        .logout-link:hover { opacity: 1; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-text">The Learning<br>Universe</div>
        <div class="nav-group">
            <button class="nav-btn" onclick="location.href='creategroup.html'">➕ Crear clase</button>
            <button class="nav-btn" onclick="location.href='inbox.html'">📥 Bandeja de entrada</button>
        </div>
        <button class="logout-link" onclick="logout()">Cerrar sesión...</button>
    </nav>

    <main class="main-content">
        <div class="top-info">
            <p id="time">00:00:00</p>
            <p id="date">-- / -- / --</p>
        </div>

        <h1 id="user-welcome">BIENVENIDO</h1>
        <p class="welcome-sub">¿Qué planeta de conocimiento visitaremos hoy?</p>

        <button class="explore-btn" onclick="openSubjects()">Explorar Materias</button>
    </main>

    <div id="subjectModal" class="modal" onclick="closeSubjects()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 style="margin-bottom: 25px; color: var(--accent);">Selecciona una Materia</h2>
            
            <button class="opt-btn" onclick="location.href='history.html'">
                <span>🏛️</span> History Universe
            </button>
            
            <button class="opt-btn" onclick="location.href='cienciasnaturales.html'">
                <span>🌿</span> Ciencias Naturales
            </button>
            
            <button class="opt-btn" onclick="location.href='english.html'">
                <span>🇬🇧</span> English Universe
            </button>

            <p style="color: #64748b; cursor: pointer; margin-top: 20px; font-size: 0.9rem;" onclick="closeSubjects()">Cancelar</p>
        </div>
    </div>

    <script>
        // Carga el nombre del usuario guardado en el Login
        function loadUser() {
            const name = localStorage.getItem('usuarioActivo') || "CADETE";
            document.getElementById('user-welcome').innerText = `BIENVENIDO, ${name}`;
        }

        function openSubjects() { document.getElementById('subjectModal').style.display = 'flex'; }
        function closeSubjects() { document.getElementById('subjectModal').style.display = 'none'; }

        function logout() {
            if(confirm('¿Deseas finalizar tu sesión espacial?')) {
                localStorage.removeItem('usuarioActivo');
                location.href = 'login.html';
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString();
            document.getElementById('date').innerText = now.toLocaleDateString();
        }

        window.onload = () => {
            loadUser();
            updateClock();
            setInterval(updateClock, 1000);
        };
    </script>
</body>
</html>
