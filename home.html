<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mando Central - The Learning Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --fondo: #060918; --sidebar: #0f173d; --celeste: #48dbfb; --amarillo: #feca57; --rojo: #ff6b6b; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--fondo); color: white; display: flex; height: 100vh; overflow: hidden; }
        .bg-animated { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(125deg, #060918, #1b277a, #2c003e); background-size: 400% 400%; animation: moveGradient 15s ease infinite; }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .sidebar { width: 260px; background: var(--sidebar); padding: 30px 20px; display: flex; flex-direction: column; border-right: 1px solid rgba(72, 219, 251, 0.2); }
        .brand { font-family: 'Fredoka One'; color: var(--amarillo); font-size: 1.8rem; margin-bottom: 40px; text-align: center; }
        .nav-item { padding: 15px; color: white; text-decoration: none; border-radius: 15px; margin-bottom: 8px; transition: 0.3s; display: block; }
        .nav-item:hover { background: var(--glass); color: var(--celeste); }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--celeste); }
        footer { margin-top: 50px; padding: 40px; background: linear-gradient(to bottom, transparent, rgba(72, 219, 251, 0.1)); text-align: center; border-top: 1px solid var(--glass); }
    </style>
</head>
<body>
    <div class="bg-animated"></div>
    <aside class="sidebar">
        <div class="brand">L-UNIVERSE</div>
        <a href="info.html" class="nav-item">⚙️ Mi Perfil</a>
        <a href="matematicas.html" class="nav-item">🧮 Matemáticas</a>
        <a href="crear-grupo.html" class="nav-item" style="color: var(--amarillo)">👨‍🏫 Crear Flota (Docente)</a>
        <a href="join.html" class="nav-item" style="color: var(--celeste)">🚀 Unirse a Flota</a>
        <button id="logout" style="margin-top:auto; background:var(--rojo); border:none; padding:10px; border-radius:50px; cursor:pointer; font-family:'Fredoka One'; color:white;">CERRAR ESCOTILLA</button>
    </aside>
    <main class="main">
        <h1>Centro de Mando</h1>
        <div class="grid">
            <div class="card" onclick="location.href='join.html'"><h3>Misiones Activas</h3><p>Ingresa a una flota para rendir pruebas.</p></div>
            <div class="card" onclick="location.href='noticias.html'"><h3>Noticias BMC</h3><p>Últimas transmisiones de la base.</p></div>
        </div>
        <footer>
            <p>Bienvenido. Si deseas reportar errores: <b>thelearninguniverse@googlegroups.com</b></p>
        </footer>
    </main>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        const firebaseConfig = { apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI", authDomain: "thelearninguniverse-26.firebaseapp.com", projectId: "thelearninguniverse-26", storageBucket: "thelearninguniverse-26.firebasestorage.app", messagingSenderId: "85338996011", appId: "1:85338996011:web:1f3bb216900c07e735596e" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        onAuthStateChanged(auth, (user) => { if (!user) window.location.replace("login.html"); });
        document.getElementById('logout').addEventListener('click', () => signOut(auth).then(() => window.location.replace("login.html")));
    </script>
</body>
</html>
