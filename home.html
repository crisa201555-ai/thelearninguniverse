<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>The Learning Universe | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --accent: #fd79a8;
            --danger: #ff7675;
            --dark-bg: #0f172a;
        }

        /* Evitamos el "parpadeo" ocultando el body hasta que Firebase confirme al usuario */
        body { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Fredoka', sans-serif; overflow: hidden;
            background: var(--dark-bg); display: none; 
        }

        .app-container { display: flex; width: 100vw; height: 100vh; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 320px;
            background: linear-gradient(180deg, #1e293b 0%, #111827 100%);
            border-right: 2px solid rgba(0, 206, 201, 0.3);
            display: flex; flex-direction: column; padding: 40px 20px;
            box-sizing: border-box; flex-shrink: 0;
        }

        .sidebar h1 {
            font-size: 1.8rem; text-align: center; color: var(--secondary);
            margin-bottom: 40px; text-shadow: 0 0 10px rgba(0, 206, 201, 0.5);
        }

        .nav-btn {
            text-decoration: none; color: white; padding: 15px;
            margin-bottom: 12px; border-radius: 15px; font-weight: 700;
            text-align: center; background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent; transition: 0.3s;
        }

        .nav-btn:hover { background: var(--primary); border-color: white; transform: scale(1.02); }

        .logout-btn {
            margin-top: 15px; text-decoration: none; color: var(--danger);
            padding: 12px; font-size: 0.9rem; font-weight: 700;
            text-align: center; border: 2px solid var(--danger);
            border-radius: 15px; cursor: pointer; transition: 0.3s;
        }

        .logout-btn:hover { background: var(--danger); color: white; }

        .learn-box {
            margin-top: auto; background: rgba(253, 121, 168, 0.1);
            border: 2px dashed var(--accent); border-radius: 20px;
            padding: 20px; text-align: center;
        }

        .btn-math {
            display: block; text-decoration: none; background: white;
            color: var(--accent); padding: 12px; border-radius: 12px;
            font-weight: 700; margin-top: 10px; transition: 0.3s;
        }

        /* --- CONTENIDO --- */
        .main-content {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .clock-capsule {
            position: absolute; top: 30px; background: rgba(0, 206, 201, 0.1);
            border: 1px solid var(--secondary); padding: 10px 30px; border-radius: 50px;
        }

        #time { font-size: 2rem; color: var(--secondary); font-weight: 700; display: block; }
        
        .hero-logo {
            width: 280px; filter: drop-shadow(0 0 25px var(--secondary));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .welcome-title { font-size: 3.5rem; color: white; margin-top: 25px; }
        .welcome-title span { color: var(--secondary); }

        .typing-sub { font-size: 1.4rem; color: #a29bfe; margin-top: 10px; height: 30px; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <h1>UNIVERSE</h1>
            
            <a href="creategroup.html" class="nav-btn">✨ Crear una clase</a>
            <a href="viewclass.html" class="nav-btn">🚀 Ver mi clase</a>
            <a href="inbox.html" class="nav-btn">📧 Bandeja de entrada</a>
            
            <div class="logout-btn" id="logoutBtn">Cerrar sesión...</div>

            <div class="learn-box">
                <span style="color: var(--accent); font-weight: 700;">¡ZONA DE ESTUDIO!</span>
                <a href="/matematicas/home.html" class="btn-math">📐 Matemáticas</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="clock-capsule">
                <span id="time">00:00:00</span>
                <span id="date" style="color:white; opacity:0.7">Cargando...</span>
            </div>

            <img src="unnamed-removebg-preview.png" alt="Logo" class="hero-logo">

            <h1 class="welcome-title">¡Hola, <span id="userName">EXPLORADOR</span>!</h1>
            <div class="typing-sub" id="typewriter"></div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuQgFqmiKUwKlXfBjFXz0Uu584RT6LtbI",
            authDomain: "thelearninguniverse-26.firebaseapp.com",
            projectId: "thelearninguniverse-26",
            storageBucket: "thelearninguniverse-26.firebasestorage.app",
            messagingSenderId: "85338996011",
            appId: "1:85338996011:web:1f3bb216900c07e735596e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- 1. GUARDIÁN DE RUTA ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Usuario autenticado: mostramos la página y su nombre
                document.body.style.display = "block";
                if(user.displayName) {
                    document.getElementById('userName').innerText = user.displayName.split(' ')[0].toUpperCase();
                }
                startApp();
            } else {
                // No hay usuario: expulsión inmediata
                window.location.replace("login.html");
            }
        });

        // --- 2. CERRAR SESIÓN ---
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if(confirm("¿Quieres cerrar tu sesión espacial? 🚀")) {
                signOut(auth).then(() => {
                    localStorage.clear();
                    window.location.replace("login.html");
                });
            }
        });

        // --- 3. LÓGICA DE LA INTERFAZ ---
        function startApp() {
            updateClock();
            setInterval(updateClock, 1000);
            typeEffect();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('es-ES');
            document.getElementById('date').innerText = now.toLocaleDateString('es-ES', { 
                weekday: 'long', day: 'numeric', month: 'long' 
            });
        }

        const text = "¡Hoy es un gran día para descubrir algo nuevo!";
        let i = 0;
        function typeEffect() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeEffect, 50);
            }
        }
    </script>
</body>
</html>
